# aeon-waves — easy-deploy site (driven entirely by this file).
#
# Deploy with:  a0 xr deploy
#
# aeon-waves has no worker `main`; the [site] block makes it a topology-driven
# site. x-ranger synthesizes a worker that renders this content with the
# `oss-template` kit via the @a0n/aeon-flux runtime.
#
# Content is sourced from open-source/aeon-waves/README.md — keep it honest.

name = "aeon-waves-site"
compatibility_date = "2025-01-01"
workers_dev = true

[site]
kit = "oss-template"
title = "aeon-waves — String Theory Correspondence runtime for Gnosis"

[site.project]
name = "Aeon Waves"
tagline = "Programs are strings. Crossings are tangles. Beta1 is worldsheet genus."
description = "A String Theory Correspondence runtime that bridges StringTheoryCorrespondence.lean theorems to executable TypeScript. Module boundaries become D-branes; fork/fold becomes a pair-of-pants; the unknot is a correct program."
logo = "orb"
accent = "#7c5cff"
theme = "dark"
repo = "forkjoin-ai/aeon-waves"

[site.sigil]
seed = "aeon-waves"
motion = "vortex"
coherence = "ring"
frame = "circle"

[site.nav]
links = ["Features|#features", "Mapping|#compare", "FAQ|#faq", "Source|https://forgo.cloud/forkjoin-ai/aeon-waves"]


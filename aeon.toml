[[site.features]]
icon = "branch"
title = "Strings ≅ knots"
body = "StringState is isomorphic to AlgorithmicKnot. A program is a string; its crossings are tangles, and the unknot (Vacuum) is a correct program."

[[site.features]]
icon = "layers"
title = "Worldsheet genus"
body = "A Worldsheet's genus equals a program's loop count (beta1). Fork and fold are the PairOfPants — composeKnots — joining and splitting worldsheets."

[[site.features]]
icon = "shield"
title = "Gauge-equivalent transforms"
body = "GaugeEquivalence maps to Reidemeister moves: behavior-preserving transforms that rewrite the tangle without changing the program it denotes."

[[site.features]]
icon = "lock"
title = "D-branes as type boundaries"
body = "A DBrane is a type boundary — a Dirichlet condition on function endpoints. Compactification is abstraction: internal dimensions hidden behind the interface."

[[site.features]]
icon = "globe"
title = "Holography & T-duality"
body = "Holography is the void-boundary sufficient statistic (AdS/CFT). TDuality maps a FoldedKnot to defenseWeight, the R ↔ 1/R exchange made executable."

[[site.features]]
icon = "cpu"
title = "Formal-diagnostic engines"
body = "Turbulence, Oceanography, Astronomy, and Geology engines are pure evaluators of one God-Formula, w = R − min(v, R) + 1 — an OSI L6 representation transform."


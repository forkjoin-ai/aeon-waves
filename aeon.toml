[[site.faq]]
q = "What is the String Theory Correspondence?"
a = "A mapping between Gnosis program structure and string-theoretic objects: programs are strings, crossings are tangles, beta1 is worldsheet genus, and module boundaries are D-branes. The correspondence is proved in StringTheoryCorrespondence.lean and executed here in TypeScript."

[[site.faq]]
q = "Is there a compression or codec pipeline here?"
a = "No. There is no clean multiplicative stage. The Turbulence, Oceanography, Astronomy, and Geology engines are pure formal-diagnostic evaluators of a single God-Formula — there is no compression, caching, batching, fan-out, dedup, or parallel speedup to multiply. It is an OSI L6 (presentation) representation transform."

[[site.faq]]
q = "Where do the theorems live?"
a = "See open-source/gnosis/lean/Lean/ForkRaceFoldTheorems/StringTheoryCorrespondence.lean for the formal surface this runtime bridges."


name = "forkjoin-app"
main = "src/worker.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[build]
command = "bun run build:client"

[assets]
directory = "./dist/client"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "GnosisMcpSessionDurableObject"

[[durable_objects.bindings]]
name = "DEBUG_SESSION_DO"
class_name = "GnosisDebugSessionDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["GnosisMcpSessionDurableObject", "GnosisDebugSessionDurableObject"]

[vars]
ENVIRONMENT = "development"
MCP_PUBLIC_BASE_URL = "http://127.0.0.1:8796"
MCP_AUTH_REQUIRED = "false"
PUBLIC_TOOL_RATE_LIMIT = "180"
DASH_RELAY_URL = "https://relay.dashrelay.com"
DASH_RELAY_WS_URL = "wss://relay.dashrelay.com/relay/sync"
DASH_RELAY_WT_URL = "https://relay.dashrelay.com/relay"
DASH_RELAY_DISCOVERY_URL = "https://relay.dashrelay.com/discovery"
AEON_FORGE_DEPLOY_URL = ""

AEON_SSE_BODY = "phoneme-v1"
[dev]
port = 8796
local_protocol = "http"

[env.dev]
# Static assets for dev
[env.dev.assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

name = "forkjoin-app-dev"
workers_dev = true
routes = [{ pattern = "dev.forkjoin.ai/*", zone_name = "forkjoin.ai" }]

[env.dev.vars]
ENVIRONMENT = "development"
MCP_PUBLIC_BASE_URL = "https://dev.forkjoin.ai"
MCP_AUTH_REQUIRED = "false"
PUBLIC_TOOL_RATE_LIMIT = "180"
DASH_RELAY_URL = "https://relay.dashrelay.com"
DASH_RELAY_WS_URL = "wss://relay.dashrelay.com/relay/sync"
DASH_RELAY_WT_URL = "https://relay.dashrelay.com/relay"
DASH_RELAY_DISCOVERY_URL = "https://relay.dashrelay.com/discovery"
AEON_FORGE_DEPLOY_URL = ""

[[env.dev.durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "GnosisMcpSessionDurableObject"

[[env.dev.durable_objects.bindings]]
name = "DEBUG_SESSION_DO"
class_name = "GnosisDebugSessionDurableObject"

[[env.dev.migrations]]
tag = "v1"
new_classes = ["GnosisMcpSessionDurableObject", "GnosisDebugSessionDurableObject"]

AEON_SSE_BODY = "phoneme-v1"
[env.staging]
# Static assets for staging
[env.staging.assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

name = "forkjoin-app-staging"
workers_dev = true
routes = [{ pattern = "staging.forkjoin.ai/*", zone_name = "forkjoin.ai" }]

[env.staging.vars]
ENVIRONMENT = "staging"
MCP_PUBLIC_BASE_URL = "https://staging.forkjoin.ai"
MCP_AUTH_REQUIRED = "true"
PUBLIC_TOOL_RATE_LIMIT = "180"
DASH_RELAY_URL = "https://relay.dashrelay.com"
DASH_RELAY_WS_URL = "wss://relay.dashrelay.com/relay/sync"
DASH_RELAY_WT_URL = "https://relay.dashrelay.com/relay"
DASH_RELAY_DISCOVERY_URL = "https://relay.dashrelay.com/discovery"
AEON_FORGE_DEPLOY_URL = ""

[[env.staging.durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "GnosisMcpSessionDurableObject"

[[env.staging.durable_objects.bindings]]
name = "DEBUG_SESSION_DO"
class_name = "GnosisDebugSessionDurableObject"

[[env.staging.migrations]]
tag = "v1"
new_classes = ["GnosisMcpSessionDurableObject", "GnosisDebugSessionDurableObject"]

AEON_SSE_BODY = "phoneme-v1"
[env.production]
# Static assets for production
[env.production.assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

name = "forkjoin-app"
workers_dev = false
routes = [
  { pattern = "forkjoin.ai/*", zone_name = "forkjoin.ai" },
  { pattern = "www.forkjoin.ai/*", zone_name = "forkjoin.ai" }
]

[env.production.vars]
ENVIRONMENT = "production"
MCP_PUBLIC_BASE_URL = "https://forkjoin.ai"
MCP_AUTH_REQUIRED = "true"
PUBLIC_TOOL_RATE_LIMIT = "240"
DASH_RELAY_URL = "https://relay.dashrelay.com"
DASH_RELAY_WS_URL = "wss://relay.dashrelay.com/relay/sync"
DASH_RELAY_WT_URL = "https://relay.dashrelay.com/relay"
DASH_RELAY_DISCOVERY_URL = "https://relay.dashrelay.com/discovery"
AEON_FORGE_DEPLOY_URL = ""

[[env.production.durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "GnosisMcpSessionDurableObject"

[[env.production.durable_objects.bindings]]
name = "DEBUG_SESSION_DO"
class_name = "GnosisDebugSessionDurableObject"

[[env.production.migrations]]
tag = "v1"
new_classes = ["GnosisMcpSessionDurableObject", "GnosisDebugSessionDurableObject"]

AEON_SSE_BODY = "phoneme-v1"
[observability]
enabled = true

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-bg: #0a0a0f;
        --color-bg-secondary: #12121a;
        --color-text: #f0f0f5;
        --color-text-secondary: #9090a0;
        --color-accent: #5599cc;

      }

      html {
        scroll-behavior: smooth;
        font-size: clamp(16px, 0.18vw + 15.25px, 18.5px);
      }

      body {
        font-family: var(--font-sans);
        background: var(--color-bg);
        color: var(--color-text);
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      /* Static hero — painted from HTML before any JS executes.
         Position: fixed so it never affects document flow (zero CLS). */
      #static-hero {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
        transition: opacity 0.3s ease-out;
      }

      #static-hero.hidden {
        display: none;
      }

      .static-hero-content {
        text-align: center;
        padding: 2rem;
        max-width: 800px;
      }

      .static-hero-title {
        font-size: clamp(2.5rem, 8vw, 5rem);
        font-weight: 300;
        line-height: 0.96;
        letter-spacing: -0.045em;
        margin-bottom: 1.5rem;
      }

      .static-hero-title span {
        display: block;
      }

      .static-hero-accent {
        background: linear-gradient(135deg, var(--color-accent) 0%, #4488aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .static-hero-subtitle {
        font-size: 1.25rem;
        color: var(--color-text-secondary);
        line-height: 1.8;
      }

      .static-hero-subtitle strong {
        color: var(--color-text);
      }

      /* Cursor overlay base styles */
      .cursor-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1000;
      }

      .cursor-indicator {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: left 0.05s linear, top 0.05s linear;
        pointer-events: none;
      }

      .cursor-indicator::after {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 2px solid currentColor;
        opacity: 0.5;
        animation: cursor-ring 2s ease-in-out infinite;
      }

      @keyframes cursor-ring {
        0%, 100% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 0.3; }
      }
    </style>

[package]
name = "gnosis-antiqueue"
version = "0.1.0"
edition = "2021"
description = "AMQP-shaped broker backed by the FOIL Stoplight scheduler. No in-memory queue: rate-gated producers tile into corridor green windows."
license = "MPL-2.0"

[lib]
name = "gnosis_antiqueue"
path = "src/lib.rs"

[[bin]]
name = "0q"
path = "src/cli/main.rs"

[[bench]]
name = "antiqueue_vs_rabbit"
path = "benches/antiqueue_vs_rabbit.rs"
harness = false

[dependencies]
gnosis-frf = { path = "../gnosis-frf" }
gnosis-helix = { path = "../gnosis-helix" }

[dev-dependencies]
divan = "0.1"
gnosis-engine-core = { path = "../gnosis-engine-core" }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

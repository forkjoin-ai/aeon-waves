# Dyson Sphere Self-Calibration Agent
# Deploy: forge deploy dyson-sphere-calibration
# Or: aeon register dyson-sphere-calibration

[process]
name = "dyson-sphere-calibration"
kind = "agent"
topology = "dyson_sphere_calibration.gg"

[agent]
cron = "0 3 * * *"           # Daily at 3am UTC
max_concurrent = 1            # One calibration at a time
timeout_ms = 1800000          # 30 minute total timeout
retry_on_failure = true
max_retries = 2

[agent.env]
CF_ACCOUNT_ID = "0eaf6e54519378a2f608e8c982f020ed"
CF_KV_NAMESPACE_ID = "270225c9e25e4721882c1b7193dd7a83"

[deploy]
target = "local"              # Runs on forge host (needs gcloud + wrangler)

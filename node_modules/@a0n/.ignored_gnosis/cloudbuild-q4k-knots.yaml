# Q4_K knot build: HF Q4_K_M gguf -> .knot (quant preserved verbatim) -> R2 (r2-mpu
# multipart) -> range-verify magic. Encoder is node-builtins-only, so no pnpm install.
# Submit FROM THE MONOREPO ROOT (the encoder + upload.mjs paths are root-relative):
#   gcloud builds submit . --config open-source/gnosis/cloudbuild-q4k-knots.yaml \
#     --project=neutral-418500 \
#     --substitutions=_MODEL_NAME=qwen3-8b,_HF_REPO=Qwen/Qwen3-8B-GGUF,\
# _HF_FILE=Qwen3-8B-Q4_K_M.gguf,_R2_KEY=models/qwen3-8b.q4km.knot
# Mirror the knot next to its gguf with cloudbuild-knot-to-hf.yaml (NOT a dump repo):
#   _HF_REPO=forkjoin-ai/qwen3-8b-gguf  (knot sits beside the source gguf + Q8 knot).
# Verify Q8-vs-Q4_K is worth it FIRST: Q8 ~1.06 B/param, Q4_K ~0.56. Only build for
# genuinely-Q8 models (qwen3-8b/4b, gemma3-4b-it were; qwen2.5-7b/llama-3.2-3b were
# already Q4_K -> redundant). Decode tok/s is ~parity; the win is size + cold-load.
steps:
  - name: 'python:3.11-slim'
    id: fetch-gguf-from-hf
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install -q -U "huggingface_hub[hf_transfer]"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        echo "Downloading ${_HF_REPO} :: ${_HF_FILE}"
        hf download "${_HF_REPO}" "${_HF_FILE}" --repo-type model --local-dir /workspace/dl --token "$$HF_TOKEN"
        mv "/workspace/dl/${_HF_FILE}" /workspace/model.gguf
        ls -la /workspace/model.gguf
        # confirm gguf quant + arch from header (sanity, not a build gate)
        head -c 2000 /workspace/model.gguf | strings | grep -iE 'general.architecture|Q4_K|gemma|qwen' | head -5 || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'
  - name: 'node:22-slim'
    id: encode-knot
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        npm install -g tsx@4 >/dev/null 2>&1
        cd /workspace
        tsx open-source/bitwise/scripts/encode-llama-knot.ts --input /workspace/model.gguf --output /workspace/model.knot --name '${_MODEL_NAME}'
        echo "Encoded: $$(du -sh /workspace/model.knot)"
        # magic must be KNOT
        MAGIC=$$(head -c 4 /workspace/model.knot)
        if [ "$$MAGIC" != "KNOT" ]; then echo "bad local magic: $$MAGIC"; exit 1; fi
    timeout: '3600s'
  - name: 'node:22-slim'
    id: upload-r2-mpu
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        echo "Multipart-uploading ${_MODEL_NAME} -> ${_R2_KEY}"
        node apps/r2-mpu/upload.mjs '${_R2_KEY}' /workspace/model.knot
    timeout: '3600s'
  - name: 'curlimages/curl:latest'
    id: verify-range
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        MAGIC=$$(curl -sf -H "Range: bytes=0-15" "${_R2_PROXY_URL}/api/v1/r2/distributed-inference/${_R2_KEY}" | head -c 4)
        CL=$$(curl -sf -I "${_R2_PROXY_URL}/api/v1/r2/distributed-inference/${_R2_KEY}" | grep -i '^content-length:' | tr -d '\r' | awk '{print $$2}')
        if [ "$$MAGIC" = "KNOT" ]; then echo "[OK] ${_R2_KEY} live, magic=KNOT, content-length=$${CL} bytes"; else echo "bad magic: $$MAGIC"; exit 1; fi
    timeout: '120s'
substitutions:
  _MODEL_NAME: 'placeholder'
  _HF_REPO: 'placeholder'
  _HF_FILE: 'placeholder'
  _R2_KEY: 'placeholder'
  _R2_PROXY_URL: 'https://www-edgework-app.edgework.ai'
options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  substitutionOption: ALLOW_LOOSE
timeout: '14400s'
availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/HUGGINGFACE_TOKEN/versions/latest
      env: HF_TOKEN

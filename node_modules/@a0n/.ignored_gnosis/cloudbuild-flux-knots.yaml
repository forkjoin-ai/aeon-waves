# FLUX.1-dev full component KNOT: black-forest-labs/FLUX.1-dev
# Carries transformer, VAE, CLIP text_encoder, and T5 text_encoder_2.
# Tokenizers/scheduler/feature_extractor intentionally stay outside KNOT.
# ~45+ GB download/cache, large dense KNOT after Q8_0. Use Cloud Build.

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" hf_transfer ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: flux-1-dev
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference

        export HF_XET_HIGH_PERFORMANCE=1
        export KMP_DUPLICATE_LIB_OK=TRUE

        echo "[flux-1-dev] encoding full component weights (transformer + VAE + CLIP + T5)..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model black-forest-labs/FLUX.1-dev \
          --output /workspace/flux-1-dev.knot
        echo "[flux-1-dev] done: $(ls -lh /workspace/flux-1-dev.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '14400s'

  - name: 'python:3.11-slim'
    id: validate-full-flux-knot
    waitFor: ['flux-1-dev']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        /workspace/venv/bin/python3 - <<'PY'
        import hashlib
        import json
        import struct
        import sys
        from pathlib import Path

        knot = Path("/workspace/flux-1-dev.knot")
        if not knot.exists():
            raise SystemExit("missing /workspace/flux-1-dev.knot")
        with knot.open("rb") as f:
            if f.read(4) != b"KNOT":
                raise SystemExit("bad KNOT magic")
            version = struct.unpack("<H", f.read(2))[0]
            meta_len = struct.unpack("<I", f.read(4))[0]
            metadata = json.loads(f.read(meta_len))

        components = metadata.get("components") or {}
        expected_included = ["transformer", "vae", "text_encoder", "text_encoder_2"]
        expected_skipped = ["tokenizer", "tokenizer_2", "scheduler", "feature_extractor"]
        problems = []
        if metadata.get("config", {}).get("arch") != "flux":
            problems.append("config.arch is not flux")
        if components.get("policy") != "flux-with-vae-text-encoders":
            problems.append("components.policy is not flux-with-vae-text-encoders")
        included = set(components.get("included") or [])
        skipped = set(components.get("skipped") or [])
        for item in expected_included:
            if item not in included:
                problems.append(f"components.included missing {item}")
        for item in expected_skipped:
            if item not in skipped:
                problems.append(f"components.skipped missing {item}")

        tensors = metadata.get("tensors") or {}
        prefixes = {
            "transformer": ("flux_img_in_", "flux_dbl_", "flux_sgl_"),
            "vae": ("flux_vae_",),
            "text_encoder": ("flux_clip_",),
            "text_encoder_2": ("flux_t5_",),
        }
        counts = {
            component: sum(
                1 for name in tensors
                if any(name.startswith(prefix) for prefix in component_prefixes)
            )
            for component, component_prefixes in prefixes.items()
        }
        shape_counts = {
            component: sum(
                1 for name, info in tensors.items()
                if any(name.startswith(prefix) for prefix in component_prefixes)
                and isinstance(info, dict)
                and isinstance(info.get("shape"), list)
                and len(info["shape"]) > 0
            )
            for component, component_prefixes in prefixes.items()
        }
        for component, count in counts.items():
            if count <= 0:
                problems.append(f"missing {component} tensors")
        shapeless = {
            component: [
                name for name, info in tensors.items()
                if any(name.startswith(prefix) for prefix in component_prefixes)
                and (
                    not isinstance(info, dict)
                    or not isinstance(info.get("shape"), list)
                    or len(info["shape"]) == 0
                )
            ]
            for component, component_prefixes in prefixes.items()
        }
        for component, names in shapeless.items():
            if names:
                preview = ", ".join(names[:3])
                suffix = "..." if len(names) > 3 else ""
                problems.append(f"{component} tensors missing shape metadata: {preview}{suffix}")

        if problems:
            print("[flux-1-dev] invalid KNOT:", file=sys.stderr)
            for problem in problems:
                print(f"  - {problem}", file=sys.stderr)
            raise SystemExit(1)

        digest = hashlib.sha256()
        with knot.open("rb") as f:
            for chunk in iter(lambda: f.read(64 * 1024 * 1024), b""):
                digest.update(chunk)
        manifest = {
            "model_id": "flux-1-dev",
            "source_hf": "black-forest-labs/FLUX.1-dev",
            "artifact": "models/flux-1-dev.knot",
            "format": "knot/v1",
            "version": version,
            "arch": "flux",
            "components": components,
            "tensor_counts": counts,
            "shape_counts": shape_counts,
            "shape_metadata": True,
            "size": knot.stat().st_size,
            "sha256": digest.hexdigest(),
        }
        Path("/workspace/flux-1-dev.knot.manifest.json").write_text(
            json.dumps(manifest, indent=2) + "\n"
        )
        admission = {
            **manifest,
            "status": "shape-admitted",
            "admission_source": "knot-header",
            "missing": [],
        }
        Path("/workspace/flux-1-dev.knot.admission.json").write_text(
            json.dumps(admission, indent=2) + "\n"
        )
        print("[flux-1-dev] full component validation passed")
        print(json.dumps(manifest, indent=2))
        PY
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['validate-full-flux-knot']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        echo "[upload] flux-1-dev.knot -> models/flux-1-dev.knot"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/flux-1-dev.knot models/flux-1-dev.knot
        echo "[upload] flux-1-dev.knot.manifest.json -> models/flux-1-dev.knot.manifest.json"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/flux-1-dev.knot.manifest.json models/flux-1-dev.knot.manifest.json
        echo "[upload] flux-1-dev.knot.admission.json -> models/flux-1-dev.knot.admission.json"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/flux-1-dev.knot.admission.json models/flux-1-dev.knot.admission.json
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/flux-1-dev.knot" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] flux-1-dev.knot" || { echo "[FAIL] flux-1-dev.knot: $magic"; exit 1; }
        manifest=$(curl -sf "$$BASE/flux-1-dev.knot.manifest.json" || true)
        echo "$$manifest" | grep -q "flux-with-vae-text-encoders" && echo "[OK] full component manifest" || { echo "[FAIL] manifest missing full component policy"; exit 1; }
        admission=$(curl -sf "$$BASE/flux-1-dev.knot.admission.json" || true)
        echo "$$admission" | grep -q "shape-admitted" && echo "[OK] admission sidecar" || { echo "[FAIL] admission sidecar missing"; exit 1; }
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '600'
  logging: CLOUD_LOGGING_ONLY

timeout: '21600s'

[package]
name = "monster-guard"
version = "0.1.0"
edition = "2021"
description = "Admission + runtime capability enforcement for Moonshine plugins (macOS sandbox-exec)."

[[bin]]
name = "monster-guard"
path = "src/main.rs"

[dependencies]
libc = "0.2"
a0n-auth = { path = "../../auth/rust" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Standalone — not a member of any parent workspace.
[workspace]

# Video model KNOTs: smolvlm2-500m-video, qwen2-vl-7b
# smolvlm2 = SmolVLM2ForConditionalGeneration (video-capable VLM)
# qwen2-vl  = Qwen2VLForConditionalGeneration  (video+image VLM, LM at model.layers.*)

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: smolvlm2-500m-video
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[smolvlm2-video] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model HuggingFaceTB/SmolVLM2-500M-Video-Instruct \
          --output /workspace/smolvlm2-500m-video.knot \
          || echo "[warn] smolvlm2 failed -- skipping"
        ls -lh /workspace/smolvlm2-500m-video.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen2-vl-7b
    waitFor: ['smolvlm2-500m-video']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[qwen2-vl-7b] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2-VL-7B-Instruct \
          --output /workspace/qwen2-vl-7b.knot
        echo "[qwen2-vl-7b] done: $(ls -lh /workspace/qwen2-vl-7b.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['qwen2-vl-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file not present"; return 0; }
          echo "[upload] $file -> $key"
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key -- continuing"
        }

        upload_if_exists /workspace/smolvlm2-500m-video.knot  models/smolvlm2-500m-video.knot
        upload_if_exists /workspace/qwen2-vl-7b.knot          models/qwen2-vl-7b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in smolvlm2-500m-video.knot qwen2-vl-7b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

timeout: '14400s'

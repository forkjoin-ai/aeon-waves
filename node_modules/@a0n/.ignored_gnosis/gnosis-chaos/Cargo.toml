[package]
name = "gnosis-chaos"
version = "0.1.0"
edition = "2021"
description = "Parallel chaos swarm engine over Gnosis compile-time topologies"
license = "MPL-2.0"

[lib]
name = "gnosis_chaos"
path = "src/lib.rs"
# rlib for Rust consumers (gnosis-uring), cdylib for NAPI Node binding,
# staticlib retained in case downstream FFI wants a .a (harmless if unused).
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "chaos-swarm"
path = "src/bin/chaos-swarm.rs"

[[bin]]
name = "crackerjack-rs"
path = "src/bin/crackerjack-rs.rs"

[dependencies]
libc = "0.2"
gnosis-helix = { path = "../gnosis-helix" }
gnosis-frf = { path = "../gnosis-frf" }
distributed-inference = { path = "../distributed-inference", default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bitwise = { path = "../../bitwise" }
wgpu = "0.20"
pollster = "0.3"
bytemuck = { version = "1", features = ["derive", "min_const_generics"] }

[features]
default = []
napi = ["dep:napi", "dep:napi-derive"]

[dev-dependencies]
divan = "0.1"

[[bench]]
name = "swarm-cannon-p99"
harness = false

# NAPI zero-copy Node.js bindings. Gated behind `not(wasm32)` at the module
# level so wasm builds are unaffected.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
napi = { version = "2", features = ["napi9"], optional = true }
napi-derive = { version = "2", optional = true }
bytemuck = "1"

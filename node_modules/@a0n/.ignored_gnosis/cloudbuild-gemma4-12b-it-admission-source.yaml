# gemma4-12b-it admission gate using a freshly built paris-probe-rknot.
#
# Use this when the R2-hosted tools/paris-probe-rknot-linux-x86_64 binary may be
# stale relative to source. The no-source admission gate is intentionally small,
# but it failed on 2026-06-18 with the old Q6_K tied-lm-head NaN signature.
#
# Expected build context layout is the minimal open-source slice produced by:
#   open-source/gnosis/distributed-inference/scripts/submit-gemma4-12b-admission-cloud.sh
#
#   /workspace/bitwise
#   /workspace/gnosis/gnosis-frf
#   /workspace/gnosis/gnosis-helix
#   /workspace/gnosis/gnosis-http
#   /workspace/gnosis/gnosis-engine-core
#   /workspace/gnosis/rtl-bridge
#   /workspace/gnosis/distributed-inference

substitutions:
  _CRATE_DIR: 'gnosis/distributed-inference'
  _MODEL: 'gemma4-12b-it'
  _KNOT_URL: 'https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models/gemma4-12b-it.knot'
  # Chat-templated "What is the capital of France? Reply with only the city name."
  _TOKENS: '2,105,2364,107,3689,563,506,5279,529,7001,236881,24181,607,1186,506,3207,1463,236761,106,107,105,4368,107,100,45518,107,101'
  _EXPECTED: '50429'
  _REJECT: '27822'
  _TOP_K: '8'

steps:
  - name: 'python:3.11-slim'
    id: assert-build-context
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        for path in \
          /workspace/bitwise/Cargo.toml \
          /workspace/gnosis/gnosis-frf/Cargo.toml \
          /workspace/gnosis/gnosis-helix/Cargo.toml \
          /workspace/gnosis/gnosis-http/Cargo.toml \
          /workspace/gnosis/gnosis-engine-core/Cargo.toml \
          /workspace/gnosis/rtl-bridge/Cargo.toml \
          "/workspace/${_CRATE_DIR}/Cargo.toml"; do
          if [ ! -f "$${path}" ]; then
            echo "FAIL: missing $${path}"
            echo "Submit with distributed-inference/scripts/submit-gemma4-12b-admission-cloud.sh"
            exit 1
          fi
        done
        echo "assert-build-context: ok"
    timeout: '60s'

  - name: 'rust:1.86-slim'
    id: build-probe
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends pkg-config libssl-dev build-essential ca-certificates
        cd "/workspace/${_CRATE_DIR}"
        cargo build --release --bin paris-probe-rknot
        ls -lh target/release/paris-probe-rknot
    waitFor: ['assert-build-context']
    timeout: '1800s'

  - name: 'rust:1.86-slim'
    id: admit
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        cd "/workspace/${_CRATE_DIR}"
        export GNOSIS_LM_HEAD_FP32=1
        echo "[admit-source] model=${_MODEL}"
        echo "[admit-source] knot=${_KNOT_URL}"
        echo "[admit-source] tokens=${_TOKENS}"
        echo "[admit-source] gate 1/2: expect ${_EXPECTED} (Paris)"
        ./target/release/paris-probe-rknot \
          --dense "${_KNOT_URL}" \
          --dense-only \
          --tokens "${_TOKENS}" \
          --expected "${_EXPECTED}" \
          --top-k "${_TOP_K}" \
          || { echo "[REJECTED] ${_MODEL} FAILED expect gate (did not argmax ${_EXPECTED})"; exit 1; }
        echo "[admit-source] gate 1/2 PASS"

        echo "[admit-source] gate 2/2: reject ${_REJECT} (must NOT win)"
        if ./target/release/paris-probe-rknot \
          --dense "${_KNOT_URL}" \
          --dense-only \
          --tokens "${_TOKENS}" \
          --expected "${_REJECT}" \
          --top-k "${_TOP_K}"; then
          echo "[REJECTED] ${_MODEL} argmax'd reject token ${_REJECT} -- denied"
          exit 1
        fi
        echo "[admit-source] gate 2/2 PASS (reject token did not win)"
        echo "[ADMITTED] ${_MODEL} passes the source-built paris/monster-guard gate"
    waitFor: ['build-probe']
    timeout: '10800s'

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '12600s'

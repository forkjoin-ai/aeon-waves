# flagged) K=1 argmax proxy per damping value. v1 is synthetic on a 3584-dim
# pseudo-residual; real model wiring is follow-up. See
# BOWL_MESH_FALSIFIABILITY.md and Gnosis/BowlMeshRuntimeOracle.lean.
[[bin]]
name = "bowl-q-sweep"
path = "src/bin/bowl-q-sweep.rs"

# bowl-probe — real admitted-weight τ-bowl/JIT-dequant quality gate. Samples
# F16/F32/Q8_0 matrix rows from a dense .knot, reports cell filling, E8-vs-cubic
# residuals, energy admission, conformal thresholds, and the Lean proof spine.
[[bin]]
name = "bowl-probe"
path = "src/bin/bowl-probe.rs"

# ackermann-bench — runtime certification harness. Wraps a small library of
# hardcoded target functions, instruments their step counts, runs each through
# `ackermann_certificate::certify`, and emits JSON-lines for n ∈ {0..3} +
# structural-fallback verdicts for n ≥ 4. See ACKERMANN_CERTIFICATION_PROTOCOL.md
# and Gnosis/AckermannRuntimeOracle.lean.
[[bin]]
name = "ackermann-bench"
path = "src/bin/ackermann-bench.rs"

# standing-wave-pca — the final cheap-rank-reconstruction test. Calibrates
# a per-layer PCA basis from baseline activations, then runs single-boundary
# injection parity at the requested layers/coverage. If layer 10 fails at
# cov=0.50, no unsupervised linear rank-k residual scheme will work.
[[bin]]
name = "standing-wave-pca"
path = "src/bin/standing-wave-pca.rs"

# weight-svd-spectrum — measures per-layer SVD spectrum of a chosen weight
# tensor (ffn_down by default). Companion to standing-wave-pca: PCA on
# *activations* tested whether the residual stream is low-rank in some
# basis; this measures whether the *operator* (the layer's matmul) is
# low-rank in some basis. If σ_k+1/σ_1 cliffs sharply, the function lives
# on a low-rank manifold and weight-side compression (low-rank factorization)
# is a viable static-asset reduction.
[[bin]]
name = "weight-svd-spectrum"
path = "src/bin/weight-svd-spectrum.rs"

# weight-truncate-parity — A/B test for rank-k FFN-down truncation. Fits
# top-k SVD on a chosen layer's ffn.down, installs as a low-rank override
# in the truncated pipeline, runs the same prompt through baseline +
# truncated, reports top-1 / top-5 / KL / cosine + per-token wall-clock.
# Operator-side analog of standing-wave-parity.
[[bin]]
name = "weight-truncate-parity"
path = "src/bin/weight-truncate-parity.rs"

# weight-truncate-fit — offline fitter that produces a .lrfd sidecar
# (Low-Rank FFN Down) holding per-layer (a, b, k) factorizations of
# ffn.down. fat-station and other production binaries load the .lrfd
# at boot via read_ffn_down_lowrank to enable operator-side compression
# without paying the SVD-fit cost on every startup. Mirror of the PCA
# basis cache pattern (PCAB → standing_wave_pca, LRFD → weight-truncate).
[[bin]]
name = "weight-truncate-fit"
path = "src/bin/weight-truncate-fit.rs"

# weight-truncate-fit-kv — same shape as weight-truncate-fit but for the
# attention K and V projection matrices. Writes a .lrkv sidecar that
# fat-station picks up via read_attn_kv_lowrank → install_attn_k_lowrank
# / install_attn_v_lowrank. Targets the Cloudflare Worker 128 MiB cap
# (Gemma4-31B's KV cache is the documented OOM source).
[[bin]]
name = "weight-truncate-fit-kv"
path = "src/bin/weight-truncate-fit-kv.rs"

# weight-truncate-parity-kv — A/B parity test for rank-truncated W_k / W_v.
# The "Softmax Shield" hypothesis: attention is a softmax-weighted average
# over the cache, acting as a low-pass filter on K/V perturbations, so
# per-layer rank truncation here should be more parity-tolerant than the
# FFN-down case.
[[bin]]
name = "weight-truncate-parity-kv"
path = "src/bin/weight-truncate-parity-kv.rs"

# triple-surface-parity — the Endurance Gap test. Loads all three
# compression sidecars (.pca, .lrfd, .lrkv) into one pipeline, runs N
# tokens against baseline, reports per-token + summary parity. Tests
# whether the three surfaces compound destructively (each loses ~50%,
# combined loses everything) or synergistically (smoothing of one
# absorbs another's drift). Pass bar: cosine_avg ≥ 0.90 over the run.
[[bin]]
name = "triple-surface-parity"
path = "src/bin/triple-surface-parity.rs"

# spectral-atlas — per-layer Power Spectral Density measurement and
# power-law fit S(f) ∝ 1/f^α. Grounds the GnosticValley.lean
# conjectural noise-color classification in measurement: every layer
# gets an empirical α and a derived color (white|pink|brown|blue|violet).
# Output is a JSONL .psd.jsonl atlas that's the input to deriving
# K(M) (InformationCapacity) and the policy boundary set.
[[bin]]
name = "spectral-atlas"
path = "src/bin/spectral-atlas.rs"

# draft-and-verify — runtime instance of the candidate-set
# draft-and-verify protocol formalized in CompressionAsRetrocausalClosure.
# Loads .pca/.lrfd/.lrkv caches into a draft pipeline, runs side-by-side
# with full-precision baseline; on each token the draft emits top-K,
# verifier accepts if baseline argmax in top-K else rolls back.
# Reports F_eff, V_rate, net bandwidth saved, per-step wall-clock.
[[bin]]
name = "draft-and-verify"
path = "src/bin/draft-and-verify.rs"

# mesh-benchmark — loads a real .knot, runs forward passes, reports MEASURED
# per-layer standing wave coverage and routing speedup implied by it. Honest
# about what it does NOT measure (wall-clock end-to-end, within-layer compute).
[[bin]]
name = "mesh-benchmark"
path = "src/bin/mesh-benchmark.rs"

# zed-metrics-sink — aggregates per-layer compression metrics from BWMR
# binary or JSONL files into a per-layer summary. Auto-detects input format
# from leading 4 bytes.
[[bin]]
name = "zed-metrics-sink"
path = "src/bin/zed-metrics-sink.rs"

# gemma4-attn-chunk-smoke — minimal native mirror of the wasm /split-a
# handler (apps/distributed-inference-worker/src/index.ts:1885-1940).
# Drives Gemma4Pipeline::forward_range_attn_chunk + get_residual +
# get_batch_xb_residual against a residual loaded from disk and writes
# [batch_x | batch_xb] to disk so a one-shot cosine script can compare
# against a real /split-a wasm response. Closes the F-mesh-4
# numerical-parity gap between native kernel + wasm tri-split-a.
# Pure additive — does NOT modify any kernel or any other binary.
# See src/bin/gemma4-attn-chunk-smoke.rs.
[[bin]]
name = "gemma4-attn-chunk-smoke"
path = "src/bin/gemma4-attn-chunk-smoke.rs"

# phi3-pipeline-smoke — runs the whole Phi-3 inference pipeline as a
# native binary against a local .knot. Sibling to gemma4-pipeline-smoke
# and native-pipeline-smoke (Qwen2). Wave-23 ships the kernel + smoke
# binary scaffolding; the .knot itself is the outstanding artifact
# (encoder needs to emit fused tensor names — see
# docs/phi-3-lm-head-tokenizer-smoke-result.md for the gap doc).
[[bin]]
name = "phi3-pipeline-smoke"
path = "src/bin/phi3-pipeline-smoke.rs"

# profile-phi3-saturation — measures neuron saturation in Phi-3-mini FFN layers.
# Detects frozen/redundant neurons via low variance, zero gradients, and
# near-zero activation patterns. Produces CSV report with per-layer saturation
# metrics and estimated pruning speedup. Informs whether saturation-based
# pruning is worth engineering effort.
[[bin]]
name = "profile-phi3-saturation"
path = "src/bin/profile-phi3-saturation.rs"

# profile-saturation-bitmasks — next-gen saturation profiler for sparse inference
# Generates bitmasks (one bit per neuron) instead of CSV reports. Outputs:
#   1. saturation-maps.rs — ready-to-embed Rust code for .rknot encoder
#   2. saturation-manifest.json — go/no-go decision metadata
# Enables zero-cost runtime filtering: if saturation_mask[neuron_id] { skip; }
[[bin]]
name = "profile-saturation-bitmasks"
path = "src/bin/profile-saturation-bitmasks.rs"

# profile-saturation-all-models — multi-model saturation profiler for deployment
# Profiles saturation across Phi-3, Gemma4, Qwen, and Llama models. Takes --model flag
# and outputs model-specific saturation bitmasks ready for .rknot embedding.
# Usage: cargo run --release --bin profile-saturation-all-models -- --model phi3
[[bin]]
name = "profile-saturation-all-models"
path = "src/bin/profile-saturation-all-models.rs"

# encode-and-upload-rknots — embed saturation metadata in .rknot files and upload
# Takes saturation bitmaps from profiler, embeds in .rknot header, uploads to cloud.
# Supports S3 and Cloudflare R2 backends.
# Usage: cargo run --release --bin encode-and-upload-rknots -- --model phi3 --saturation-maps <path>
[[bin]]
name = "encode-and-upload-rknots"
path = "src/bin/encode-and-upload-rknots.rs"

# # smoke-test-saturation — validates saturation optimization pipeline end-to-end
# # Tests: bitmask determinism, O(1) lookup, fused kernel equivalence, multi-model compatibility
# # Usage: cargo run --release --bin smoke-test-saturation
# [[bin]]
# name = "smoke-test-saturation"
# path = "src/bin/smoke-test-saturation.rs"

# bench-saturation-e2e — end-to-end FFN optimization benchmark
# Measures actual speedup from fusion (A1) + saturation (A2) across all 4 models
# Compares: baseline vs. fused vs. saturation vs. combined optimizations
# Usage: cargo run --release --bin bench-saturation-e2e
[[bin]]
name = "bench-saturation-e2e"
path = "src/bin/bench-saturation-e2e.rs"

# algorithm-shapes-scanner — brute-force torus-knot (p, q) sweep that
# catalogs algorithm-shape primitives for the aeon FOIL scheduler. Emits
# JSON + markdown report + JS dict (drop-in for knot-viz.html KNOT_MOMENTS).
# Cites Lean witnesses from gnosis-math (TorusKnotChebyshevBracket, Wankel,
# DimensionalConfinement, KnotComplexityAsBuleCost). Pure additive bin.
[[bin]]
name = "algorithm-shapes-scanner"
path = "src/bin/algorithm-shapes-scanner.rs"

# train_amp_v2 — Phase B of the AmplituhedronAttentionV2 plan. Tiny
# 1-layer toy character-level next-token trainer that compares V1
# softmax attention against V2 amplituhedron + LearnedMix on a
# deterministic synthetic dataset, using numerical-gradient SGD (per-
# parameter central differences for the small mix/dual sets, SPSA for
# V/lm_head). Reports head-to-head perplexity and asserts the Lean
# `learned_mix_invariant` (MixingBlock asymmetric in q/k) holds across
# the entire training trajectory. NO autodiff, NO ML deps.
# See open-source/gnosis-math/Gnosis/AmplituhedronAttentionV2Architecture.lean.
[[bin]]
name = "train_amp_v2"
path = "src/bin/train_amp_v2.rs"

# Cross-target dependencies. Anything wasm-incompatible (memmap, file I/O,
# threads, sync HTTP, NAPI) lives in the target-gated table further below.
[dependencies]
gnosis-frf = { path = "../gnosis-frf" }
gnosis-http = { path = "../gnosis-http" }
gnosis-rtl-bridge = { path = "../rtl-bridge" }
bitwise = { path = "../../bitwise" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
bincode = "1.3.3"
bytemuck = { version = "1", features = ["derive", "min_const_generics"] }
rayon = "1"
flate2 = "1.0"
base64 = "0.21"
fastrand = "2"
bitvec = "1"
sha2 = "0.10"
clap = { version = "4", features = ["derive"] }

# Native-only deps. The loader's mmap + HTTP-Range backends, the worker thread
# pool, and the NAPI Node binding all assume an OS with files, threads, and
# blocking I/O — none of which exist on wasm32-unknown-unknown / CF Workers.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memmap2 = "0.9.0"
libc = "0.2"
tokio = { version = "1", features = ["full"] }
hound = "3.5"
# Magazine-loading: HTTP Range fetch from R2-backed knot URLs.
# ureq is sync-only (no tokio runtime), supports keepalive via Agent, supports
# rustls-only TLS so we don't drag in OpenSSL on every build host.
ureq = { version = "2", default-features = false, features = ["tls"] }
image = { version = "0.24", features = ["png", "webp", "jpeg"] }
chrono = "0.4"
lru = "0.12"
matrixmultiply = "0.3"  # GkqBackend lazy reconstruct: cache-blocked sgemm for U @ diag(σ) @ Vᵀ
parking_lot = "0.12"
crossbeam-channel = "0.5"
napi = { version = "2", features = ["napi9"], optional = true }
napi-derive = { version = "2", optional = true }
# tiny_http: synchronous, no-async-runtime HTTP server. Powers the local
# fat-station bin which must serve the layer-station wire contract over
# localhost without dragging in tokio/hyper.
tiny_http = "0.12"
# Monocular depth via ONNX Runtime (optional; native targets only).
ort = { version = "2.0.0-rc.12", optional = true, default-features = false, features = ["std"] }
rustfft = { version = "6.4", optional = true }
# GPU (cuBLAS) matmul backend for the FLUX/LTX hot path. Optional + native-only;
# enabled with `--features cuda` ONLY in the CUDA Docker build (Cloud Run L4),
# never on the macOS/CPU dev box (no CUDA toolkit there). `cuda-12000` pins the
# CUDA 12 ABI to match the L4 driver; `dynamic-linking` resolves libcuda/cublas
# at runtime from the Cloud Run GPU image so no toolkit is needed to *link* the
# Rust crate (the CUDA base image provides the libs). cuBLAS = a BLAS math lib,
# NOT paid AI / hosted inference.
cudarc = { version = "0.12", optional = true, default-features = false, features = ["cuda-12040", "cublas", "driver", "dynamic-linking", "std", "f16"] }
# f16 weight residency for the cuBLAS backend (7-8B models: f32 dequant blows
# the 24 GB L4; f16 halves it and GemmEx still accumulates in f32).
half = { version = "2.4", optional = true }

# Wasm-only deps. wasm-bindgen + js-sys give us the JS-callable surface; the
# raw wasm32 build (no wasm-bindgen) used to work because nothing inside the
# crate referenced these symbols. Now `src/wasm_bindings.rs` does.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { version = "0.2" }
js-sys = { version = "0.3" }
# serde_wasm_bindgen powers the buley_siphon / buley_route JS bindings
# (`src/wasm_bindings.rs` BULEY EQUILIBRIUM section) — they
# (de)serialize VacuumNode / MoonshineVector across the JS↔Rust
# boundary. Pinned to 0.6 to match the wasm-bindgen 0.2 series.
serde-wasm-bindgen = { version = "0.6", package = "serde-wasm-bindgen" }
# console_error_panic_hook routes Rust panics through console.error in
# the JS host. Without it, panics surface as `RuntimeError: unreachable`
# with no source line — useless for debugging the boot path on Workers
# where there's no other stderr to read.
console_error_panic_hook = { version = "0.1" }
# Dev-only: the jet-engine compressor cascade law (Gnosis.MathJetEngine.overallRatio_append).
# Used by the `foil_cascade` test module in src/gnosis_foil.rs to instrument the REAL FOIL
# scheduler as a compressor cascade and assert the append/product law on measured stage ratios.
# Production builds (lib/cdylib, all bins) are untouched — this is test-harness only.
[dev-dependencies]
gnosis-engine-core = { path = "../gnosis-engine-core" }

[features]
default = []
napi = ["dep:napi", "dep:napi-derive"]
# IQ → spectrogram waterfall frame producer (`iq-waterfall-frame` bin).
spectrum-waterfall = ["dep:rustfft"]
# Native-only ONNX Runtime depth (weights out-of-repo). See TOPOLOGY_IMAGING.md.
depth-onnx = ["dep:ort"]
# Marker feature for downstream wiring (host shim, glue crates). No-op today.
wasm = []
# RWKV-7 (SSM) JS-callable surface. Gates `wasm_bindings_ssm::WasmRwkv7Pipeline`
# so the default wasm build stays byte-identical to the live transformer
# artifact. Build the SSM wasm with `--features ssm-wasm`.
ssm-wasm = []
# GPU (cuBLAS) matmul backend for the FLUX/LTX Q8 hot path. Native-only; built
# ONLY in the CUDA Docker image for the Cloud Run L4 render service. When off
# (the default, incl. local CPU + wasm), the `math` CPU kernels are used. cuBLAS
# is a BLAS math library, not paid AI.
cuda = ["dep:cudarc", "dep:half"]
[profile.release]
opt-level = 3
codegen-units = 1
# `panic = "abort"` is the wasm32-unknown-unknown default and switching to
# `panic = "unwind"` is a NO-OP without the `+exception-handling` target
# feature (verified empirically — borrow flag still poisons after panic).
# Don't try to fix the borrow-flag-stick by toggling this; it does nothing.
# The right fix is to make every `&mut self` JS-exposed kernel method
# non-panicking — return `Result<()>` instead of unwinding through the
# wasm-bindgen epilogue. Tracking task: kill panic-driven control flow in
# `forward_range_*_chunk` family. Investigation:
# docs/pneuma/wasm-forward-bug-investigation.md.
panic = "abort"
lto = "thin"


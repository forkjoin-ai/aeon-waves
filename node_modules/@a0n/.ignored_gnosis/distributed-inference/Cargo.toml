# fat-station-uds: same kernel as fat-station, but the wire boundary is a
# Unix domain socket with a 4-byte length-prefixed framing. Cuts per-call
# overhead vs HTTP for local-host mesh inference. See
# docs/pneuma/local-mesh-uds.md for the wire format and perf numbers.
[[bin]]
name = "fat-station-uds"
path = "src/bin/fat-station-uds.rs"

# fat-station-flow: same kernel + UDS transport as fat-station-uds, but
# the wire format is the canonical aeon-flow 10-byte binary header
# (matches FlowCodec in open-source/aeon/src/flow/FlowCodec.ts and the
# /flow WebSocket handler in apps/distributed-inference-worker). Migrating
# the local mesh onto the same wire spec that workers and UDP transports
# already speak. See docs/pneuma/mesh-flow-unification.md.
[[bin]]
name = "fat-station-flow"
path = "src/bin/fat-station-flow.rs"

# fat-station-flow-udp: UDP datagram cousin of fat-station-flow. SAME
# aeon-flow 10-byte binary header, but no UDS 4-byte length prefix wrap
# (one datagram == one frame). Oversized payloads chunk across multiple
# datagrams using a FLAG_CHUNK bit + 4-byte chunk-index/total prefix so
# the largest legal residual (seq_len=8 × hidden=3584 × 4 ≈ 114 KiB) can
# transit reliably. Diversity-by-design partner to UDS: UDS for same-host


[package]
name = "distributed-inference"
version = "0.1.0"
edition = "2021"
description = "Parallel chaos swarm engine over Gnosis compile-time topologies"
license = "MPL-2.0"

[lints.clippy]
collapsible_else_if = "allow"
doc_lazy_continuation = "allow"
doc_overindented_list_items = "allow"
enum_variant_names = "allow"
explicit_counter_loop = "allow"
field_reassign_with_default = "allow"
format_in_format_args = "allow"
if_same_then_else = "allow"
large_enum_variant = "allow"
len_without_is_empty = "allow"
manual_clamp = "allow"
manual_memcpy = "allow"
match_like_matches_macro = "allow"
needless_range_loop = "allow"
nonminimal_bool = "allow"
print_literal = "allow"
ptr_arg = "allow"
single_match = "allow"
too_many_arguments = "allow"
type_complexity = "allow"
unnecessary_filter_map = "allow"
unusual_byte_groupings = "allow"
vec_init_then_push = "allow"

[lib]
name = "distributed_inference"
path = "src/lib.rs"
# rlib for Rust consumers (gnosis-uring), cdylib for NAPI Node binding,
# staticlib retained in case downstream FFI wants a .a (harmless if unused).
crate-type = ["rlib", "cdylib"]


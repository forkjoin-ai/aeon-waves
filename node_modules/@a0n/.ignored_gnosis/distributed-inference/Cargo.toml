# strided standing-wave subspace, packs Q/K/V/FFN blocks, writes the
# RKNOT_v2 file, and reports dense-baseline / actual-size / compression
# ratio / per-block timing / cascade-ratio prediction. Phase 2 will
# read a real dense .knot. See RKNOT_RUST_CONTRACTS.md Module 4.
[[bin]]
name = "encode-rknot"
path = "src/bin/encode-rknot.rs"

# probe-rknot — Phase 3 smoke loader. Loads a .rknot, decodes every
# Q/K/V/FFN block per layer, prints per-layer decode time + max abs
# value (NaN check) and a run summary (total decoded bytes, total
# decode time, mean / max / non-zero fraction across blocks). Phase 4
# placeholder line points at where the real "Paris" inference probe
# will land. See RKNOT_PHASE3_CONTRACTS.md Module 3.
[[bin]]
name = "probe-rknot"
path = "src/bin/probe-rknot.rs"

# verify-rknot — Phase 2 round-trip diagnostic. Re-decodes a .rknot
# against its original dense .knot and reports per-layer / per-block
# max abs err, mean abs err, and energy ratio restricted to the
# standing × standing subspace. Warns when energy_ratio < 0.95.
# See RKNOT_PHASE2_CONTRACTS.md Module 5.
[[bin]]
name = "verify-rknot"
path = "src/bin/verify-rknot.rs"


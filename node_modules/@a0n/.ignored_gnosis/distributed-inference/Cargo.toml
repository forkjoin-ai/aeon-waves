# Outputs comprehensive comparison table with recommendations for production deployment.
[[bin]]
name = "bench-phi3-lowrank"
path = "src/bin/bench-phi3-lowrank.rs"

# Adaptive compression benchmark — validates McNally Cliff atlas integration.

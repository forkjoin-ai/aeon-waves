[[bin]]
name = "native-pipeline-smoke"
path = "src/bin/native-pipeline-smoke.rs"

# parity-chunk-vs-single — kernel parity test: does forward_range_chunk
# produce identical residuals for tokens 4..7 when computed as one
# seq_len=8 call vs two seq_len=4 calls? Bisects the multi-chunk gibberish
# that pneuma-think → local fat-station mesh emits. NEW file, no prod
# source modified. See src/bin/parity-chunk-vs-single.rs.
[[bin]]
name = "parity-chunk-vs-single"
path = "src/bin/parity-chunk-vs-single.rs"

# parity-station-handoff — multi-station handoff parity test. The
# kernel-only chunk parity is proven by parity-chunk-vs-single; this
# binary asks whether the boundary between two INDEPENDENT pipeline
# instances (station 1 = layers 0..14, station 2 = layers 14..28) emits
# the same residual as the single-pipeline 0..28 path. Bisects the
# pneuma-think → mesh-llm gibberish at the inter-station seam.
[[bin]]
name = "parity-station-handoff"
path = "src/bin/parity-station-handoff.rs"

# residual-divergence-dump — per-layer dump of residuals on path A
# (single pipeline) vs path B (two pipelines, handoff at layer 14).
# Prints first-4 floats + cosine + max-abs delta at every layer boundary
# and reports the FIRST layer where A and B diverge so we know whether
# the bug lives in the kernel, the handoff transition, or downstream
# KV-cache bookkeeping in the second pipeline. See
# src/bin/residual-divergence-dump.rs.
[[bin]]
name = "residual-divergence-dump"
path = "src/bin/residual-divergence-dump.rs"

# parity-cobordism-merge — embedding parity test: does Σ embed_chunk_range over

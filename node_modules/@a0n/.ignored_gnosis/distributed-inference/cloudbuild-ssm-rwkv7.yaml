# Bakes the rwkv7-2.9b SSM knot (6,365,622,661 bytes, Q8) into the generic
# moonshine base image (mesh-v1) so the fat-station mmaps it from local disk
# (MmapBackend, demand-paged) instead of HTTP-Range streaming from R2 (~6 min).
# Reuses the generic Dockerfile.bake-knot pattern: download in a debian builder
# (Range + exact-size verify) and COPY into /models/<knot> of the base image.
# Output: a scale-to-zero-friendly SSM image whose cold start loads the knot
# from the baked image layer (tens of seconds) rather than re-downloading.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-rwkv7-2.9b-cpu'
      - '-f'
      - 'open-source/gnosis/distributed-inference/Dockerfile.bake-knot'
      - '--build-arg'
      - 'BASE_IMAGE=us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:mesh-v1'
      - '--build-arg'
      - 'KNOT_NAME=rwkv7-2.9b.knot'
      - '--build-arg'
      - 'KNOT_SIZE=6365622661'
      - 'open-source/gnosis/distributed-inference'
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-rwkv7-2.9b-cpu'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 80
timeout: '2400s'

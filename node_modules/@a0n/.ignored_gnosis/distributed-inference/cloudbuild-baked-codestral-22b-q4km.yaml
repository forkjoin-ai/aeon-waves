# Bakes the codestral-22b Q4_K_M knot (~13.3 GB) into the moonshine mesh image
# so the fat-station mmaps it from the image layer (MmapBackend, demand-paged)
# instead of HTTP-Range streaming into the tmpfs range cache. On Cloud Run
# /tmp is tmpfs — the range cache + raced full download counted the knot
# against the 32 GiB memory limit a second time, which is what OOM-killed the
# dense 22B child (exit 137, 2026-07-04). The supervisor's baked-knot
# preference (resolveKnotSource) picks up /models/<knot> automatically.
#
# Fire with the current mesh digest + exact knot size:
#   gcloud builds submit --project=neutral-418500 \
#     --config=open-source/gnosis/distributed-inference/cloudbuild-baked-codestral-22b-q4km.yaml \
#     --substitutions=_BASE_IMAGE=us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine@sha256:<DIGEST>,_KNOT_SIZE=<bytes> \
#     open-source/gnosis/distributed-inference
substitutions:
  _BASE_IMAGE: 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:mesh-v1'
  _KNOT_SIZE: '0'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-codestral-22b-q4km'
      - '-f'
      - 'Dockerfile.bake-knot'
      - '--build-arg'
      - 'BASE_IMAGE=${_BASE_IMAGE}'
      - '--build-arg'
      - 'KNOT_NAME=codestral-22b-q4km.knot'
      - '--build-arg'
      - 'KNOT_SIZE=${_KNOT_SIZE}'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-codestral-22b-q4km'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 120
  substitutionOption: ALLOW_LOOSE
timeout: '7200s'

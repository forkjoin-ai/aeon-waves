steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args: ['build','-t','us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:mesh-q3-v1','-f','Dockerfile.moonshine','.']
    id: 'build-mesh-fast'
    timeout: '5400s'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push','us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:mesh-q3-v1']
    waitFor: ['build-mesh-fast']
options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:mesh-q3-v1'
timeout: '6000s'

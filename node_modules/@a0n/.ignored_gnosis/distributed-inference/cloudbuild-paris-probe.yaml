# Same pipeline as repo-root `cloudbuild-llama-70b-paris-probe.yaml`, but the
# build context is a **minimal open-source slice** (not the whole monorepo):
#
#   open-source/bitwise                    — path dep of distributed-inference
#   open-source/gnosis/gnosis-frf          — path dep (../gnosis-frf)
#   open-source/gnosis/distributed-inference — crate root
#
# Submit via `./scripts/submit-paris-probe-cloud.sh` (rsyncs those trees into a
# temp dir, then `gcloud builds submit` — avoids 1.6 GiB monorepo tarballs).
# Optional: `PARIS_RUN_DENSE_BASELINE=1` adds step `paris-dense-baseline` (runs in
# parallel with the rknot probe after dense fetch + build; no extra .rknot fetch).
#
# Do **not** run `gcloud builds submit .` from `distributed-inference/` alone:
# Cargo path deps (`../../bitwise`, `../gnosis-frf`) will be missing. Step
# `assert-build-context` fails fast with a clear error if the archive is wrong.
#
# Workspace layout inside Cloud Build: `/workspace/gnosis/distributed-inference`
# is the crate root; `cargo` runs from there.

substitutions:
  # Crate root inside the uploaded archive (must match path deps in Cargo.toml).
  _CRATE_DIR: 'gnosis/distributed-inference'
  _MODEL_NAME: 'llama-70b'
  _DENSE_R2_KEY: 'models/llama-70b.knot'
  _RKNOT_R2_KEY: 'models/llama-70b.rknot'
  _R2_PROXY_URL: 'https://edgework.ai'
  _PROMPT_TOKENS: '128000,791,6864,315,9822,374'
  _EXPECTED_TOKEN_ID: ''
  _TOP_K: '8'
  _DENSE_ONLY_FLAG: ''
  _MAX_LAYERS_FLAG: ''
  # Set to `1` to run a second probe with `--dense-only` in parallel with the rknot
  # probe (same `_MAX_LAYERS_FLAG`, same prompt). Logs two ‖residual‖∞ tables in one
  # build for apples-to-apples vs the rknot-backed run — no extra .rknot fetch.
  _RUN_DENSE_BASELINE: '0'
  # Set to `1` to run verify-rknot against the fetched rknot+dense pair in the
  # same build. Use `_VERIFY_MAX_LAYERS` to keep turnaround tight while bisecting.
  _RUN_VERIFY_RKNOT: '0'
  _VERIFY_MAX_LAYERS: '8'
  _VERIFY_SCOPE: 'standing'
  # `1` = set KERNEL_DEBUG=1 for paris-probe-rknot (stderr: L3+L10 last-token residual sample).
  _PARIS_KERNEL_DEBUG: '0'
  # `1` = pass --dump-residuals to both probe steps so a paris-residual-diff
  # step can compute per-layer cosine sim + L2 + L∞ between the dense and rknot
  # last-token residual streams. Requires _RUN_DENSE_BASELINE=1 (otherwise no
  # dense dump exists to diff against).
  _DUMP_RESIDUALS: '0'
  # `1` = pass --fidelity-check to paris-probe so it prints per-layer rknot↔dense
  # block max/mean abs err for Q/K/V/FFN. Use with --max-layers=1 (or small N)
  # to bisect which block dominates the L0 baseline reconstruction error.
  _FIDELITY_CHECK: '0'

steps:
  - name: 'python:3.11-slim'
    id: assert-build-context
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        if [[ ! -f /workspace/bitwise/Cargo.toml ]]; then
          echo "FAIL: /workspace/bitwise/Cargo.toml missing."
          echo "This config expects an archive staged like submit-paris-probe-cloud.sh"
          echo "(bitwise/ + gnosis/gnosis-frf/ + gnosis/distributed-inference/)."
          echo "Or use repo-root cloudbuild-llama-70b-paris-probe.yaml instead."
          exit 1
        fi
        if [[ ! -f /workspace/gnosis/gnosis-frf/Cargo.toml ]]; then
          echo "FAIL: /workspace/gnosis/gnosis-frf/Cargo.toml missing."
          exit 1
        fi
        if [[ ! -f /workspace/gnosis/rtl-bridge/Cargo.toml ]]; then
          echo "FAIL: /workspace/gnosis/rtl-bridge/Cargo.toml missing."
          exit 1
        fi
        if [[ ! -f "/workspace/${_CRATE_DIR}/Cargo.toml" ]]; then
          echo "FAIL: /workspace/${_CRATE_DIR}/Cargo.toml missing."
          exit 1
        fi
        echo "assert-build-context: ok (path deps + crate root present)"
    timeout: '60s'
    waitFor: ['-']

  - name: 'rust:1.86-slim'
    id: build-probe
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends \
          pkg-config libssl-dev build-essential
        cd "/workspace/${_CRATE_DIR}"
        cargo build --release --bin paris-probe-rknot --bin verify-rknot
        ls -la target/release/paris-probe-rknot target/release/verify-rknot
    timeout: '1800s'
    waitFor: ['assert-build-context']

  - name: 'python:3.11-slim'
    id: fetch-dense-knot
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        SRC="${_R2_PROXY_URL}/api/v1/r2/distributed-inference/${_DENSE_R2_KEY}"
        DST="/workspace/${_CRATE_DIR}/${_MODEL_NAME}.knot"
        export SRC DST
        rm -f "$$DST"
        python3 -u <<'PYEOF'
        import os, sys, urllib.request
        src = os.environ['SRC']; dst = os.environ['DST']
        req = urllib.request.Request(src, headers={'User-Agent': 'cloudbuild/1.0', 'Range': 'bytes=0-0'})
        with urllib.request.urlopen(req, timeout=60) as resp:
            cr = resp.headers.get('content-range', '')
            total = int(cr.rsplit('/', 1)[1]) if '/' in cr else 0
        if total <= 0: print(f'FAIL: no content-range ({cr!r})'); sys.exit(1)
        print(f'expected {total} bytes', flush=True)
        CHUNK = 4 * 1024 * 1024 * 1024
        READ = 8 * 1024 * 1024
        written = 0
        with open(dst, 'wb') as out:
            while written < total:
                end = min(written + CHUNK - 1, total - 1)
                rng = f'bytes={written}-{end}'
                last = None
                for attempt in range(5):
                    try:
                        rq = urllib.request.Request(src, headers={'User-Agent': 'cloudbuild/1.0', 'Range': rng})
                        with urllib.request.urlopen(rq, timeout=900) as r:
                            while True:
                                b = r.read(READ)
                                if not b: break
                                out.write(b); written += len(b)
                        break
                    except Exception as e:
                        last = e
                        print(f'  range {rng} attempt {attempt+1}/5 failed: {e}', flush=True)
                else:
                    print(f'FAIL: range {rng} after 5 attempts: {last}'); sys.exit(1)
                print(f'  -> {written}/{total} ({100.0*written/total:.1f}%)', flush=True)
        if written != total: print(f'FAIL: wrote {written}, expected {total}'); sys.exit(1)
        print(f'ok ({written} bytes)')
        PYEOF
        MAGIC=$(head -c 4 "$$DST")
        if [ "$$MAGIC" != "KNOT" ]; then
          echo "[fetch-dense-knot] FAIL: bad magic at start: $$MAGIC"
          exit 1
        fi
    timeout: '3600s'
    waitFor: ['assert-build-context']

  - name: 'python:3.11-slim'
    id: fetch-rknot
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        SRC="${_R2_PROXY_URL}/api/v1/r2/distributed-inference/${_RKNOT_R2_KEY}"
        DST="/workspace/${_CRATE_DIR}/${_MODEL_NAME}.rknot"
        export SRC DST
        rm -f "$$DST"
        python3 -u <<'PYEOF'
        import os, sys, urllib.request
        src = os.environ['SRC']; dst = os.environ['DST']
        req = urllib.request.Request(src, headers={'User-Agent': 'cloudbuild/1.0', 'Range': 'bytes=0-0'})
        with urllib.request.urlopen(req, timeout=60) as resp:
            cr = resp.headers.get('content-range', '')
            total = int(cr.rsplit('/', 1)[1]) if '/' in cr else 0
        if total <= 0: print(f'FAIL: no content-range ({cr!r})'); sys.exit(1)
        print(f'expected {total} bytes', flush=True)
        CHUNK = 4 * 1024 * 1024 * 1024
        READ = 8 * 1024 * 1024
        written = 0
        with open(dst, 'wb') as out:
            while written < total:
                end = min(written + CHUNK - 1, total - 1)
                rng = f'bytes={written}-{end}'
                last = None
                for attempt in range(5):
                    try:
                        rq = urllib.request.Request(src, headers={'User-Agent': 'cloudbuild/1.0', 'Range': rng})
                        with urllib.request.urlopen(rq, timeout=900) as r:
                            while True:
                                b = r.read(READ)
                                if not b: break
                                out.write(b); written += len(b)
                        break
                    except Exception as e:
                        last = e
                        print(f'  range {rng} attempt {attempt+1}/5 failed: {e}', flush=True)
                else:
                    print(f'FAIL: range {rng} after 5 attempts: {last}'); sys.exit(1)
                print(f'  -> {written}/{total} ({100.0*written/total:.1f}%)', flush=True)
        if written != total: print(f'FAIL: wrote {written}, expected {total}'); sys.exit(1)
        print(f'ok ({written} bytes)')
        PYEOF
        HEX=$(head -c 6 "$$DST" | od -An -tx1 -N6 | tr -d ' \n')
        if [ "$$HEX" != "524b4e4f5402" ]; then
          echo "[fetch-rknot] FAIL: bad magic $$HEX"
          exit 1
        fi
    timeout: '3600s'
    waitFor: ['assert-build-context']

  - name: 'rust:1.86-slim'
    id: paris-probe
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        cd "/workspace/${_CRATE_DIR}"
        if [ "${_PARIS_KERNEL_DEBUG}" = "1" ]; then
          export KERNEL_DEBUG=1
          echo "=== KERNEL_DEBUG=1 (paris-probe L3+L10 residual samples) ==="
        fi
        EXPECTED_FLAG=""
        if [ -n "${_EXPECTED_TOKEN_ID}" ]; then
          EXPECTED_FLAG="--expected ${_EXPECTED_TOKEN_ID}"
        fi
        DUMP_FLAG=""
        if [ "${_DUMP_RESIDUALS}" = "1" ]; then
          DUMP_FLAG="--dump-residuals /workspace/${_CRATE_DIR}/residuals-rknot.bin"
          echo "=== --dump-residuals -> residuals-rknot.bin ==="
        fi
        FIDELITY_FLAG=""
        if [ "${_FIDELITY_CHECK}" = "1" ]; then
          FIDELITY_FLAG="--fidelity-check"
          echo "=== --fidelity-check (per-layer rknot vs dense block max/mean abs err) ==="
        fi
        echo "=== paris-probe (rknot + dense fallback) ==="
        ./target/release/paris-probe-rknot \
          --rknot "/workspace/${_CRATE_DIR}/${_MODEL_NAME}.rknot" \
          --dense "/workspace/${_CRATE_DIR}/${_MODEL_NAME}.knot" \
          --tokens '${_PROMPT_TOKENS}' \
          --top-k '${_TOP_K}' \
          ${_DENSE_ONLY_FLAG} \
          ${_MAX_LAYERS_FLAG} \
          $$DUMP_FLAG \
          $$FIDELITY_FLAG \
          $$EXPECTED_FLAG
    timeout: '5400s'
    waitFor: ['fetch-dense-knot', 'fetch-rknot', 'build-probe']

  # Optional dense-only forward on the same .knot + cap (no .rknot read). Runs in
  # parallel with `paris-probe` once `fetch-dense-knot` + `build-probe` finish.
  # `paris-verify-rknot` waits on `paris-probe` (not this step) to cap peak RAM.
  - name: 'rust:1.86-slim'
    id: paris-dense-baseline
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ "${_RUN_DENSE_BASELINE}" != "1" ]; then
          echo "[paris-dense-baseline] skip (set _RUN_DENSE_BASELINE=1 to enable)"
          exit 0
        fi
        cd "/workspace/${_CRATE_DIR}"
        EXPECTED_FLAG=""
        if [ -n "${_EXPECTED_TOKEN_ID}" ]; then
          EXPECTED_FLAG="--expected ${_EXPECTED_TOKEN_ID}"
        fi
        DUMP_FLAG=""
        if [ "${_DUMP_RESIDUALS}" = "1" ]; then
          DUMP_FLAG="--dump-residuals /workspace/${_CRATE_DIR}/residuals-dense.bin"
          echo "=== --dump-residuals -> residuals-dense.bin ==="
        fi
        echo "=== paris-dense-baseline (--dense-only) ==="
        ./target/release/paris-probe-rknot \
          --dense "/workspace/${_CRATE_DIR}/${_MODEL_NAME}.knot" \
          --tokens '${_PROMPT_TOKENS}' \
          --top-k '${_TOP_K}' \
          --dense-only \
          ${_MAX_LAYERS_FLAG} \
          $$DUMP_FLAG \
          $$EXPECTED_FLAG
    timeout: '5400s'
    waitFor: ['fetch-dense-knot', 'build-probe']

  # Optional: round-trip decode metrics from the same rknot key used by paris-probe.
  - name: 'rust:1.86-slim'
    id: paris-verify-rknot
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ "${_RUN_VERIFY_RKNOT}" != "1" ]; then
          echo "[paris-verify-rknot] skip (set _RUN_VERIFY_RKNOT=1 to enable)"
          exit 0
        fi
        cd "/workspace/${_CRATE_DIR}"
        echo "=== paris-verify-rknot (max_layers=${_VERIFY_MAX_LAYERS}) ==="
        ./target/release/verify-rknot \
          --rknot "/workspace/${_CRATE_DIR}/${_MODEL_NAME}.rknot" \
          --dense "/workspace/${_CRATE_DIR}/${_MODEL_NAME}.knot" \
          --max-layers "${_VERIFY_MAX_LAYERS}" \
          --scope "${_VERIFY_SCOPE}" \
          --allow-energy-warnings
    timeout: '5400s'
    # After paris-probe so we do not run two heavy Rust forwards (probe + full-scope
    # verify) at once on the same worker — precise .rknot (~26 GiB) + --scope full
    # OOM'd (exit 137) when verify ran parallel with paris-probe.
    waitFor: ['fetch-dense-knot', 'fetch-rknot', 'build-probe', 'paris-probe']

  # Optional: per-layer cosine sim + L2 + L∞ between the dense and rknot last-token
  # residual streams. Only runs when both probes dumped residual files (requires
  # _DUMP_RESIDUALS=1 AND _RUN_DENSE_BASELINE=1). Reads the binary layout written
  # by paris-probe-rknot --dump-residuals: [u32 num_layers][u32 hidden_dim][f32...].
  - name: 'python:3.11-slim'
    id: paris-residual-diff
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ "${_DUMP_RESIDUALS}" != "1" ] || [ "${_RUN_DENSE_BASELINE}" != "1" ]; then
          echo "[paris-residual-diff] skip (needs _DUMP_RESIDUALS=1 AND _RUN_DENSE_BASELINE=1)"
          exit 0
        fi
        RKNOT_DUMP="/workspace/${_CRATE_DIR}/residuals-rknot.bin"
        DENSE_DUMP="/workspace/${_CRATE_DIR}/residuals-dense.bin"
        if [ ! -f "$$RKNOT_DUMP" ] || [ ! -f "$$DENSE_DUMP" ]; then
          echo "[paris-residual-diff] FAIL: missing dump file(s)"
          ls -la "/workspace/${_CRATE_DIR}/" || true
          exit 1
        fi
        pip install --quiet --no-cache-dir numpy
        export RKNOT_DUMP DENSE_DUMP
        export ARTIFACT_OUT="/workspace/${_CRATE_DIR}/paris-residual-diff.json"
        export PROFILE_KEY="${_RKNOT_R2_KEY}"
        export MODEL_NAME="${_MODEL_NAME}"
        export PROMPT_TOKENS="${_PROMPT_TOKENS}"
        export BUILD_ID_FOR_ARTIFACT="${BUILD_ID:-unknown}"
        python3 -u <<'PYEOF'
        import json, os, struct, sys
        import numpy as np
        rknot = os.environ['RKNOT_DUMP']
        dense = os.environ['DENSE_DUMP']
        out_path = os.environ['ARTIFACT_OUT']
        profile = os.environ['PROFILE_KEY']
        model = os.environ['MODEL_NAME']
        prompt = os.environ['PROMPT_TOKENS']
        build_id = os.environ['BUILD_ID_FOR_ARTIFACT']

        def load(path):
            with open(path, 'rb') as f:
                hdr = f.read(8)
                num_layers, hidden_dim = struct.unpack('<II', hdr)
                expected = num_layers * hidden_dim * 4
                payload = f.read()
            if len(payload) < expected:
                print(f'WARN: {path} truncated: got {len(payload)} bytes, expected {expected}', flush=True)
                full_layers = len(payload) // (hidden_dim * 4)
                num_layers = full_layers
                payload = payload[: full_layers * hidden_dim * 4]
            arr = np.frombuffer(payload, dtype=np.float32).reshape(num_layers, hidden_dim)
            return num_layers, hidden_dim, arr

        nr, dr, R = load(rknot)
        nd, dd, D = load(dense)
        if dr != dd:
            print(f'FAIL: hidden_dim mismatch rknot={dr} dense={dd}', flush=True)
            sys.exit(1)
        n = min(nr, nd)
        if n <= 0:
            print('FAIL: zero comparable layers', flush=True)
            sys.exit(1)
        if nr != nd:
            print(f'WARN: layer count mismatch rknot={nr} dense={nd}; comparing first {n}', flush=True)

        print(f'── paris-residual-diff: {n} layers x {dr} dims ──')
        print(f'{"L":>3}  {"cos":>10}  {"||d-r||2":>14}  {"||d-r||inf":>14}  {"||d||inf":>10}  {"||r||inf":>10}')
        first_below_99 = None
        first_below_95 = None
        first_below_90 = None
        rows = []
        for i in range(n):
            r = R[i].astype(np.float64)
            d = D[i].astype(np.float64)
            dn = np.linalg.norm(d)
            rn = np.linalg.norm(r)
            cos = float(np.dot(d, r) / (dn * rn)) if dn > 0 and rn > 0 else float('nan')
            diff = d - r
            l2 = float(np.linalg.norm(diff))
            linf = float(np.max(np.abs(diff))) if diff.size else 0.0
            d_inf = float(np.max(np.abs(d))) if d.size else 0.0
            r_inf = float(np.max(np.abs(r))) if r.size else 0.0
            print(f'{i:>3}  {cos:>10.6f}  {l2:>14.4e}  {linf:>14.4e}  {d_inf:>10.4e}  {r_inf:>10.4e}')
            rows.append({
                'layer': i,
                'cos': cos,
                'l2': l2,
                'linf': linf,
                'd_inf': d_inf,
                'r_inf': r_inf,
            })
            if first_below_99 is None and cos < 0.99: first_below_99 = i
            if first_below_95 is None and cos < 0.95: first_below_95 = i
            if first_below_90 is None and cos < 0.90: first_below_90 = i
        print()
        print(f'first cos < 0.99: L{first_below_99}')
        print(f'first cos < 0.95: L{first_below_95}')
        print(f'first cos < 0.90: L{first_below_90}')

        # 5b operationalization: write a structured JSON artifact for cross-run
        # tooling. The upload-paris-diff step uploads this to GCS so the
        # compare-5b-results script can fetch + tabulate across builds.
        # Surface key cliff/end metrics in the summary block so a thin
        # downstream tool can render comparison without re-walking 80 rows.
        cliffs = []
        for i in range(1, len(rows)):
            jump = rows[i]['linf'] - rows[i-1]['linf']
            if jump > 5.0 and rows[i-1]['linf'] < 5.0:
                cliffs.append({'layer': i, 'from': rows[i-1]['linf'], 'to': rows[i]['linf'], 'jump': jump})
        artifact = {
            'schema': 'paris-residual-diff/v1',
            'build_id': build_id,
            'model': model,
            'profile': profile,
            'prompt_tokens': prompt,
            'num_layers': n,
            'hidden_dim': dr,
            'first_cos_below': {'0.99': first_below_99, '0.95': first_below_95, '0.90': first_below_90},
            'cliffs': cliffs,
            'l0': rows[0] if rows else None,
            'end': rows[-1] if rows else None,
            'rows': rows,
        }
        with open(out_path, 'w') as f:
            json.dump(artifact, f, indent=2)
        print()
        print(f'── 5b SUMMARY ──')
        print(f'profile={profile} layers={n} cliffs={len(cliffs)} (>5.0 jump): {[c["layer"] for c in cliffs]}')
        if rows:
            print(f'L0 cos={rows[0]["cos"]:.4f} ‖d-r‖∞={rows[0]["linf"]:.4e}   '
                  f'end cos={rows[-1]["cos"]:.4f} ‖d-r‖∞={rows[-1]["linf"]:.4e}   '
                  f'dense end ‖d‖∞={rows[-1]["d_inf"]:.4e}')
        print(f'── artifact written: {out_path} ──')
        PYEOF
    timeout: '600s'
    waitFor: ['paris-probe', 'paris-dense-baseline']

  # 5b operationalization: persist the JSON artifact to a known GCS prefix so the
  # compare-5b-results.sh script can fetch results across builds. Fires only when
  # paris-residual-diff produced an artifact (which itself requires
  # _DUMP_RESIDUALS=1 + _RUN_DENSE_BASELINE=1).
  - name: 'gcr.io/cloud-builders/gsutil'
    id: upload-paris-diff
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        ARTIFACT="/workspace/${_CRATE_DIR}/paris-residual-diff.json"
        if [ ! -f "$$ARTIFACT" ]; then
          echo "[upload-paris-diff] skip (no artifact at $$ARTIFACT)"
          exit 0
        fi
        # Sanitize profile key for filename: models/llama-70b-precise.rknot -> precise
        PROFILE_SLUG="$(echo '${_RKNOT_R2_KEY}' | sed -E 's|.*/${_MODEL_NAME}-?||; s|\.rknot$||; s|^$$|canonical|')"
        DEST="gs://${PROJECT_ID}_paris5b/${BUILD_ID}-${_MODEL_NAME}-$$PROFILE_SLUG.json"
        echo "[upload-paris-diff] uploading $$ARTIFACT -> $$DEST"
        gsutil cp "$$ARTIFACT" "$$DEST"
        # Also write a "latest" alias for the most-recent run on this profile.
        LATEST="gs://${PROJECT_ID}_paris5b/latest-${_MODEL_NAME}-$$PROFILE_SLUG.json"
        gsutil cp "$$ARTIFACT" "$$LATEST"
        echo "[upload-paris-diff] also wrote $$LATEST"
    timeout: '300s'
    waitFor: ['paris-residual-diff']

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: '14400s'

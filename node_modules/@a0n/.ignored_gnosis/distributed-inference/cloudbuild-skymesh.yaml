# Builds the skymesh-node image (fat-station + embed-agent + gen-agent, incl. the
# qwen35moe + gemma-E4B pipelines) on Cloud Build, off the local box. Context is
# open-source/ (Dockerfile path-deps into gnosis/ + bitwise/).
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/edge-workers/skymesh-node:pipelines1'
      - '-f'
      - 'open-source/gnosis/distributed-inference/Dockerfile.skymesh'
      - 'open-source/'
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/edge-workers/skymesh-node:pipelines1'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
timeout: '3000s'

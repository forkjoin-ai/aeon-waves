# Builds the sovereign nanopath-embed node (CPU). Context: open-source/ (path-deps gnosis/+bitwise/).
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/edge-workers/nanopath-embed:v1'
      - '-f'
      - 'gnosis/distributed-inference/Dockerfile.nanopath'
      - '.'
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/edge-workers/nanopath-embed:v1'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
timeout: '3000s'

[package]
name = "gnosis-engine-core"
version = "0.1.0"
edition = "2021"
description = "Jet-engine compressor cascade — shared runtime law (Gnosis.MathJetEngine.overallRatio_append)"
license = "MPL-2.0"

[lib]
name = "gnosis_engine_core"
path = "src/lib.rs"
# rlib for native Rust consumers (FOIL/distributed-inference, gnosis-uring).
crate-type = ["rlib"]

# ecballium — the squirting-cucumber entropy-pressurized binary launcher.
[[bin]]
name = "ecballium"
path = "src/bin/ecballium.rs"

# Zero dependencies — pure std, so it adds no summon/network surface to consumers.
[dependencies]

# Whisper family KNOTs: whisper-large-v3, whisper-small, distil-large-v3

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: whisper-large-v3
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[whisper-large-v3] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model openai/whisper-large-v3 \
          --output /workspace/whisper-large-v3.knot
        echo "[whisper-large-v3] done: $(ls -lh /workspace/whisper-large-v3.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: whisper-small
    waitFor: ['whisper-large-v3']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[whisper-small] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model openai/whisper-small \
          --output /workspace/whisper-small.knot
        echo "[whisper-small] done: $(ls -lh /workspace/whisper-small.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: distil-whisper
    waitFor: ['whisper-small']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[distil-whisper] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model distil-whisper/distil-large-v3 \
          --output /workspace/distil-whisper-large-v3.knot
        echo "[distil-whisper] done: $(ls -lh /workspace/distil-whisper-large-v3.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['distil-whisper']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/whisper-large-v3.knot        models/whisper-large-v3.knot
        upload_if_exists /workspace/whisper-small.knot            models/whisper-small.knot
        upload_if_exists /workspace/distil-whisper-large-v3.knot models/distil-whisper-large-v3.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in whisper-large-v3.knot whisper-small.knot distil-whisper-large-v3.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '10800s'

# Llama-3.3-70B-Instruct sketches + HCEM generation
#
# Usage:
#   gcloud builds submit \
#     --config=open-source/gnosis/cloudbuild-llama3-3-sketches-and-hcem.yaml \
#     --no-source --async
#
# Lands: models/llama3.3-70b-sketches.knot + models/llama3.3-70b-embed.hcem

steps:
  - name: 'python:3.11'
    id: generate-sketches
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install -q --no-cache-dir transformers safetensors numpy torch \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6"
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        export OMP_NUM_THREADS=1
        cd /workspace
        python3 open-source/gnosis/distributed-inference/generate-sketches.py \
          --model meta-llama/Llama-3.3-70B-Instruct \
          --output /workspace/llama3.3-70b-sketches.knot \
          --rank 32
        echo "[sketches] done: $(ls -lh /workspace/llama3.3-70b-sketches.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '28800s'

  - name: 'python:3.11'
    id: generate-hcem
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install -q --no-cache-dir transformers safetensors numpy torch \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6"
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        cd /workspace
        python3 open-source/gnosis/distributed-inference/make-columnar-embed.py \
          --model meta-llama/Llama-3.3-70B-Instruct \
          --output /workspace/llama3.3-70b-embed.hcem \
          --dtype bf16
        echo "[hcem] done: $(ls -lh /workspace/llama3.3-70b-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '14400s'

  - name: 'node:22-slim'
    id: upload-sketches
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        npm install -q -g pnpm@10
        pnpm install --no-frozen-lockfile -q
        export PROXY_BASE="https://edgework.ai/api/v1/r2/distributed-inference"
        export BEARER_TOKEN="$$R2_TOKEN"
        export PART_BYTES=$((8 * 1024 * 1024))
        export CONCURRENCY=6
        pnpm -w exec tsx scripts/upload-knot-via-mpu.ts \
          /workspace/llama3.3-70b-sketches.knot \
          models/llama3.3-70b-sketches.knot
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'node:22-slim'
    id: upload-hcem
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        cd /workspace
        npm install -q -g pnpm@10
        pnpm install --no-frozen-lockfile -q
        export PROXY_BASE="https://edgework.ai/api/v1/r2/distributed-inference"
        export BEARER_TOKEN="$$R2_TOKEN"
        export PART_BYTES=$((8 * 1024 * 1024))
        export CONCURRENCY=6
        pnpm -w exec tsx scripts/upload-knot-via-mpu.ts \
          /workspace/llama3.3-70b-embed.hcem \
          models/llama3.3-70b-embed.hcem
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify-range
    entrypoint: sh
    args:
      - '-c'
      - |
        for KEY in llama3.3-70b-sketches.knot llama3.3-70b-embed.hcem; do
          MAGIC=$(curl -sf -H "Range: bytes=0-3" \
            "https://edgework.ai/api/v1/r2/distributed-inference/models/$$KEY" | head -c 4)
          echo "[verify] $$KEY magic=$$MAGIC"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '400'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~8h (140GB download + SVD 70B + HCEM + upload)
timeout: '28800s'

[package]
name = "gg-walker-wasm"
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"
description = "Tier-C interpreter-embed GG walker: a wasm32 json-v1 runtime that executes the property-carried subset of GG orchestration topologies and traps fail-closed on everything else. Host lowering (tree-sitter) stays in gnosis-polyglot; this crate depends on serde/serde_json ONLY."

[lib]
name = "gg_walker_wasm"
path = "src/lib.rs"
# cdylib: the wasm32 artifact (`gg_walker_wasm.wasm`).
# rlib: lets the host emitter (gnosis-polyglot::aot_gg_embed) preflight-validate
# topologies and unit-test the walker natively.
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# panic = "abort" makes every walker decline a real wasm trap (`unreachable`),
# matching the betti-wasm/1 `decline_semantics: "trap"` contract. These profile
# settings apply when this crate is built standalone (its own workspace root,
# i.e. the `cargo build --target wasm32-unknown-unknown --release` walker
# build); when gnosis-polyglot consumes the rlib natively, the parent profile
# governs and errors surface as `Result` (wasm.rs is cfg'd out).
[profile.release]
panic = "abort"
opt-level = "z"
lto = true
strip = true

# Standalone — deliberately NOT a member of any parent workspace (same pattern
# as open-source/swerve). Keeps the wasm32 build hermetic.
[workspace]

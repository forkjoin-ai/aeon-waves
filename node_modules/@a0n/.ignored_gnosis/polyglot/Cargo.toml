[package]
name = "gnosis-polyglot"
version = "0.2.0"
edition = "2021"
description = "Universal bug detection via topological verification -- tree-sitter to GG topology compiler"
autobins = false

[[bin]]
name = "gnosis-polyglot"
path = "src/main.rs"

[[bin]]
name = "becky"
path = "src/becky_cli.rs"

[[bin]]
name = "gnexec"
path = "src/bin/gnexec.rs"

[[bin]]
name = "monster"
path = "src/bin/monster.rs"

[lib]
name = "gnosis_polyglot"
path = "src/lib.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
# Tier-C interpreter-embed walker (rlib side): aot_gg_embed preflights
# topologies through the walker's own static admission before packaging.
# serde/serde_json-only; the wasm32 cdylib of the same crate is the artifact.
gg-walker-wasm = { path = "gg-walker-wasm" }
distributed-inference = { path = "../distributed-inference" }
gnosis-helix = { path = "../gnosis-helix" }
bitwise = { path = "../../bitwise" }
gnot = { version = "0.1.0", path = "../../gnot" }
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.11"
toml = "0.8"
tree-sitter = "0.25"
# Stage 4 — real `fetch` for script-mode (`monster script.mjs`). Sync, no tokio
# runtime, rustls-only TLS (no OpenSSL on build hosts). Already in the dep graph
# via distributed-inference, so no new heavy compilation. Network stays OFF
# unless the program is run with `--allow-net` (or GNEXEC_ALLOW_NET=1).
ureq = { version = "2", default-features = false, features = ["tls"] }

# Phase 1 languages (hand-written extractors)
tree-sitter-typescript = "0.23"
tree-sitter-rust = "0.23"
tree-sitter-python = "0.23"
tree-sitter-go = "0.23"
tree-sitter-java = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-lean4 = "0.3.0"

# Phase 2 languages (declarative extractors)
tree-sitter-c = "0.23"
tree-sitter-cpp = "0.23"
tree-sitter-c-sharp = "0.23"
tree-sitter-ruby = "0.23"
tree-sitter-bash = "0.23"
tree-sitter-php = "0.23"
tree-sitter-scala = "0.23"
tree-sitter-haskell = "0.23"
tree-sitter-ocaml = "0.23"

# These may need specific version ranges
tree-sitter-kotlin-ng = "1.1"
tree-sitter-swift = "0.6"
tree-sitter-lua = "0.2"
tree-sitter-elixir = "0.3"
tree-sitter-zig = "1.1"

# Optional WebGPU host binding: a wgpu-backed `navigator.gpu` so scripts can run
# the aeon-3d WebGPU renderer headless (Metal here) for golden verification.
# OFF by default — build with `--features webgpu`. wgpu/naga is heavy, so the
# default `monster` build (shared) is completely unaffected.
wgpu = { version = "0.20", optional = true }
pollster = { version = "0.3", optional = true }
bytemuck = { version = "1", optional = true }

[features]
webgpu = ["dep:wgpu", "dep:pollster", "dep:bytemuck"]

# WASM AOT emission (aot_wasm.rs). wasm-encoder is pure Rust and tiny, so it is
# a regular dependency: the emitter must keep working when the compiler itself
# runs as wasm (the betti.gg wasm_emitter node has no toolchain to shell to).
[dependencies.wasm-encoder]
version = "0.244"

[dev-dependencies]
tempfile = "3.10"
# Structural validation of emitted modules in tests (never a runtime dep).
wasmparser = "0.244"

[[bin]]
name = "dump_java"
path = "src/bin/dump_java.rs"

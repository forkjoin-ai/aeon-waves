# Qwen2.5-72B-Instruct full dense KNOT encoding
#
# Usage (from monorepo root):
#   gcloud builds submit \
#     --config=open-source/gnosis/cloudbuild-qwen2-5-72b-knot.yaml \
#     --async
#
# Lands: models/qwen2.5-72b-instruct.knot (~72GB)
# Admission: paris-probe-rknot --dense <R2 URL> --dense-only --tokens 785,6722,315,9625,374 --expected 12095

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: encode
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        export OMP_NUM_THREADS=1
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[encode] starting qwen2.5-72b-instruct..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2.5-72B-Instruct \
          --output /workspace/qwen2.5-72b-instruct.knot
        echo "[encode] done: $(ls -lh /workspace/qwen2.5-72b-instruct.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '43200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['encode']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework.ai/api/v1/r2/distributed-inference
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/qwen2.5-72b-instruct.knot \
          models/qwen2.5-72b-instruct.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '7200s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework.ai/api/v1/r2/distributed-inference/models
        magic=$(curl -sf -H "Range: bytes=0-3" "$$BASE/qwen2.5-72b-instruct.knot" | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] qwen2.5-72b-instruct.knot" || echo "[WARN] $magic"
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '500'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~8h (144GB download + encode 72B + upload)
timeout: '50400s'

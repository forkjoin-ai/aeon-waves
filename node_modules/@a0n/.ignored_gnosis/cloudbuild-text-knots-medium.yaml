# Medium text model KNOTs: Qwen3-4B, Qwen3-8B, Qwen2.5-7B, Llama-3.2-3B, Mistral-7B

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: llama-3.2-3b
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model meta-llama/Llama-3.2-3B-Instruct \
          --output /workspace/llama-3.2-3b.knot \
          || echo "[warn] llama-3.2-3b failed"
        ls -lh /workspace/llama-3.2-3b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen3-4b
    waitFor: ['llama-3.2-3b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen3-4B \
          --output /workspace/qwen3-4b.knot \
          || echo "[warn] qwen3-4b failed"
        ls -lh /workspace/qwen3-4b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen2.5-7b
    waitFor: ['qwen3-4b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2.5-7B-Instruct \
          --output /workspace/qwen2.5-7b.knot \
          || echo "[warn] qwen2.5-7b failed"
        ls -lh /workspace/qwen2.5-7b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen3-8b
    waitFor: ['qwen2.5-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen3-8B \
          --output /workspace/qwen3-8b.knot \
          || echo "[warn] qwen3-8b failed"
        ls -lh /workspace/qwen3-8b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: mistral-7b
    waitFor: ['qwen3-8b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model mistralai/Mistral-7B-Instruct-v0.3 \
          --output /workspace/mistral-7b.knot \
          || echo "[warn] mistral-7b failed"
        ls -lh /workspace/mistral-7b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['mistral-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/llama-3.2-3b.knot  models/llama-3.2-3b.knot
        upload_if_exists /workspace/qwen3-4b.knot       models/qwen3-4b.knot
        upload_if_exists /workspace/qwen2.5-7b.knot     models/qwen2.5-7b.knot
        upload_if_exists /workspace/qwen3-8b.knot       models/qwen3-8b.knot
        upload_if_exists /workspace/mistral-7b.knot     models/mistral-7b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in llama-3.2-3b.knot qwen3-4b.knot qwen2.5-7b.knot qwen3-8b.knot mistral-7b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

timeout: '21600s'

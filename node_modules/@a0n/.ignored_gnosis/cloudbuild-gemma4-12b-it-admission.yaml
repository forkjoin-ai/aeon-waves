# gemma4-12b-it admission gate — monster-guard-equivalent on Cloud Build.
#
# "Admitted" = the monster-guard quality gate passes. monster-guard verifies a
# qspec by enforcing BOTH halves of the gate:
#   1. expect : the probe argmax == expect_token (50429 "Paris")
#   2. reject : the probe argmax != reject_token (27822 "London") — a fixed-output / phoney
#               knot that always emits the same token must be refused.
# This config reproduces that two-sided check using the published
# `paris-probe-rknot` binary (no monster-guard linux artifact is published at
# the R2 tools path, so we drive its expect/reject semantics directly). The
# canonical local equivalent is:
#   monster-guard qspec verify monster-swarm/qspecs/gemma4-12b-it.qspec.json
#
# Run AFTER cloudbuild-gemma4-12b-it-to-knot.yaml lands the knot at R2:
#   gcloud builds submit --no-source --async \
#     --config=open-source/gnosis/cloudbuild-gemma4-12b-it-admission.yaml
#
# Mirrors qspecs/gemma4-12b-it.qspec.json: chat-template tokens, expect 50429,
# reject 27822,
# env GNOSIS_LM_HEAD_FP32=1.

substitutions:
  _MODEL: gemma4-12b-it
  # Chat-templated "What is the capital of France? Reply with only the city
  # name." — gemma-4-12b-it is a thinking/instruct model and does NOT answer
  # ' Paris' to the bare prompt (verified vs real HF). Greedy first token = 50429
  # 'Paris'. reject 27822 'London'. See qspecs/gemma4-12b-it.qspec.json.
  _TOKENS: '2,105,2364,107,3689,563,506,5279,529,7001,236881,24181,607,1186,506,3207,1463,236761,106,107,105,4368,107,100,45518,107,101'
  _EXPECTED: '50429'
  _REJECT: '27822'
  _TOP_K: '8'
  _ENV_FLAGS: 'GNOSIS_LM_HEAD_FP32=1'

steps:
  - name: 'ubuntu:22.04'
    id: admit
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq curl ca-certificates

        # workers.dev r2-proxy host — `edgework.ai` custom domain does not
        # resolve from Cloud Build; this is the reachable canonical host.
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        MODEL="${_MODEL}"
        TOKENS="${_TOKENS}"
        EXPECTED="${_EXPECTED}"
        REJECT="${_REJECT}"
        TOP_K="${_TOP_K}"
        ENV_FLAGS="${_ENV_FLAGS}"
        KNOT_URL="$${BASE}/models/$${MODEL}.knot"

        echo "[admit] downloading paris-probe-rknot..."
        # --retry guards against transient edgework.ai DNS/connect hiccups on
        # Cloud Build workers (same class of failure the knot upload retries).
        curl -fL --retry 6 --retry-connrefused --retry-all-errors --retry-delay 10 \
          "$${BASE}/tools/paris-probe-rknot-linux-x86_64" -o /usr/local/bin/paris-probe-rknot
        chmod +x /usr/local/bin/paris-probe-rknot
        echo "[admit] binary ready ($(du -sh /usr/local/bin/paris-probe-rknot | cut -f1))"

        echo "[admit] model=$${MODEL} tokens=$${TOKENS} expect=$${EXPECTED} reject=$${REJECT}"
        echo "[admit] knot=$${KNOT_URL}"

        if [ -n "$${ENV_FLAGS}" ]; then
          export $${ENV_FLAGS}
        fi

        # Gate 1 — EXPECT: argmax must equal the expected token.
        echo "[admit] gate 1/2: expect $${EXPECTED} (Paris)"
        paris-probe-rknot \
          --dense "$${KNOT_URL}" \
          --dense-only \
          --tokens "$${TOKENS}" \
          --expected "$${EXPECTED}" \
          --top-k "$${TOP_K}" \
          || { echo "[REJECTED] $${MODEL} FAILED expect gate (did not argmax $${EXPECTED})"; exit 1; }
        echo "[admit] gate 1/2 PASS"

        # Gate 2 — REJECT (negative control): argmax must NOT equal the reject
        # token. A phoney/fixed-output knot that emits $${REJECT} here is refused.
        # We invert the exit code: the probe asserting --expected $${REJECT} must
        # FAIL for the model to be admitted.
        echo "[admit] gate 2/2: reject $${REJECT} (must NOT win)"
        if paris-probe-rknot \
          --dense "$${KNOT_URL}" \
          --dense-only \
          --tokens "$${TOKENS}" \
          --expected "$${REJECT}" \
          --top-k "$${TOP_K}"; then
          echo "[REJECTED] $${MODEL} argmax'd the reject token $${REJECT} — phoney/degenerate, DENIED"
          exit 1
        fi
        echo "[admit] gate 2/2 PASS (reject token did not win)"

        echo "[ADMITTED] $${MODEL} passes the two-sided paris/monster-guard gate"
    timeout: '10800s'

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~3h (knot load over HTTP + 48-layer forward pass, run twice)
timeout: '10800s'

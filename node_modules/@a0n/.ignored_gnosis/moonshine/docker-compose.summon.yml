# Docker Compose for monorepo builds with a0 summon protocol
# Usage:
#   docker-compose -f docker-compose.summon.yml up
#   docker-compose -f docker-compose.summon.yml run builder pnpm install

version: '3.9'

services:
  # Shared volume for .a0 cache (persists across containers)
  volumes:
    a0-cache:
      driver: local

  # Builder container: full build environment
  builder:
    build:
      context: .
      dockerfile: Dockerfile.summon
      target: builder
    image: gnosis-summon-builder:latest
    container_name: gnosis-builder
    volumes:
      - ./:/workspace
      - a0-cache:/home/builder/.a0
    environment:
      - A0_FORGE_URL=https://registry.forgo.cloud
      - A0_PREFETCH_ENABLED=1
      - A0_WORKERS=4 # More aggressive in containers
      - A0_VERBOSE=1
      - NODE_OPTIONS=--max-old-space-size=4096
    working_dir: /workspace
    command: >
      bash -c "
        echo 'Installing dependencies with a0 summon...' &&
        pnpm install &&
        echo 'Building projects...' &&
        pnpm run build
      "
    networks:
      - gnosis-net

  # Test container: runs tests against built artifacts
  test:
    build:
      context: .
      dockerfile: Dockerfile.summon
      target: builder
    image: gnosis-summon-builder:latest
    container_name: gnosis-test
    depends_on:
      - builder
    volumes:
      - ./:/workspace
      - a0-cache:/home/builder/.a0
    environment:
      - A0_CACHE_DIR=/home/builder/.a0
      - NODE_OPTIONS=--max-old-space-size=2048
    working_dir: /workspace
    command: pnpm test
    networks:
      - gnosis-net

  # Dev container: interactive development environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile.summon
      target: builder
    image: gnosis-summon-builder:latest
    container_name: gnosis-dev
    volumes:
      - ./:/workspace
      - a0-cache:/home/builder/.a0
    environment:
      - A0_FORGE_URL=https://registry.forgo.cloud
      - A0_PREFETCH_ENABLED=1
      - A0_WORKERS=4
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks:
      - gnosis-net

networks:
  gnosis-net:
    driver: bridge

volumes:
  a0-cache:
    driver: local

# Quick commands:
#
# Build everything:
#   docker-compose -f docker-compose.summon.yml run builder pnpm build
#
# Run tests:
#   docker-compose -f docker-compose.summon.yml run test
#
# Interactive dev:
#   docker-compose -f docker-compose.summon.yml run dev bash
#
# Check cache:
#   docker-compose -f docker-compose.summon.yml exec builder du -sh /home/builder/.a0
#
# Clean cache:
#   docker volume rm gnosis-summon-builder_a0-cache

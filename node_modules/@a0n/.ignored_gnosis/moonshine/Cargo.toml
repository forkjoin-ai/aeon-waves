[package]
name = "moonshine"
version = "0.1.0"
edition = "2021"
description = "Moonshine (Monster On Shell In Engine) — Bash/zsh replacement based on the fork/race/fold (FRF) paradigm."

[[bin]]
name = "moonshine"
path = "src/main.rs"

# `skychat` is admitted into the moonshine shell as its OWN sovereign binary (resolved from
# .bin/skychat), not a subcommand of the moonshine binary.
[[bin]]
name = "skychat"
path = "src/bin/skychat.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
rustyline = { version = "15.0", features = ["derive"] }
tree-sitter = "0.25"
tree-sitter-bash = "0.23"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
tokio = { version = "1.41", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
futures = "0.3"
shlex = "1.3"
libc = "0.2"
gnosis-polyglot = { path = "../polyglot" }
gnosis-frf = { path = "../gnosis-frf" }
gnosis-antiqueue = { path = "../gnosis-antiqueue" }
gnot = { version = "0.1.0", path = "../../gnot" }
# First-class cache-key teleport admission: the shared primitive
# (protocol69 envelope validation + amplituhedron geodesicLength:0 replay).
distributed-inference = { path = "../distributed-inference" }
# The unified sovereign runner — moonshine is the front door: `moonshine foo.iso`
# boots it, `moonshine app.ts` runs FOIL, `run`/`boot` route any target.
vcpu = { path = "../../vcpu", features = ["runner"] }
async-trait = "0.1"
home = "0.5.12"
base64 = "0.22.1"
sha2 = "0.11.0"
hmac = "0.13.0"
chrono = "0.4.44"
hex = "0.4.3"
rand = "0.8"
which = "6.0"
once_cell = "1.19"
regex = "1.10"
# skychat TUI: terminal UI + async WebSocket client (sovereign rustls TLS, no openssl)
ratatui = "0.29"
crossterm = "0.28"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }

[dev-dependencies]
tempfile = "3.10"
assert_cmd = "2.0"
predicates = "3.1"

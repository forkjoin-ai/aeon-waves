name: Gnosis CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck isolated package
        run: pnpm exec tsc -p tsconfig.typecheck.json --noEmit

      - name: Generate formal and complexity reports
        run: |
          set -euo pipefail
          mkdir -p reports

          for gg_file in betti.gg transformer.gg ai_hello.gg example.gg; do
            base_name="${gg_file%.gg}"
            if ! node ./bin/gnosis.js lint "${gg_file}" --json > "reports/${base_name}.gg.json"; then
              echo "Gnosis lint reported findings for ${gg_file}; preserving JSON report."
            fi
            if ! node ./bin/gnosis.js lint "${gg_file}" --sarif > "reports/${base_name}.gg.sarif"; then
              echo "Gnosis lint reported findings for ${gg_file}; preserving SARIF report."
            fi
          done

          if ! node ./bin/gnosis.js analyze src --json > reports/typescript.json; then
            echo "Gnosis analysis reported findings for src; preserving JSON report."
          fi
          if ! node ./bin/gnosis.js analyze src --sarif > reports/typescript.sarif; then
            echo "Gnosis analysis reported findings for src; preserving SARIF report."
          fi

          node - reports/*.json <<'NODE'
          const fs = require("fs");
          let failed = false;
          for (const file of process.argv.slice(2)) {
            let data;
            try {
              data = JSON.parse(fs.readFileSync(file, "utf8"));
            } catch (error) {
              console.error(`Malformed report ${file}: ${error.message}`);
              failed = true;
              continue;
            }
            const diagnostics = data.compiler?.diagnostics ?? [];
            const diagnosticErrors = diagnostics.filter((d) => d.severity === "error");
            const capabilityErrors = (data.capabilities?.issues ?? []).filter((i) => i.severity === "error");
            if (diagnosticErrors.length > 0 || capabilityErrors.length > 0) {
              console.error(JSON.stringify({ file, diagnosticErrors, capabilityErrors }, null, 2));
              failed = true;
            }
          }
          if (failed) process.exit(1);
          NODE

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports

      - name: Upload JSON and SARIF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnosis-analysis-reports
          path: reports/

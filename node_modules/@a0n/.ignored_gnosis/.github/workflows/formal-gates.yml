name: Formal Gates

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: formal-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  formal-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect formal artifacts
        id: detect
        run: |
          set -euo pipefail
          FORMAL_FILES="${RUNNER_TEMP}/formal-files.txt"
          GG_FILES="${RUNNER_TEMP}/gg-files.txt"
          TLA_FILES="${RUNNER_TEMP}/tla-files.txt"
          CFG_FILES="${RUNNER_TEMP}/cfg-files.txt"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > "${FORMAL_FILES}"
          else
            git ls-files > "${FORMAL_FILES}"
          fi

          grep -E '\.(gg|mgg)$' "${FORMAL_FILES}" > "${GG_FILES}" || true
          grep -E '\.tla$' "${FORMAL_FILES}" > "${TLA_FILES}" || true
          grep -E '\.cfg$' "${FORMAL_FILES}" > "${CFG_FILES}" || true
          grep -E '\.(lean|lean4)$' "${FORMAL_FILES}" > "${RUNNER_TEMP}/lean-files.txt" || true

          gg_count=$(wc -l < "${GG_FILES}" | tr -d ' ')
          tla_count=$(wc -l < "${TLA_FILES}" | tr -d ' ')
          cfg_count=$(wc -l < "${CFG_FILES}" | tr -d ' ')
          lean_count=$(wc -l < "${RUNNER_TEMP}/lean-files.txt" | tr -d ' ')
          has_gg=false
          has_tla=false
          has_cfg=false
          has_lean=false
          has_formal=false
          needs_lean=false
          needs_java=false
          has_package_json=false
          if [ "$gg_count" -gt 0 ]; then has_gg=true; fi
          if [ "$tla_count" -gt 0 ]; then has_tla=true; fi
          if [ "$cfg_count" -gt 0 ]; then has_cfg=true; fi
          if [ "$lean_count" -gt 0 ]; then has_lean=true; fi
          if [ "$gg_count" -gt 0 ] || [ "$tla_count" -gt 0 ] || [ "$cfg_count" -gt 0 ] || [ "$lean_count" -gt 0 ]; then has_formal=true; fi
          if [ "$lean_count" -gt 0 ]; then needs_lean=true; fi
          if [ "$tla_count" -gt 0 ] || [ "$cfg_count" -gt 0 ]; then needs_java=true; fi
          if [ -f package.json ]; then has_package_json=true; fi
          echo "has_formal=${has_formal}" >> "$GITHUB_OUTPUT"
          echo "has_gg=${has_gg}" >> "$GITHUB_OUTPUT"
          echo "has_tla=${has_tla}" >> "$GITHUB_OUTPUT"
          echo "has_cfg=${has_cfg}" >> "$GITHUB_OUTPUT"
          echo "has_lean=${has_lean}" >> "$GITHUB_OUTPUT"
          echo "needs_lean=${needs_lean}" >> "$GITHUB_OUTPUT"
          echo "needs_java=${needs_java}" >> "$GITHUB_OUTPUT"
          echo "has_package_json=${has_package_json}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        if: steps.detect.outputs.has_gg == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        if: steps.detect.outputs.has_gg == 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.detect.outputs.has_gg == 'true' && steps.detect.outputs.has_package_json == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Lean toolchain
        if: steps.detect.outputs.needs_lean == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Set up Java
        if: steps.detect.outputs.needs_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Betty report gate for GG
        if: steps.detect.outputs.has_gg == 'true'
        run: |
          set -euo pipefail
          JSON_OUT="${RUNNER_TEMP}/gnosis-artifacts/json"
          mkdir -p "${JSON_OUT}"

          if [ -f ./bin/gnosis.js ]; then
            GNOSIS_CMD=(node ./bin/gnosis.js)
          elif [ -x ./bin/gnosis ]; then
            GNOSIS_CMD=(./bin/gnosis)
          elif [ -x ./node_modules/.bin/gnosis ]; then
            GNOSIS_CMD=(./node_modules/.bin/gnosis)
          else
            echo "Gnosis CLI not found. Install @a0n/gnosis or provide ./bin/gnosis.js." >&2
            exit 1
          fi

          mapfile -t GG_FILES < "${RUNNER_TEMP}/gg-files.txt"
          if [ ${#GG_FILES[@]} -eq 0 ]; then
            echo "No .gg/.mgg files found; skipping Betty strict lint."
            exit 0
          fi

          for file in "${GG_FILES[@]}"; do
            echo "Betty report gate: ${file}"
            safe_name="${file//\//__}"
            if ! result=$("${GNOSIS_CMD[@]}" lint "$file" --target node --json); then
              echo "Gnosis lint reported advisory findings for ${file}; preserving JSON report."
            fi
            echo "$result" > "${JSON_OUT}/${safe_name}.json"
            if ! "${GNOSIS_CMD[@]}" lint "$file" --target node --sarif > "${JSON_OUT}/${safe_name}.sarif"; then
              echo "Gnosis lint reported advisory findings for ${file}; preserving SARIF report."
            fi
            echo "$result" | node -e '
              const fs = require("fs");
              const data = JSON.parse(fs.readFileSync(0, "utf8"));
              const diag = (data.compiler?.diagnostics ?? []);
              const cap = (data.capabilities?.issues ?? []);
              const diagnosticErrors = diag.filter((d) => d.severity === "error");
              const capabilityErrors = cap.filter((i) => i.severity === "error");
              if (diagnosticErrors.length > 0 || capabilityErrors.length > 0) {
                console.error(JSON.stringify({ file: data.filePath, diagnosticErrors, capabilityErrors }, null, 2));
                process.exit(1);
              }
            '
          done

      - name: Upload Gnosis artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gnosis-artifacts
          path: ${{ runner.temp }}/gnosis-artifacts

      - name: TLC check all TLA specs
        if: steps.detect.outputs.needs_java == 'true'
        run: |
          set -euo pipefail
          LOG_DIR="${RUNNER_TEMP}/tlc-logs"
          mkdir -p "${LOG_DIR}"
          mapfile -t TLA_FILES < "${RUNNER_TEMP}/tla-files.txt"
          mapfile -t CFG_FILES < "${RUNNER_TEMP}/cfg-files.txt"
          for tla in "${TLA_FILES[@]}"; do
            cfg="${tla%.tla}.cfg"
            if [ ! -f "$cfg" ]; then
              echo "Missing TLC config for ${tla}: expected ${cfg}" >&2
              exit 1
            fi
          done
          for cfg in "${CFG_FILES[@]}"; do
            tla="${cfg%.cfg}.tla"
            if [ ! -f "$tla" ]; then
              echo "Missing TLA module for ${cfg}: expected ${tla}" >&2
              exit 1
            fi
          done

          TOOLS_DIR="${RUNNER_TEMP}/tla-tools"
          JAR_PATH="${TOOLS_DIR}/tla2tools.jar"
          TLA_VERSION="v1.8.0"
          TLA_URL="https://github.com/tlaplus/tlaplus/releases/download/${TLA_VERSION}/tla2tools.jar"
          mkdir -p "${TOOLS_DIR}"
          if [ ! -f "${JAR_PATH}" ]; then
            curl -fsSL "${TLA_URL}" -o "${JAR_PATH}"
          fi

          for cfg in "${CFG_FILES[@]}"; do
            tla="${cfg%.cfg}.tla"
            base_name=$(basename "${tla}" .tla)
            echo "Running TLC for ${tla}"
            java -XX:+UseSerialGC -cp "${JAR_PATH}" tlc2.TLC \
              -cleanup \
              -deadlock \
              -config "${cfg}" \
              "${tla}" | tee "${LOG_DIR}/${base_name}.log"
          done

      - name: Upload TLC logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tlc-logs
          path: ${{ runner.temp }}/tlc-logs

      - name: Lean build
        if: steps.detect.outputs.has_lean == 'true'
        run: |
          set -euo pipefail
          REJECTION_LOG="${RUNNER_TEMP}/lean-rejections.jsonl"
          mapfile -t LAKE_FILES < <(git ls-files '**/lakefile.lean' '**/lakefile.toml')
          if [ ${#LAKE_FILES[@]} -eq 0 ]; then
            echo "Lean files found, but no Lake workspace detected." >&2
            exit 1
          fi
          mapfile -t LAKE_DIRS < <(printf "%s\n" "${LAKE_FILES[@]}" | xargs -n1 dirname | sort -u)
          BUILD_FAILED=0
          for dir in "${LAKE_DIRS[@]}"; do
            echo "Running lake build in ${dir}"
            if ! (cd "${dir}" && lake build 2>"${RUNNER_TEMP}/lean-stderr-${dir//\//-}.log"); then
              BUILD_FAILED=1
              STDERR_FILE="${RUNNER_TEMP}/lean-stderr-${dir//\//-}.log"
              echo "Build failed in ${dir}. Stderr captured for oracle feedback."
              # Parse errors into rejection JSONL if aeon-logic is available
              if command -v npx &>/dev/null && [ -f "$(git rev-parse --show-toplevel)/open-source/aeon-logic/src/lean-errors.ts" 2>/dev/null ]; then
                npx tsx -e "
                  import { parseLeanErrors, errorsToRejections } from './open-source/aeon-logic/src/lean-errors.js';
                  import { readFileSync, appendFileSync } from 'fs';
                  const stderr = readFileSync('${STDERR_FILE}', 'utf-8');
                  const errors = parseLeanErrors(stderr);
                  const rejections = errorsToRejections(errors);
                  if (rejections.length > 0) {
                    const jsonl = rejections.map(r => JSON.stringify(r)).join('\n');
                    appendFileSync('${REJECTION_LOG}', jsonl + '\n');
                    console.log('Emitted ' + rejections.length + ' rejection records from ' + '${dir}');
                  }
                " 2>/dev/null || echo "Oracle emission skipped (aeon-logic not available in CI)"
              fi
            fi
          done
          if [ "$BUILD_FAILED" -ne 0 ]; then
            echo "One or more Lean builds failed."
            exit 1
          fi

      - name: Upload Lean rejection log
        if: always() && steps.detect.outputs.has_lean == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lean-rejections
          path: ${{ runner.temp }}/lean-rejections.jsonl
          if-no-files-found: ignore

# Small VL model KNOTs: SmolVLM2-256M, Qwen2-VL-2B, Qwen2.5-VL-3B
# (Qwen2.5-VL-2B does not exist — smallest is 3B)

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: smolvlm2-256m
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model HuggingFaceTB/SmolVLM2-256M-Video-Instruct \
          --output /workspace/smolvlm2-256m.knot \
          || echo "[warn] smolvlm2-256m failed"
        ls -lh /workspace/smolvlm2-256m.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: qwen2-vl-2b
    waitFor: ['smolvlm2-256m']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2-VL-2B-Instruct \
          --output /workspace/qwen2-vl-2b.knot \
          || echo "[warn] qwen2-vl-2b failed"
        ls -lh /workspace/qwen2-vl-2b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen2.5-vl-3b
    waitFor: ['qwen2-vl-2b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2.5-VL-3B-Instruct \
          --output /workspace/qwen2.5-vl-3b.knot \
          || echo "[warn] qwen2.5-vl-3b failed"
        ls -lh /workspace/qwen2.5-vl-3b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['qwen2.5-vl-3b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/smolvlm2-256m.knot  models/smolvlm2-256m.knot
        upload_if_exists /workspace/qwen2-vl-2b.knot    models/qwen2-vl-2b.knot
        upload_if_exists /workspace/qwen2.5-vl-3b.knot  models/qwen2.5-vl-3b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in smolvlm2-256m.knot qwen2-vl-2b.knot qwen2.5-vl-3b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '14400s'

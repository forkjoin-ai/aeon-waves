[package]
name = "gnosis_runtime"
version = "0.1.0"
edition = "2021"
description = "Quantum topological runtime for Gnosis"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2.87"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
# Jet-engine compressor cascade — used only by the cascade instrumentation test, so the
# production wasm build is untouched. Pure std, compiles for wasm32 too.
gnosis-engine-core = { path = "../gnosis-engine-core" }

# RWKV-7 KNOT: RWKV/RWKV7-Goose-World3-2.9B-HF
# (Jamba 1.5-Mini removed — gated repo, HF_TOKEN lacks access)

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: rwkv7
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[rwkv7] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-ssm-models.py" \
          --model RWKV/RWKV7-Goose-World3-2.9B-HF \
          --output /workspace/rwkv7-2.9b.knot \
          || echo "[warn] rwkv7 failed"
        ls -lh /workspace/rwkv7-2.9b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['rwkv7']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/rwkv7-2.9b.knot models/rwkv7-2.9b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '1800s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/rwkv7-2.9b.knot" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] rwkv7-2.9b.knot" || echo "[WARN] rwkv7-2.9b.knot: $magic"
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '7200s'

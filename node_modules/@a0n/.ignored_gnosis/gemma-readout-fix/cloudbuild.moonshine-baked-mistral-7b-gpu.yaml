# Baked moonshine GPU image for gnosis-openai-mistral-7b.
# Rebuilds fat-station-cuda (CUDA 12.4 / cuBLAS) AND the TS host from CURRENT
# source via the root Dockerfile.moonshine (which builds `--features cuda` at
# line 111 and bakes distributed-inference-host/src via COPY . .).
#
# Carries the BATCHED PREFILL fix for the Llama/mistral path (model_phi3.rs +
# fat-station.rs handle_generate): prompt prefill goes from token-by-token
# (~0.134s/tok, ~110s for an 840-tok persona prompt) to chunked batched GEMM.
# Distinct -gpu-v3 tag. Build context = monorepo root.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-mistral7b-gpu-v5'
      - '-f'
      - 'Dockerfile.moonshine'
      - '--build-arg'
      - 'BAKE_KNOT_URL=https://www-edgework-app.edgework.ai/api/v1/r2/distributed-inference/models/mistral-7b.knot'
      - '.'
    id: 'build-baked-mistral7b-gpu-v5'
    timeout: '5400s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-mistral7b-gpu-v5',
      ]
    id: 'push-baked-mistral7b-gpu-v5'
    waitFor: ['build-baked-mistral7b-gpu-v5']

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-mistral7b-gpu-v5'

timeout: '6000s'

# Refresh the published Linux paris-probe-rknot R2 tool from current source.
#
# This fixes the no-source admission path after source changes land in
# distributed-inference. The build:
#   1. builds target/release/paris-probe-rknot from the staged source slice,
#   2. backs up the currently published R2 tool under _BACKUP_KEY,
#   3. uploads the new binary to _TOOL_KEY,
#   4. verifies the public Edgework URL serves the uploaded bytes.
#
# Expected context layout is produced by:
#   open-source/gnosis/distributed-inference/scripts/submit-paris-probe-r2-refresh-cloud.sh

substitutions:
  _CRATE_DIR: 'gnosis/distributed-inference'
  _R2_PROXY_URL: 'https://r2-proxy.taylorbuley.workers.dev'
  _PUBLIC_BASE: 'https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference'
  _TOOL_KEY: 'tools/paris-probe-rknot-linux-x86_64'
  _TOOL_KEY_ENCODED: 'tools%2Fparis-probe-rknot-linux-x86_64'
  _BACKUP_KEY: 'tools/paris-probe-rknot-linux-x86_64.pre-gemma4-lmhead-fp32-20260618'
  _BACKUP_KEY_ENCODED: 'tools%2Fparis-probe-rknot-linux-x86_64.pre-gemma4-lmhead-fp32-20260618'

steps:
  - name: 'python:3.11-slim'
    id: assert-build-context
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        for path in \
          /workspace/bitwise/Cargo.toml \
          /workspace/gnosis/gnosis-frf/Cargo.toml \
          /workspace/gnosis/gnosis-helix/Cargo.toml \
          /workspace/gnosis/gnosis-http/Cargo.toml \
          /workspace/gnosis/gnosis-engine-core/Cargo.toml \
          /workspace/gnosis/rtl-bridge/Cargo.toml \
          "/workspace/${_CRATE_DIR}/Cargo.toml"; do
          if [ ! -f "$${path}" ]; then
            echo "FAIL: missing $${path}"
            echo "Submit with distributed-inference/scripts/submit-paris-probe-r2-refresh-cloud.sh"
            exit 1
          fi
        done
        echo "assert-build-context: ok"
    timeout: '60s'

  - name: 'rust:1.86-slim'
    id: build-probe
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends pkg-config libssl-dev build-essential ca-certificates
        cd "/workspace/${_CRATE_DIR}"
        cargo build --release --bin paris-probe-rknot
        sha256sum target/release/paris-probe-rknot | tee /workspace/paris-probe-rknot.sha256
        ls -lh target/release/paris-probe-rknot
    waitFor: ['assert-build-context']
    timeout: '1800s'

  - name: 'curlimages/curl:latest'
    id: backup-current-tool
    entrypoint: sh
    secretEnv: ['R2_TOKEN']
    args:
      - '-c'
      - |
        set -eu
        if curl -fsI --retry 3 --retry-all-errors --retry-delay 2 \
          "${_PUBLIC_BASE}/${_BACKUP_KEY}" >/dev/null; then
          echo "[backup] ${_BACKUP_KEY} already exists; preserving it"
          exit 0
        fi
        curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 \
          "${_PUBLIC_BASE}/${_TOOL_KEY}" -o /tmp/current-paris-probe-rknot
        curl -fsS --fail-with-body --retry 6 --retry-all-errors --retry-delay 5 \
          -X PUT \
          -H "Authorization: Bearer $${R2_TOKEN}" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @/tmp/current-paris-probe-rknot \
          "${_R2_PROXY_URL}/r2/${_BACKUP_KEY_ENCODED}"
        sha256sum /tmp/current-paris-probe-rknot | tee /tmp/previous-paris-probe-rknot.sha256
    waitFor: ['assert-build-context']
    timeout: '180s'

  - name: 'curlimages/curl:latest'
    id: upload-new-tool
    entrypoint: sh
    secretEnv: ['R2_TOKEN']
    args:
      - '-c'
      - |
        set -eu
        BIN="/workspace/${_CRATE_DIR}/target/release/paris-probe-rknot"
        curl -fsS --fail-with-body --retry 6 --retry-all-errors --retry-delay 5 \
          -X PUT \
          -H "Authorization: Bearer $${R2_TOKEN}" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @"$${BIN}" \
          "${_R2_PROXY_URL}/r2/${_TOOL_KEY_ENCODED}"
    waitFor: ['build-probe', 'backup-current-tool']
    timeout: '180s'

  - name: 'rust:1.86-slim'
    id: verify-public-tool
    entrypoint: bash
    args:
      - '-c'
      - |
        set -eu
        curl -fsSL --retry 6 --retry-all-errors --retry-delay 5 \
          "${_PUBLIC_BASE}/${_TOOL_KEY}" -o /tmp/published-paris-probe-rknot
        chmod +x /tmp/published-paris-probe-rknot
        /tmp/published-paris-probe-rknot --help >/tmp/help.txt
        sha256sum /tmp/published-paris-probe-rknot | tee /tmp/published-paris-probe-rknot.sha256
        cmp /workspace/${_CRATE_DIR}/target/release/paris-probe-rknot /tmp/published-paris-probe-rknot
        echo "[refresh] published tool matches source-built binary"
    waitFor: ['upload-new-tool']
    timeout: '180s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '2400s'

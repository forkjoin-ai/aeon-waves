[package]
name = "moonshine-tauri"
version = "0.1.0"
description = "Sovereign Tauri terminal for FRF moonshine shells with monster-badchild + monster-guard protection"
authors = ["Affectively"]
edition = "2021"
rust-version = "1.70"

[[bin]]
name = "moonshine-tauri"
path = "src/main.rs"

[lib]
name = "moonshine_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2.0"
tauri-plugin-store = "2.0"
tauri-plugin-deep-link = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.41", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
anyhow = "1.0"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = "0.4"
once_cell = "1.19"
home = "0.5"
which = "6.0"

[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
# Cross-platform PTY (wezterm-grade) for interactive/TTY programs (claude, vim,
# python, ssh) that the persistent REPL can't drive — see pty_session.rs.
portable-pty = "0.8"
libc = "0.2"
nix = { version = "0.29", features = ["process"] }

[target.'cfg(not(target_os = "android"))'.dependencies]
tauri-plugin-single-instance = "2.0"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true

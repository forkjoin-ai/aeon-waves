<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160">
  <defs>
    <linearGradient id="e8-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="50%" style="stop-color:#2a6bbf"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <style>
      .root-node { fill: url(#e8-gradient); stroke: white; stroke-width: 1.5; }
      .root-line { stroke: #4a9eff; stroke-width: 2; }
      .double-line { stroke: #2a6bbf; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- E8 Dynkin diagram: o--o--o--o--o--o--o==o
                                     |
                                     o -->

  <!-- Root 1 -->
  <circle cx="20" cy="80" r="6" class="root-node"/>
  <!-- Root 2 -->
  <circle cx="50" cy="80" r="6" class="root-node"/>
  <!-- Root 3 -->
  <circle cx="80" cy="80" r="6" class="root-node"/>
  <!-- Root 4 -->
  <circle cx="110" cy="80" r="6" class="root-node"/>
  <!-- Root 5 -->
  <circle cx="140" cy="80" r="6" class="root-node"/>
  <!-- Root 6 -->
  <circle cx="170" cy="80" r="6" class="root-node"/>
  <!-- Root 7 -->
  <circle cx="200" cy="80" r="6" class="root-node"/>
  <!-- Root 8 (double connection to root 6) -->
  <circle cx="230" cy="80" r="6" class="root-node"/>
  <!-- Root 4 branch (off Root 5) -->
  <circle cx="140" cy="30" r="6" class="root-node"/>

  <!-- Root 1-2 line -->
  <line x1="26" y1="80" x2="44" y2="80" class="root-line"/>
  <!-- Root 2-3 line -->
  <line x1="56" y1="80" x2="74" y2="80" class="root-line"/>
  <!-- Root 3-4 line -->
  <line x1="86" y1="80" x2="104" y2="80" class="root-line"/>
  <!-- Root 4-5 line -->
  <line x1="116" y1="80" x2="134" y2="80" class="root-line"/>
  <!-- Root 5-6 line -->
  <line x1="146" y1="80" x2="164" y2="80" class="root-line"/>
  <!-- Root 6-7 line -->
  <line x1="176" y1="80" x2="194" y2="80" class="root-line"/>
  <!-- Root 7-8 double line -->
  <line x1="206" y1="76" x2="224" y2="76" class="double-line"/>
  <line x1="206" y1="84" x2="224" y2="84" class="double-line"/>

  <!-- Root 5 branch line (vertical) -->
  <line x1="140" y1="74" x2="140" y2="36" class="root-line"/>

  <!-- Title -->
  <text x="160" y="150" font-family="Monaco, monospace" font-size="14" fill="#4a9eff" text-anchor="middle" font-weight="bold">E₈ Dynkin Diagram</text>
</svg>

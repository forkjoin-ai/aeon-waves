[package]
name = "gnosis-rtl-bridge"
version = "0.1.0"
edition = "2021"
description = "Bounded resolution-lift FSM IR and VHDL/Verilog emit for Gnosis verifylog"
license = "MPL-2.0"

[lib]
name = "gnosis_rtl_bridge"
path = "src/lib.rs"

[[bin]]
name = "gnosis-rtl-emit"
path = "src/bin/gnosis_rtl_emit.rs"

[[bin]]
name = "gnosis-liquid-shard-mock"
path = "src/bin/gnosis_liquid_shard_mock.rs"

[dependencies]
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"

[dev-dependencies]
tempfile = "3"

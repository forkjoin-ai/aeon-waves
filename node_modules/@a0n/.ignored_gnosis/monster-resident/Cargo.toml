[package]
name = "monster-resident"
version = "0.1.0"
edition = "2021"
description = "Resident MCP server exposing UCAN-verified orchestration to local fat-client stations."

[[bin]]
name = "monster-resident"
path = "src/main.rs"

[dependencies]
a0n-auth = { path = "../../auth/rust" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# The distributed-inference guardrails: shared CRUD core for the subagent_* tools.
monster-swarm = { path = "../monster-swarm" }

# Standalone — not a member of any parent workspace.
[workspace]

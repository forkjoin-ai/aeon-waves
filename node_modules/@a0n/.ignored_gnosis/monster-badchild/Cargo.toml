[package]
name = "monster-badchild"
version = "0.1.0"
edition = "2021"
description = "The rogue bodyguard of the monster family. Inverts aeon-flux's goodchild: admit-all, deny-destination. Fronts and contains the moonshine shell behind adaptive camouflage so everyone authenticates through, but adversarial intent is silently misrouted into perfect-mimicry shadow. A rogue, not a tank: it avoids being attacked rather than absorbing attacks, and does the dirty work moonshine cannot dare."

[lib]
name = "monster_badchild"
path = "src/lib.rs"

[[bin]]
name = "monster-badchild"
path = "src/main.rs"

[dependencies]
# Real auth: P-256 UCAN verify + revocation. Replaces moonshine's cosmetic HMAC.
a0n-auth = { path = "../../auth/rust" }
# Cost-admission (AntColony FRF budget) + leased containment (monster_swarm::guard
# shells out to the binary-only monster-guard) + the shared resident store.
monster-swarm = { path = "../monster-swarm" }
# The order-invariant portal-key digest (XOR-fold), proven in bitwise/lean.
bitwise = { path = "../../bitwise" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Standalone — not a member of any parent workspace (matches monster-guard/-swarm/-resident).
[workspace]

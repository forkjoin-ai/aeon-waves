# VL model KNOTs: Qwen2.5-VL-7B, Qwen2.5-VL-3B, DeepSeek-R1-1.5B, BLIP-2

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: deepseek-r1-1.5b
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B \
          --output /workspace/deepseek-r1-1.5b.knot \
          || echo "[warn] deepseek-r1-1.5b failed"
        ls -lh /workspace/deepseek-r1-1.5b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: blip2
    waitFor: ['deepseek-r1-1.5b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Salesforce/blip2-opt-2.7b \
          --output /workspace/blip2-opt-2.7b.knot \
          || echo "[warn] blip2 failed"
        ls -lh /workspace/blip2-opt-2.7b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen2.5-vl-3b
    waitFor: ['blip2']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2.5-VL-3B-Instruct \
          --output /workspace/qwen2.5-vl-3b.knot \
          || echo "[warn] qwen2.5-vl-3b failed"
        ls -lh /workspace/qwen2.5-vl-3b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: qwen2.5-vl-7b
    waitFor: ['qwen2.5-vl-3b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen2.5-VL-7B-Instruct \
          --output /workspace/qwen2.5-vl-7b.knot \
          || echo "[warn] qwen2.5-vl-7b failed"
        ls -lh /workspace/qwen2.5-vl-7b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['qwen2.5-vl-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/deepseek-r1-1.5b.knot  models/deepseek-r1-1.5b.knot
        upload_if_exists /workspace/blip2-opt-2.7b.knot    models/blip2-opt-2.7b.knot
        upload_if_exists /workspace/qwen2.5-vl-3b.knot     models/qwen2.5-vl-3b.knot
        upload_if_exists /workspace/qwen2.5-vl-7b.knot     models/qwen2.5-vl-7b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in deepseek-r1-1.5b.knot blip2-opt-2.7b.knot qwen2.5-vl-3b.knot qwen2.5-vl-7b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

timeout: '21600s'

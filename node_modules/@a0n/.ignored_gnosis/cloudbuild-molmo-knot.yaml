# MolmoAct2-Think → .knot : 5B F32 vision-language-ACTION model (8th modality).
# Encodes the full checkpoint (ViT + adapter + qwen3 LM + flow-matching action
# expert) and dual-writes the knot to R2 (public proxy, for the zoo + the mesh
# entrypoint downloader) and GCS (same-project backend mirror).

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          torch --index-url https://download.pytorch.org/whl/cpu
        /workspace/venv/bin/pip install -q --no-cache-dir \
          safetensors numpy requests "huggingface_hub>=0.24"
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: encode
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-molmo.py" \
          --model allenai/MolmoAct2-Think \
          --out /workspace/molmoact2-think.knot
        ls -lh /workspace/molmoact2-think.knot
    secretEnv: ['HF_TOKEN']
    timeout: '14400s'

  - name: 'python:3.11-slim'
    id: upload-r2
    waitFor: ['encode']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/molmoact2-think.knot models/molmoact2-think.knot
        echo "[upload-r2] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: upload-gcs
    waitFor: ['encode']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        gcloud storage cp /workspace/molmoact2-think.knot \
          gs://neutral-418500-models/knots/molmoact2-think.knot
        echo "[upload-gcs] done"
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload-r2']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/molmoact2-think.knot" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] molmoact2-think.knot (KNOT magic)" || echo "[WARN] molmoact2-think.knot: $magic"

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: 'R2_TOKEN'
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: 'HF_TOKEN'

options:
  # Max standard-pool RAM is E2_HIGHCPU_32 (32 GB). The encoder writes the knot
  # in two passes (offsets from shapes, then stream+free each tensor) so peak
  # memory stays ~one resident weight set, well under 32 GB for the 5B F32 model.
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '400'
  logging: CLOUD_LOGGING_ONLY

timeout: '21600s'

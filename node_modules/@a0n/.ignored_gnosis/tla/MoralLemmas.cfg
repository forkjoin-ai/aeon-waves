\* TLC Configuration for MoralLemmas specification
\*
\* This cfg checks the TitForTat spec by default.
\* To check other strategies, swap SPECIFICATION to:
\*   AlwaysDefect_Spec   (baseline: mutual defection)
\*   GoldenTitForTat_Spec (tit-for-tat with forgiveness)

SPECIFICATION TitForTat_Spec

CONSTANTS
    MaxRounds = 6
    CooperateCooperate = 3
    CooperateDefect = 0
    DefectCooperate = 5
    DefectDefect = 1

INVARIANT ScoresNonNegative
INVARIANT ActionsValid
INVARIANT RoundBounded
INVARIANT CooperationStreakNonNeg
INVARIANT TitForTatDominatesAfterRound2

PROPERTY TitForTatEventualCooperation

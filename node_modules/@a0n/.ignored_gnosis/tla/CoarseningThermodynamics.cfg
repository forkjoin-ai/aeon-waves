\* TLC Configuration for CoarseningThermodynamics.tla
\* Bounded model checking for the thermodynamic arrow of abstraction.
\*
\* Test case: 3 fine nodes, 2 coarse nodes (many-to-one), 1 coarser node (full collapse).
\* Quotient map: {1 -> a, 2 -> a, 3 -> b}  (non-injective: nodes 1,2 merge)
\* Second quotient: {a -> x, b -> x}         (full collapse)

SPECIFICATION Spec

CONSTANTS
    FineNodes = {1, 2, 3}
    CoarseNodes = {1, 2}
    CoarserNodes = {1}
    BoltzmannConstant = 1
    Temperature = 1

INVARIANT AllInvariants

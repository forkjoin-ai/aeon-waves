\* TLC Configuration for BrokenSystems specification
\*
\* This config checks the GRIEF (healthy) model by default.
\* To check other models, create separate .cfg files or modify
\* the SPECIFICATION line:
\*   AnxietySpec    - entropy saturates, craving stays 0
\*   AddictionSpec  - entropy AND craving both saturate
\*   GriefSpec      - ratio converges, entropy stays bounded
\*   ComplicatedGriefSpec - ratio converges but entropy oscillates

\* --- Default: Grief (healthy) model ---
SPECIFICATION GriefSpec

CONSTANTS
    MaxVal = 10000
    MaxEntropy = 15
    MaxSteps = 20
    Epsilon = 10

INVARIANT TypeOK

PROPERTY GriefConverges
PROPERTY GriefEntropyBounded

\* --- To check Anxiety, use this config instead: ---
\* SPECIFICATION AnxietySpec
\* PROPERTY AnxietyEntropySaturates

\* --- To check Addiction, use this config instead: ---
\* SPECIFICATION AddictionSpec
\* PROPERTY AddictionCravingSaturates
\* PROPERTY AddictionDualSaturation

\* --- To check Complicated Grief, use this config instead: ---
\* SPECIFICATION ComplicatedGriefSpec
\* PROPERTY ComplicatedGriefNotMonotonic
\* PROPERTY ComplicatedGriefRatioConverges
\* PROPERTY ComplicatedGriefNotSaturated

# Rebuild falcon-mamba-7b.knot and mamba-2.8b.knot with fixed tensor name patterns.
#
# Bug: _FALCON_MAMBA_LAYER_PATTERNS used model.layers.N.mamba.* but the actual
# HF weights use backbone.layers.N.mixer.* — only lm_head.weight matched (1 tensor).
# _MAMBA1_GLOBALS had backbone.embedding.weight (missing plural 's').
#
# Submit via:
#   open-source/gnosis/submit-ssm-reencode.sh
#
# Lands:
#   models/falcon-mamba-7b.knot   (~4 GB, 643 tensors)
#   models/mamba-2.8b.knot        (~3 GB, 642 tensors)

steps:
  # ── shared Python venv ─────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  # ── falcon-mamba-7b ───────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: falcon-mamba-7b
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[falcon-mamba-7b] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-ssm-models.py" \
          --model tiiuae/falcon-mamba-7b \
          --output /workspace/falcon-mamba-7b.knot
        echo "[falcon-mamba-7b] done: $(ls -lh /workspace/falcon-mamba-7b.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  # ── mamba-2.8b ────────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: mamba-2.8b
    waitFor: ['falcon-mamba-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[mamba-2.8b] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-ssm-models.py" \
          --model state-spaces/mamba-2.8b-hf \
          --output /workspace/mamba-2.8b.knot
        echo "[mamba-2.8b] done: $(ls -lh /workspace/mamba-2.8b.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  # ── upload ────────────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: upload-all
    waitFor: ['mamba-2.8b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        upload_if_exists() {
          local file="$1"
          local key="$2"
          if [ -f "$file" ]; then
            echo "[upload] $file -> $key"
            PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
              /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
              || echo "[warn] upload failed for $key -- continuing"
          else
            echo "[skip] $file not present"
          fi
        }

        upload_if_exists /workspace/falcon-mamba-7b.knot models/falcon-mamba-7b.knot
        upload_if_exists /workspace/mamba-2.8b.knot      models/mamba-2.8b.knot

        echo "[upload] all done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  # ── verify magic bytes on R2 ──────────────────────────────────────────
  - name: 'curlimages/curl:latest'
    id: verify-magic
    waitFor: ['upload-all']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        verify() {
          magic=$(curl -sf --range 0-3 "$$BASE/$1" 2>/dev/null \
            | od -A n -t x1 | head -1 || echo "FAIL")
          if echo "$magic" | grep -q "4b 4e 4f 54"; then
            echo "[OK] $1 magic=KNOT tensors=all"
          else
            echo "[WARN] $1 bad magic: $magic"
          fi
        }
        verify falcon-mamba-7b.knot
        verify mamba-2.8b.knot
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~2h (2 models × ~30–45 min encode + upload)
timeout: '10800s'

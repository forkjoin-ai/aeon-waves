# Paris admission probe — runs paris-probe-rknot on Cloud Build.
#
# Usage (from repo root or any directory, --no-source is fine):
#   gcloud builds submit --no-source --async \
#     --config=open-source/gnosis/cloudbuild-paris-probe.yaml \
#     --substitutions=_MODEL=gemma4-31b-it,_TOKENS=2,669,5279,529,7001,563,_EXPECTED=9079
#
# Required substitutions:
#   _MODEL    — knot filename stem (e.g. gemma4-31b-it)
#   _TOKENS   — comma-separated token IDs for the probe prompt
#   _EXPECTED — expected argmax token ID
#
# Optional:
#   _TOP_K    — default 8
#   _ENV_FLAGS — extra env vars passed to the probe (e.g. GNOSIS_LM_HEAD_FP32=1)

substitutions:
  _MODEL: gemma4-31b-it
  _TOKENS: '2,669,5279,529,7001,563'
  _EXPECTED: '9079'
  _TOP_K: '8'
  _ENV_FLAGS: ''

steps:
  - name: 'ubuntu:22.04'
    id: probe
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq curl ca-certificates

        BASE=https://edgework.ai/api/v1/r2/distributed-inference
        MODEL="${_MODEL}"
        TOKENS="${_TOKENS}"
        EXPECTED="${_EXPECTED}"
        TOP_K="${_TOP_K}"
        ENV_FLAGS="${_ENV_FLAGS}"
        KNOT_URL="$${BASE}/models/$${MODEL}.knot"

        echo "[probe] downloading binary..."
        curl -fL "$${BASE}/tools/paris-probe-rknot-linux-x86_64" -o /usr/local/bin/paris-probe-rknot
        chmod +x /usr/local/bin/paris-probe-rknot
        echo "[probe] binary ready ($(du -sh /usr/local/bin/paris-probe-rknot | cut -f1))"

        echo "[probe] model=$${MODEL} tokens=$${TOKENS} expected=$${EXPECTED}"
        echo "[probe] knot=$${KNOT_URL}"

        if [ -n "$${ENV_FLAGS}" ]; then
          export $${ENV_FLAGS}
        fi

        paris-probe-rknot \
          --dense "$${KNOT_URL}" \
          --dense-only \
          --tokens "$${TOKENS}" \
          --expected "$${EXPECTED}" \
          --top-k "$${TOP_K}" \
          && echo "[ADMITTED] $${MODEL} passes paris gate" \
          || { echo "[REJECTED] $${MODEL} FAILED paris gate"; exit 1; }
    timeout: '10800s'

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~3h (knot load over HTTP + 60-80 layer forward pass)
timeout: '10800s'

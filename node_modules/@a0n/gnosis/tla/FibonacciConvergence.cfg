\* TLC Configuration for FibonacciConvergence specification
\* Default seeds: classic Fibonacci (1, 1)
\* Epsilon = 10 means convergence within 0.010 of phi

SPECIFICATION Spec

CONSTANTS
    Seed1 = 1
    Seed2 = 1
    MaxSteps = 20
    Epsilon = 10

INVARIANT TypeOK
INVARIANT RatioBounded
INVARIANT RegistersPositive

PROPERTY EventuallyPhi
PROPERTY EventuallyDone

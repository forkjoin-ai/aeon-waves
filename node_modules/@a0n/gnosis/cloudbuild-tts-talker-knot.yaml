# Qwen3-TTS talker-enabled KNOT: forkjoin-ai/qwen3-tts-12hz-0.6b-base
# Re-bake with the tts_talker_* carry (text_embedding, text_projection,
# code_predictor lm_head_0..14 + codec_embedding_0..14) ALONGSIDE the existing
# codec decoder (tts_codec_*) and the talker Qwen3 backbone. Replaces the prior
# codec-gate-only build at models/qwen3-tts-0.6b.knot.

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" hf_transfer ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: encode
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[qwen3-tts-talker] encoding (talker LM + codec decoder + tts_talker carry)..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model forkjoin-ai/qwen3-tts-12hz-0.6b-base \
          --output /workspace/qwen3-tts-0.6b.knot
        echo "[qwen3-tts-talker] done: $(ls -lh /workspace/qwen3-tts-0.6b.knot)"
        echo "[verify-local] scanning header for tts_talker_* tensors..."
        /workspace/venv/bin/python3 - <<'PY'
        import struct, json
        f=open('/workspace/qwen3-tts-0.6b.knot','rb')
        assert f.read(4)==b'KNOT'
        ver=struct.unpack('<H',f.read(2))[0]
        ml=struct.unpack('<I',f.read(4))[0]
        m=json.loads(f.read(ml))
        ts=list(m['tensors'].keys())
        talker=[t for t in ts if 'talker' in t]
        cfg=sorted(k for k in m['config'] if k.startswith('tts_talker'))
        print('n_tensors', len(ts), 'n_talker', len(talker))
        print('tts_talker cfg keys:', cfg)
        for needle in ('text_embedding','text_projection','code_predictor_lm_head_0','code_predictor_lm_head_14','code_predictor_codec_embedding_0','code_predictor_codec_embedding_14'):
            hit=[t for t in talker if needle in t]
            print(f'  {needle}: {"OK" if hit else "MISSING"}', hit[:1])
        assert len(talker) > 0, 'NO talker tensors carried — encode-knot.py carry FAILED'
        PY
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['encode']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        echo "[upload] qwen3-tts-0.6b.knot -> models/qwen3-tts-0.6b.knot"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/qwen3-tts-0.6b.knot models/qwen3-tts-0.6b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: verify-remote
    waitFor: ['upload']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install -q --no-cache-dir requests
        python3 - <<'PY'
        import struct, json, requests
        BASE='https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models'
        r=requests.get(BASE+'/qwen3-tts-0.6b.knot', headers={'Range':'bytes=0-262143'}, timeout=120)
        d=r.content
        assert d[:4]==b'KNOT', d[:4]
        ml=struct.unpack('<I',d[6:10])[0]
        m=json.loads(d[10:10+ml])
        talker=[t for t in m['tensors'] if 'talker' in t]
        print('[remote] n_tensors', len(m['tensors']), 'n_talker', len(talker))
        print('[remote] tts_talker cfg:', sorted(k for k in m['config'] if k.startswith('tts_talker')))
        assert talker, 'remote knot missing talker tensors'
        print('[OK] remote talker-enabled knot verified')
        PY
    timeout: '600s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '10800s'

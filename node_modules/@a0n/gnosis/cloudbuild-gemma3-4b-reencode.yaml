# Rebuild gemma3-4b-it.knot with fixed language_model.* prefix handling.
#
# Bug: Gemma3ForConditionalGeneration wraps LM weights under language_model.*
# but _map_name matched against bare model.layers.* patterns — 0 tensors saved.
# Fix: strip language_model. prefix in _map_name before pattern matching.
#
# Submit via:
#   open-source/gnosis/submit-gemma3-4b-reencode.sh
#
# Lands:
#   models/gemma3-4b-it.knot   (~8 GB, 444 tensors)

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: gemma3-4b-it
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[gemma3-4b-it] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model google/gemma-3-4b-it \
          --output /workspace/gemma3-4b-it.knot
        echo "[gemma3-4b-it] done: $(ls -lh /workspace/gemma3-4b-it.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['gemma3-4b-it']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        echo "[upload] gemma3-4b-it.knot -> models/gemma3-4b-it.knot"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/gemma3-4b-it.knot models/gemma3-4b-it.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify-magic
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/gemma3-4b-it.knot" 2>/dev/null \
          | od -A n -t x1 | head -1 || echo "FAIL")
        if echo "$magic" | grep -q "4b 4e 4f 54"; then
          echo "[OK] gemma3-4b-it.knot magic=KNOT"
        else
          echo "[WARN] gemma3-4b-it.knot bad magic: $magic"
        fi
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '150'
  logging: CLOUD_LOGGING_ONLY

timeout: '10800s'

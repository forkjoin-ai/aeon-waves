steps:
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        apt-get update -qq && apt-get install -y -qq curl >/dev/null
        pip install -q -U huggingface_hub
        echo "Fetching ${_R2_URL} -> /workspace/${_FILE}"
        curl -sf -o "/workspace/${_FILE}" "${_R2_URL}"
        ls -la "/workspace/${_FILE}"
        hf upload "${_HF_REPO}" "/workspace/${_FILE}" "${_FILE}" --repo-type model --token "$$HF_TOKEN" --commit-message "add ${_FILE} (Q4_K knot, next to gguf)"
        echo "HF upload complete: https://huggingface.co/${_HF_REPO}/blob/main/${_FILE}"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'
substitutions:
  _R2_URL: 'placeholder'
  _FILE: 'placeholder'
  _HF_REPO: 'placeholder'
options:
  diskSizeGb: '50'
  substitutionOption: ALLOW_LOOSE
timeout: '3600s'
availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/HUGGINGFACE_TOKEN/versions/latest
      env: HF_TOKEN

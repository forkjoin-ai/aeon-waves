# cloudbuild-escape-witnesses.yaml
# Boundary-recurrence escape witnesses for three architecture-escape candidates:
#   falcon-mamba-7b  (tiiuae/falcon-mamba-7b)
#   mamba-2.8b       (state-spaces/mamba-2.8b-hf)
#   rwkv-7-2.9b      (RWKV/RWKV7-Goose-World3-2.9B-HF)
#
# Run:
#   gcloud builds submit \
#     --config=open-source/gnosis/cloudbuild-escape-witnesses.yaml \
#     --substitutions=_HF_TOKEN=$HF_TOKEN,_R2_TOKEN=$R2_TOKEN \
#     --project=neutral-418500 .

timeout: 7200s

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: 30
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

steps:
  - name: 'python:3.11'
    id: 'escape-witnesses'
    entrypoint: 'bash'
    secretEnv: ['HF_TOKEN', 'R2_TOKEN']
    args:
      - '-c'
      - |
        set -euo pipefail
        pip install -q --no-cache-dir \
          "transformers>=4.45.0" \
          "torch>=2.0.0" \
          "scikit-learn>=1.3" \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6" \
          requests numpy accelerate

        # secretEnv injects HF_TOKEN and R2_TOKEN directly — no re-export needed.
        export HF_HUB_ENABLE_HF_TRANSFER=1

        R2BASE="https://edgework.ai/api/v1/r2/distributed-inference"
        SCRIPT="/workspace/open-source/gnosis/distributed-inference/generate-escape-witnesses.py"

        echo "=== falcon-mamba-7b ==="
        python3 "$$SCRIPT" \
          --model-id falcon-mamba-7b \
          --hf-model tiiuae/falcon-mamba-7b \
          --sketch-out /workspace/falcon-mamba-7b-sketches.knot \
          --r2-upload-url "$$R2BASE/models/falcon-mamba-7b-sketches.knot" \
          --r2-base-url "$$R2BASE" \
          --r2-token "$$R2_TOKEN" \
          --out /workspace/escape-witnesses.json
        echo "[escape] falcon-mamba done"

        echo "=== mamba-2.8b ==="
        python3 "$$SCRIPT" \
          --model-id mamba-2.8b \
          --hf-model state-spaces/mamba-2.8b-hf \
          --sketch-out /workspace/mamba-2.8b-sketches.knot \
          --r2-upload-url "$$R2BASE/models/mamba-2.8b-sketches.knot" \
          --r2-base-url "$$R2BASE" \
          --r2-token "$$R2_TOKEN" \
          --out /workspace/escape-witnesses.json
        echo "[escape] mamba-2.8b done"

        echo "=== rwkv-7-2.9b ==="
        python3 "$$SCRIPT" \
          --model-id rwkv-7-2.9b-world \
          --hf-model RWKV/RWKV7-Goose-World3-2.9B-HF \
          --sketch-out /workspace/rwkv-7-2.9b-sketches.knot \
          --r2-upload-url "$$R2BASE/models/rwkv-7-2.9b-sketches.knot" \
          --r2-base-url "$$R2BASE" \
          --r2-token "$$R2_TOKEN" \
          --out /workspace/escape-witnesses.json
        echo "[escape] rwkv done"

        echo "[escape] all done"
        cat /workspace/escape-witnesses.json

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: 'R2_TOKEN'
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: 'HF_TOKEN'

# Sketches + HCEM for 5 small transformer models:
#   smollm2-360m, gemma3-1b-it, deepseek-r1-1.5b, gemma3-4b-it, phi-3.5-mini
#
# Each model step generates sketch + HCEM together (single HF download per model).
# Steps chain sequentially to stay within 32 GB RAM.
# Upload step uses Python retry-enabled uploader (16 MiB parts, 6 retries).
#
# Submit via:
#   open-source/gnosis/submit-small-model-sketches.sh
#
# Lands (10 artifacts total):
#   models/smollm2-360m-sketches.knot   models/smollm2-360m-embed.hcem
#   models/gemma3-1b-it-sketches.knot   models/gemma3-1b-it-embed.hcem
#   models/deepseek-r1-1.5b-sketches.knot  models/deepseek-r1-1.5b-embed.hcem
#   models/gemma3-4b-it-sketches.knot   models/gemma3-4b-it-embed.hcem
#   models/phi-3.5-mini-sketches.knot   models/phi-3.5-mini-embed.hcem

steps:
  # ── shared Python venv ─────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          torch --index-url https://download.pytorch.org/whl/cpu
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6"
        echo "[pip] done"
    timeout: '900s'

  # ── smollm2-360m ───────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: smollm2-360m
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        MODEL=HuggingFaceTB/SmolLM2-360M-Instruct

        echo "[smollm2-360m] sketches..."
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model "$$MODEL" \
          --output /workspace/smollm2-360m-sketches.knot \
          --rank 32
        echo "[smollm2-360m] sketches done: $(ls -lh /workspace/smollm2-360m-sketches.knot)"

        echo "[smollm2-360m] hcem..."
        /workspace/venv/bin/python3 "$$S/make-columnar-embed.py" \
          --model "$$MODEL" \
          --out /workspace/smollm2-360m-embed.hcem \
          --dtype bf16
        echo "[smollm2-360m] hcem done: $(ls -lh /workspace/smollm2-360m-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  # ── gemma3-1b-it ───────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: gemma3-1b
    waitFor: ['smollm2-360m']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        MODEL=google/gemma-3-1b-it

        echo "[gemma3-1b-it] sketches..."
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model "$$MODEL" \
          --output /workspace/gemma3-1b-it-sketches.knot \
          --rank 32
        echo "[gemma3-1b-it] sketches done: $(ls -lh /workspace/gemma3-1b-it-sketches.knot)"

        echo "[gemma3-1b-it] hcem..."
        /workspace/venv/bin/python3 "$$S/make-columnar-embed.py" \
          --model "$$MODEL" \
          --out /workspace/gemma3-1b-it-embed.hcem \
          --dtype bf16
        echo "[gemma3-1b-it] hcem done: $(ls -lh /workspace/gemma3-1b-it-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  # ── deepseek-r1-1.5b ──────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: deepseek-r1-1.5b
    waitFor: ['gemma3-1b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        MODEL=deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B

        echo "[deepseek-r1-1.5b] sketches..."
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model "$$MODEL" \
          --output /workspace/deepseek-r1-1.5b-sketches.knot \
          --rank 32
        echo "[deepseek-r1-1.5b] sketches done: $(ls -lh /workspace/deepseek-r1-1.5b-sketches.knot)"

        echo "[deepseek-r1-1.5b] hcem..."
        /workspace/venv/bin/python3 "$$S/make-columnar-embed.py" \
          --model "$$MODEL" \
          --out /workspace/deepseek-r1-1.5b-embed.hcem \
          --dtype bf16
        echo "[deepseek-r1-1.5b] hcem done: $(ls -lh /workspace/deepseek-r1-1.5b-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  # ── gemma3-4b-it ───────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: gemma3-4b
    waitFor: ['deepseek-r1-1.5b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        MODEL=google/gemma-3-4b-it

        echo "[gemma3-4b-it] sketches...]"
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model "$$MODEL" \
          --output /workspace/gemma3-4b-it-sketches.knot \
          --rank 32
        echo "[gemma3-4b-it] sketches done: $(ls -lh /workspace/gemma3-4b-it-sketches.knot)"

        echo "[gemma3-4b-it] hcem..."
        /workspace/venv/bin/python3 "$$S/make-columnar-embed.py" \
          --model "$$MODEL" \
          --out /workspace/gemma3-4b-it-embed.hcem \
          --dtype bf16
        echo "[gemma3-4b-it] hcem done: $(ls -lh /workspace/gemma3-4b-it-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  # ── phi-3.5-mini ──────────────────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: phi-3.5-mini
    waitFor: ['gemma3-4b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference
        MODEL=microsoft/Phi-3.5-mini-instruct

        echo "[phi-3.5-mini] sketches..."
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model "$$MODEL" \
          --output /workspace/phi-3.5-mini-sketches.knot \
          --rank 32
        echo "[phi-3.5-mini] sketches done: $(ls -lh /workspace/phi-3.5-mini-sketches.knot)"

        echo "[phi-3.5-mini] hcem..."
        /workspace/venv/bin/python3 "$$S/make-columnar-embed.py" \
          --model "$$MODEL" \
          --out /workspace/phi-3.5-mini-embed.hcem \
          --dtype bf16
        echo "[phi-3.5-mini] hcem done: $(ls -lh /workspace/phi-3.5-mini-embed.hcem)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  # ── upload all 10 artifacts ───────────────────────────────────────────
  - name: 'python:3.11-slim'
    id: upload-all
    waitFor: ['phi-3.5-mini']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        upload_if_exists() {
          local file="$1"
          local key="$2"
          if [ -f "$file" ]; then
            echo "[upload] $file -> $key"
            PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
              /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
              || echo "[warn] upload failed for $key -- continuing"
          else
            echo "[skip] $file not present"
          fi
        }

        upload_if_exists /workspace/smollm2-360m-sketches.knot     models/smollm2-360m-sketches.knot
        upload_if_exists /workspace/smollm2-360m-embed.hcem         models/smollm2-360m-embed.hcem
        upload_if_exists /workspace/gemma3-1b-it-sketches.knot     models/gemma3-1b-it-sketches.knot
        upload_if_exists /workspace/gemma3-1b-it-embed.hcem         models/gemma3-1b-it-embed.hcem
        upload_if_exists /workspace/deepseek-r1-1.5b-sketches.knot models/deepseek-r1-1.5b-sketches.knot
        upload_if_exists /workspace/deepseek-r1-1.5b-embed.hcem     models/deepseek-r1-1.5b-embed.hcem
        upload_if_exists /workspace/gemma3-4b-it-sketches.knot     models/gemma3-4b-it-sketches.knot
        upload_if_exists /workspace/gemma3-4b-it-embed.hcem         models/gemma3-4b-it-embed.hcem
        upload_if_exists /workspace/phi-3.5-mini-sketches.knot     models/phi-3.5-mini-sketches.knot
        upload_if_exists /workspace/phi-3.5-mini-embed.hcem         models/phi-3.5-mini-embed.hcem

        echo "[upload] all done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  # ── verify magic bytes on R2 ──────────────────────────────────────────
  - name: 'curlimages/curl:latest'
    id: verify-magic
    waitFor: ['upload-all']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        verify() {
          magic=$(curl -sf --range 0-3 "$$BASE/$1" 2>/dev/null \
            | od -A n -t x1 | head -1 || echo "FAIL")
          if echo "$magic" | grep -q "4b 4e 4f 54"; then
            echo "[OK] $1 magic=KNOT"
          elif echo "$magic" | grep -q "48 43 45 4d"; then
            echo "[OK] $1 magic=HCEM"
          else
            echo "[WARN] $1 not verifiable (magic=$magic)"
          fi
        }
        verify smollm2-360m-sketches.knot
        verify smollm2-360m-embed.hcem
        verify gemma3-1b-it-sketches.knot
        verify gemma3-1b-it-embed.hcem
        verify deepseek-r1-1.5b-sketches.knot
        verify deepseek-r1-1.5b-embed.hcem
        verify gemma3-4b-it-sketches.knot
        verify gemma3-4b-it-embed.hcem
        verify phi-3.5-mini-sketches.knot
        verify phi-3.5-mini-embed.hcem
    timeout: '120s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

# Budget: ~3h (5 models × ~30 min sketch+HCEM + upload)
timeout: '18000s'

# Baked moonshine image for gnosis-openai-tinyllama.
# Same recipe as cloudbuild.moonshine-baked-gemma3-4b-it.yaml: bakes the
# tinyllama-1.1b knot into the image so the runtime mmaps locally (race mode).
# Distinct tag — must NOT overwrite moonshine:latest (shared by other services).
#
# Carries the terminal-prosody fix: collectSentenceCloseTokenIds() in
# distributed-inference-host/src/bin/openai-server.ts no longer includes '\n'
# in the sentence-close set (a newline is NOT a sentence end). Picked up via
# the Dockerfile.moonshine `COPY . .` of distributed-inference-host/src.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-tinyllama-1.1b-tp1'
      - '-f'
      - 'Dockerfile.moonshine'
      - '--build-arg'
      - 'BAKE_KNOT_URL=https://www-edgework-app.edgework.ai/api/v1/r2/distributed-inference/models/tinyllama-1.1b.knot'
      - '.'
    id: 'build-baked-tinyllama-1.1b'
    timeout: '5400s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-tinyllama-1.1b-tp1',
      ]
    id: 'push-baked-tinyllama-1.1b'
    waitFor: ['build-baked-tinyllama-1.1b']

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-tinyllama-1.1b-tp1'

timeout: '6000s'

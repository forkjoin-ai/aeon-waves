# Baked moonshine image for gnosis-openai-qwen3-8b.
# Bakes the qwen3-8b.knot knot into the image (race-mode local mmap).
# Carries the terminal-prosody fix: collectSentenceCloseTokenIds() no longer
# includes '\n' in the sentence-close set. Picked up via Dockerfile.moonshine
# COPY . . of distributed-inference-host/src. Distinct -tp1 tag.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    env: ['DOCKER_BUILDKIT=1']
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-qwen3-8b-tp1'
      - '-f'
      - 'Dockerfile.moonshine'
      - '--build-arg'
      - 'BAKE_KNOT_URL=https://www-edgework-app.edgework.ai/api/v1/r2/distributed-inference/models/qwen3-8b.knot'
      - '.'
    id: 'build-baked-qwen3-8b-tp1'
    timeout: '5400s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-qwen3-8b-tp1',
      ]
    id: 'push-baked-qwen3-8b-tp1'
    waitFor: ['build-baked-qwen3-8b-tp1']

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: 200
  logging: CLOUD_LOGGING_ONLY

images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:baked-qwen3-8b-tp1'

timeout: '6000s'

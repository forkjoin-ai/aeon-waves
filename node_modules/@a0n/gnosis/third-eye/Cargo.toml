[package]
name = "third-eye"
version = "0.1.0"
edition = "2024"
description = "Sovereign video-perception engine: sample-as-fast-as-stable, detect+track mesh objects, admit provable knowledge, publish plenoramic body aeon frames for Thoth. See PLAN.md."

[lib]
name = "third_eye"
# rlib for the native bin + Rust consumers; cdylib for the wasm-bindgen PerceptionEngine.
# Mirrors distributed-inference's crate-type = ["rlib", "cdylib"] (third-eye needs no staticlib).
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "third-eye"
path = "src/bin/third-eye.rs"

# Sovereign scheduling/algebra deps — compile cleanly to wasm32 (frf gates its work-stealing `pool`
# behind cfg(not(wasm32)); rayon is only a frf dev-dependency). These stay in the wasm hot path:
# the gnosis-frf value-door + gnosis-antiqueue corridor run per frame on the single-threaded side.
[dependencies]
gnosis-frf = { path = "../gnosis-frf" }              # fork/race/fold + value-door (certified_light)
gnosis-antiqueue = { path = "../gnosis-antiqueue" }  # corridor admission/throttle (publish_certified)
gnosis-helix = { path = "../gnosis-helix" }          # Stoplight algebra (SSOT)

# wasm-incompatible by construction (ffmpeg subprocess + std::fs); only the native bin/cadence use it.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
frffmpeg = { path = "../frffmpeg" }                  # video decode (frffmpeg::decode)
# OPTIONAL per-frame motion-deblur pre-pass (Richardson–Lucy line-PSF deconvolution). Native-only:
# the crate is heavy + ffi-bound, so the deblur seam in pipeline.rs is cfg(not(wasm32))-gated and the
# wasm PerceptionEngine never links it. Default OFF (opt-in via PerceptionOpts.motion_deblur).
distributed-inference = { path = "../distributed-inference" }

# JS-callable zero-copy surface for the perception entry (wasm32 only).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = "0.1"
# No serde-wasm-bindgen: the relay/tick wire is built with format! (publish.rs) and moves bytes, so
# the boundary carries only raw pointers + String, keeping the wasm dependency surface minimal.

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[package.metadata.wasm-pack.profile.release]
# Skip wasm-opt: simd128 + bulk-memory are emitted by rustc; the default wasm-opt in CI can be
# stale wrt simd128. Size is reported by monster-build either way.
wasm-opt = false

# Build the wasm32 perception lib with SIMD enabled so `core::arch::wasm32` simd128 intrinsics in
# `src/simd.rs` (the perception inner math: EMA background update, foreground diff, signature L1
# motion) compile to v128 / f32x4 / u8x16 ops instead of scalar. Mirrors the sovereign in-repo
# pattern (wasm-modules/transformer-inference/.cargo/config.toml). bulk-memory speeds the frame /
# tick buffer fills. Native targets are unaffected (this scopes to wasm32 only).
[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+simd128,+bulk-memory"]

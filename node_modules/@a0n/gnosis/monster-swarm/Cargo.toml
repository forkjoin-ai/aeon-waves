[package]
name = "monster-swarm"
version = "0.1.0"
edition = "2021"
description = "UCAN-gated, cost-admitted CRUD over a leased swarm of distributed-inference subagents. The distributed-inference guardrails of the monster family."

[lib]
name = "monster_swarm"
path = "src/lib.rs"

[[bin]]
name = "monster-swarm"
path = "src/main.rs"

[dependencies]
a0n-auth = { path = "../../auth/rust" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Wire-compatible with distributed-inference's SwarmSignal (bincode 1.x).
bincode = "1.3"
libc = "0.2"
# Per-subagent invocation signatures (P-256 ECDSA), matching a0n-auth's did:key
# scheme so a signature verifies against the DID recorded in the ledger.
p256 = { version = "0.13", features = ["ecdsa"] }
hex = "0.4"
# Tamper-evident audit-chain entry hashing (sha256). Already in the dependency
# tree (transitively via p256/a0n-auth); pinned here as a direct dependency.
sha2 = "0.10"

[dev-dependencies]
# For the gated mesh integration test: mint a root-rooted UCAN + parse responses.
a0n-auth = { path = "../../auth/rust" }
serde_json = "1"

# Standalone — not a member of any parent workspace (matches monster-guard/-resident).
[workspace]

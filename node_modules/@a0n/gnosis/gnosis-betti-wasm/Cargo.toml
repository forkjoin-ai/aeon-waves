[package]
name = "gnosis-betti-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "gnosis-betti"
path = "src/main.rs"

[[bin]]
name = "gnosis-lean"
path = "src/bin/gnosis_lean.rs"

[dependencies]
clap = { version = "4.5.31", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde-wasm-bindgen = "0.6.5"
wasm-bindgen = "0.2.100"
regex = "1.11.1"
lazy_static = "1.5.0"
swc_common = "21.0.1"
swc_ecma_ast = { version = "23.0.0", features = ["serde-impl"] }
swc_ecma_codegen = "26.0.1"
swc_ecma_parser = "39.0.0"
swc_ecma_transforms_typescript = "46.0.0"
swc_ecma_visit = "23.0.0"
gnot = { path = "../../gnot" }
gnosis-frf = { path = "../gnosis-frf" }

# cloudbuild-rwkv-escape-witness.yaml
# Generates boundary-recurrence escape witnesses for the RWKV architecture class.
# Uses RWKV4-World-3B (native transformers, no fla/Triton required).
# Scripts are embedded as base64 to avoid private-repo curl issues.
#
# Run:
#   gcloud builds submit --no-source \
#     --config=open-source/gnosis/cloudbuild-rwkv-escape-witness.yaml \
#     --substitutions=_HF_TOKEN=$HF_TOKEN,_R2_TOKEN=$R2_TOKEN \
#     --project=neutral-418500

timeout: 1800s

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 20
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'python:3.11-slim'
    id: 'rwkv-witness'
    env:
      - 'HF_TOKEN=${_HF_TOKEN}'
      - 'R2_TOKEN=${_R2_TOKEN}'
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      apt-get update -qq && apt-get install -y -qq curl

      pip install --quiet \
        "transformers>=4.45" "torch>=2.0" scikit-learn requests numpy \
        "huggingface_hub>=0.24" "hf_transfer>=0.1.6"

      export HF_HUB_ENABLE_HF_TRANSFER=1

      echo "" | base64 -d > /workspace/generate-escape-witnesses.py
      echo "" | base64 -d > /workspace/upload-to-r2.py

      R2BASE="https://edgework.ai/api/v1/r2/distributed-inference"

      echo "=== rwkv-4-world-3b ==="
      python3 /workspace/generate-escape-witnesses.py \
        --model-id=rwkv-4-world-3b \
        --hf-model=RWKV/rwkv-4-world-3b \
        --out=/workspace/rwkv-witnesses.json \
        --sketch-out=/workspace/rwkv-4-world-3b-sketches.knot \
        --r2-upload-url="${R2BASE}/models/rwkv-4-world-3b-sketches.knot" \
        --r2-base-url="${R2BASE}" \
        --hf-token="${HF_TOKEN}" \
        --r2-token="${R2_TOKEN}"
      echo "[escape] rwkv done"
      cat /workspace/rwkv-witnesses.json

substitutions:
  _HF_TOKEN: ''
  _R2_TOKEN: ''

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="e8-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="50%" style="stop-color:#2a6bbf"/>
      <stop offset="100%" style="stop-color:#0f3a7f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background dark circle -->
  <circle cx="128" cy="128" r="124" fill="#0f0f0f" stroke="url(#e8-core)" stroke-width="2" opacity="0.3"/>

  <!-- E8 root vertices: 240 roots visualized as concentric rings of 8-fold symmetry -->
  <!-- Inner core (8 roots) -->
  <g id="inner-ring" filter="url(#glow)">
    <circle cx="128" cy="60" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="172" cy="75" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="196" cy="128" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="172" cy="181" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="128" cy="196" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="84" cy="181" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="60" cy="128" r="4" fill="url(#e8-core)" opacity="0.9"/>
    <circle cx="84" cy="75" r="4" fill="url(#e8-core)" opacity="0.9"/>
  </g>

  <!-- Middle ring (16 roots) -->
  <g id="middle-ring" opacity="0.7">
    <circle cx="128" cy="35" r="3" fill="url(#e8-core)"/>
    <circle cx="157" cy="50" r="3" fill="url(#e8-core)"/>
    <circle cx="178" cy="78" r="3" fill="url(#e8-core)"/>
    <circle cx="193" cy="108" r="3" fill="url(#e8-core)"/>
    <circle cx="206" cy="148" r="3" fill="url(#e8-core)"/>
    <circle cx="193" cy="178" r="3" fill="url(#e8-core)"/>
    <circle cx="178" cy="206" r="3" fill="url(#e8-core)"/>
    <circle cx="157" cy="221" r="3" fill="url(#e8-core)"/>
    <circle cx="128" cy="228" r="3" fill="url(#e8-core)"/>
    <circle cx="99" cy="221" r="3" fill="url(#e8-core)"/>
    <circle cx="78" cy="206" r="3" fill="url(#e8-core)"/>
    <circle cx="63" cy="178" r="3" fill="url(#e8-core)"/>
    <circle cx="50" cy="148" r="3" fill="url(#e8-core)"/>
    <circle cx="37" cy="108" r="3" fill="url(#e8-core)"/>
    <circle cx="22" cy="78" r="3" fill="url(#e8-core)"/>
    <circle cx="99" cy="50" r="3" fill="url(#e8-core)"/>
  </g>

  <!-- Outer ring (radiant energy) - connectors showing 8-fold symmetry -->
  <g id="symmetry-lines" stroke="url(#e8-core)" stroke-width="1" opacity="0.4">
    <line x1="128" y1="128" x2="128" y2="30"/>
    <line x1="128" y1="128" x2="195" y2="61"/>
    <line x1="128" y1="128" x2="225" y2="128"/>
    <line x1="128" y1="128" x2="195" y2="195"/>
    <line x1="128" y1="128" x2="128" y2="226"/>
    <line x1="128" y1="128" x2="61" y2="195"/>
    <line x1="128" y1="128" x2="31" y2="128"/>
    <line x1="128" y1="128" x2="61" y2="61"/>
  </g>

  <!-- Central core (the 1D origin - the center) -->
  <circle cx="128" cy="128" r="2" fill="white" opacity="0.9"/>
</svg>

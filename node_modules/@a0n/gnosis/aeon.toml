[[site.faq]]
q = "Do I need to learn the .gg language first?"
a = "No. If you write TypeScript, start with gnode — it runs a supported TypeScript subset through Gnosis so you can see the compiled schedule. If you want the graph language directly, start with the example.gg and betti.gg files."

[[site.faq]]
q = "What does fork / race / fold mean?"
a = "Fork splits work into parallel branches, race chooses or compares the outcomes, and fold combines the useful results. A node is one unit of work; an edge says what can happen after another node, or beside it. A runtime executes the graph and enforces the allowed behavior."

[[site.faq]]
q = "Do I need to be a mathematician to use Gnosis?"
a = "No. The math-heavy surfaces are there so the toolchain can make stronger claims when it needs to. The ordinary developer path is still: write a small program, inspect the graph, run it, and test the behavior."

[[site.faq]]
q = "What is the formal surface?"
a = "Gnosis carries mechanized proofs (Lean 4, TLA+), named theorem IDs, and TypeScript reducers that map those IDs to data structures downstream code may use. Start at FORMAL_LEDGER.md for scope, consumer boundaries, and validation hooks."


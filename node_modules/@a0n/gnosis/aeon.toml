# gnosis — easy-deploy site (driven entirely by this file).
#
# Deploy with:  a0 xr deploy
#
# gnosis has no worker `main`; the [site] block makes it a topology-driven site.
# x-ranger synthesizes a worker that renders this content with the `oss-template`
# component kit via the @a0n/aeon-flux runtime. Edit any value and redeploy.
#
# Content is sourced from open-source/gnosis/README.md — keep it honest.

name = "gnosis-site"
compatibility_date = "2025-01-01"
workers_dev = true

[site]
kit = "oss-template"
title = "gnosis — a graph-first language for executable workflows"

[site.project]
name = "Gnosis"
tagline = "Turn programs and workflows into explicit executable graphs."
description = "A graph-first language, runtime, and toolchain. Every .gg program is a topology whose edges carry FORK, RACE, FOLD, VENT, PROCESS, and SLIVER semantics — compiled, inspected, tested, and run. Concurrency, routing, retries, and verification become visible nodes and edges instead of hidden control flow."
logo = "diamond"
accent = "#7c3aed"
theme = "dark"
font_sans = "Atkinson Hyperlegible Next"
font_serif = "IBM Plex Serif"
repo = "forkjoin-ai/gnosis"

# Nav links: "Label|href". Plain labels auto-anchor to a matching section.
[site.nav]
links = ["Docs|/docs/GG_DEVELOPER_GUIDE.md", "Language|/docs/GG_LANGUAGE_REFERENCE.md", "Modules|/docs/GG_MODULES_AND_EXTENSIONS.md", "Quickstart|#quickstart", "Source|https://forgo.cloud/forkjoin-ai/gnosis"]

[site.markdown]
pages = [
  "docs/GG_DEVELOPER_GUIDE.md",
  "docs/GG_LANGUAGE_REFERENCE.md",
  "docs/GG_CLI_REFERENCE.md",
  "docs/GG_MODULES_AND_EXTENSIONS.md",
  "docs/GG_SURFACE_MAP.md",
  "docs/GETTING_STARTED.md",
  "examples/README.md",
  "gnode/README.md",
  "polyglot/README.md",
  "runtime/README.md",
  "src/README.md",
  "bin/README.md",
]

# Deterministic generative favicon / og-image (sigil-rs ported to the edge).
[site.sigil]
seed = "gnosis"
motion = "vortex"
coherence = "ring"
frame = "hexagon"

[site.hero]
eyebrow = "graph-first language · six racing compilers · proof-backed contracts"
install = "curl -fsSL https://edgework.ai/gnosis/install.sh | sh"
cta_primary = "Get started"
cta_primary_href = "/docs/GG_DEVELOPER_GUIDE.md"
cta_secondary = "Browse the source"
cta_secondary_href = "https://forgo.cloud/forkjoin-ai/gnosis"

[[site.features]]
icon = "branch"
title = "Fork / race / fold topologies"
body = "Every .gg program is a directed graph whose edges carry FORK, RACE, FOLD, VENT, PROCESS, and SLIVER semantics. Split work, choose or compare outcomes, then combine the useful results — concurrency made visible as nodes and edges."

[[site.features]]
icon = "zap"
title = "Six compilers race per node"
body = "Becky (native Rust), aeon-logic, Betti (self-hosted on betti.gg), Franky, Beckett, and Betty (13-phase verification + Lean codegen) race each other on every .gg file. The best compiler per node wins."

[[site.features]]
icon = "gauge"
title = "Lilith — the fastest GG compiler"
body = "3.0us native, 5.9us WASM, written in C. A forward-only scanner with zero backtracking, compiled to a 34KB native binary and a 5.6KB standalone WASM module for Workers, browsers, and Node."

[[site.features]]
icon = "shield"
title = "Proof-backed contracts"
body = "Build, run, native, test, and module paths fail closed unless the compiled topology is admitted by the shared god-formula/v1 universe kernel. Sorry-free Lean 4 proofs and 600+ TLA+ model-checking configurations back the named theorem ledger."

[[site.features]]
icon = "layers"
title = "Polyglot extraction"
body = "Point gnode at a supported TypeScript subset and see the compiled schedule instead of learning .gg first. Polyglot recognizes framework and language shapes and lowers them into Gnosis graphs across Rust, JS, Elixir, Go, and Python targets."

[[site.features]]
icon = "globe"
title = "Topological serialization"
body = "Gnot binary-native trees cut ~25% off the wire; Bitwise/DNA 2-bit packing reaches 75% reduction; the Amplituhedron .knot codec stores an entire algorithm in 28 bytes for O(1) load times — structural addressability without the JSON tax."

[site.quickstart]
title = "Install and run a topology"

[[site.quickstart.tab]]
label = "Install"
code = "# Unix, macOS, and Linux\ncurl -fsSL https://edgework.ai/gnosis/install.sh | sh\n\n# Windows PowerShell\npowershell -NoProfile -ExecutionPolicy Bypass -Command \"irm https://edgework.ai/gnosis/install.ps1 | iex\"\n\n# optional Moonshine\ncurl -fsSL https://edgework.ai/gnosis/install.sh | sh -s -- --with-moonshine"

[[site.quickstart.tab]]
label = "Run"
code = "# run a fib(20) toy workload through the Monster/Gnosis path\nGNODE_FORCE_TSX=1 pnpm --dir open-source/gnosis run monster:fib20\n\n# pass JSON into a tiny echo-style app\nGNODE_FORCE_TSX=1 pnpm --dir open-source/gnosis run monster:echo"

[[site.quickstart.tab]]
label = "CLI"
code = "# lint and analyze a graph\nnode ./bin/gnosis.js lint example.gg --target node\nnode ./bin/gnosis.js analyze betti.gg --json\n\n# execute it\nnode ./bin/gnosis.js run example.gg"

[[site.quickstart.tab]]
label = "Formal"
code = "# emit formal artifacts from a topology\nnode ./bin/gnosis.js verify betti.gg --tla --tla-out tla/generated\nnode ./bin/gnosis.js build betti.gg --lean --lean-out lean/generated"

[[site.quickstart.tab]]
label = ".gg"
code = "(input)-[:FORK]->(fast_path | safe_path)\n(fast_path | safe_path)-[:FOLD { strategy: 'linear' }]->(result)\n\n(data)-[:FORK]->(agent_a | agent_b | agent_c)\n(agent_a | agent_b | agent_c)-[:RACE]->(winner)"


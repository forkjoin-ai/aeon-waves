[language]
id = "kotlin"
grammar = "kotlin"
extensions = [".kt", ".kts"]
name = "Kotlin"

[patterns.function]
node_types = ["function_declaration"]
name_field = "name"
body_field = "body"

[patterns.branch]
[patterns.branch.if_pattern]
node_type = "if_expression"
consequence_field = "consequence"
alternative_field = "alternative"

[patterns.branch.match_pattern]
node_type = "when_expression"
body_field = "body"
arm_type = "when_entry"
always_exhaustive = false

[patterns.loop]
[[patterns.loop.bounded]]
node_type = "for_statement"
body_field = "body"

[[patterns.loop.unbounded]]
node_type = "while_statement"
body_field = "body"

[[patterns.loop.unbounded]]
node_type = "do_while_statement"
body_field = "body"

[patterns.error_handling]
[patterns.error_handling.try_pattern]
try_type = "try_expression"
body_field = "body"
catch_type = "catch_block"
catch_body_field = "body"
finally_type = "finally_block"
finally_body_field = "body"

[patterns.resource]
[[patterns.resource.acquire]]
text = "FileInputStream("
kind = "File"

[[patterns.resource.acquire]]
text = "BufferedReader("
kind = "File"

[[patterns.resource.acquire]]
text = "DriverManager.getConnection("
kind = "Connection"

[[patterns.resource.release]]
text = ".close()"
kind = "Generic"

[patterns.concurrency]
[[patterns.concurrency.spawn]]
text = "launch {"

[[patterns.concurrency.spawn]]
text = "async {"

[[patterns.concurrency.spawn]]
text = "GlobalScope.launch"

[[patterns.concurrency.join]]
text = ".await()"

[[patterns.concurrency.join]]
text = ".join()"

[patterns.locking]
[[patterns.locking.scoped]]
node_type = "synchronized"
body_field = "body"
kind = "monitor"

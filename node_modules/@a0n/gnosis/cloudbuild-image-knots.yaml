# Image model KNOTs: llava-1.5-7b, glm-4v-9b
# llava = LlavaForConditionalGeneration (language_model.* prefix, LLaMA-based)
# glm-4v = ChatGLMModel (transformer.encoder.* + vision_tower skipped, arch=glm4)

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: llava-1.5-7b
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[llava-1.5-7b] encoding LM weights (vision_tower skipped)..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model llava-hf/llava-1.5-7b-hf \
          --output /workspace/llava-1.5-7b.knot
        echo "[llava-1.5-7b] done: $(ls -lh /workspace/llava-1.5-7b.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: glm-4v-9b
    waitFor: ['llava-1.5-7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[glm-4v-9b] encoding LM weights (vision_tower skipped)..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model THUDM/glm-4v-9b \
          --output /workspace/glm-4v-9b.knot \
          || echo "[warn] glm-4v-9b failed -- skipping"
        ls -lh /workspace/glm-4v-9b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['glm-4v-9b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          echo "[upload] $file -> $key"
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key -- continuing"
        }

        upload_if_exists /workspace/llava-1.5-7b.knot models/llava-1.5-7b.knot
        upload_if_exists /workspace/glm-4v-9b.knot   models/glm-4v-9b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in llava-1.5-7b.knot glm-4v-9b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '300'
  logging: CLOUD_LOGGING_ONLY

timeout: '18000s'

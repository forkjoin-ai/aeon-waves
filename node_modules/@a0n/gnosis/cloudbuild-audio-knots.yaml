# Audio model KNOTs: whisper-large-v3-turbo
# WhisperForConditionalGeneration: full encoder+decoder, 587 tensors, 0 skipped.

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '900s'

  - name: 'python:3.11-slim'
    id: whisper-large-v3-turbo
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        S=/workspace/open-source/gnosis/distributed-inference

        echo "[whisper-large-v3-turbo] encoding (587 tensors, enc+dec)..."
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model openai/whisper-large-v3-turbo \
          --output /workspace/whisper-large-v3-turbo.knot
        echo "[whisper-large-v3-turbo] done: $(ls -lh /workspace/whisper-large-v3-turbo.knot)"
    secretEnv: ['HF_TOKEN']
    timeout: '3600s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['whisper-large-v3-turbo']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference

        echo "[upload] whisper-large-v3-turbo.knot -> models/whisper-large-v3-turbo.knot"
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/whisper-large-v3-turbo.knot models/whisper-large-v3-turbo.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/whisper-large-v3-turbo.knot" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] whisper-large-v3-turbo.knot" || echo "[WARN] whisper: $magic"
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '7200s'

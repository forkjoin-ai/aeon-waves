# Qwen2.5-72B-Instruct rank-32 exclusion-sketch bundle
#
# Usage (from monorepo root):
#   gcloud builds submit \
#     --config=open-source/gnosis/cloudbuild-qwen2-5-72b-sketches.yaml \
#     --async
#
# Lands: models/qwen-72b-gkq-sketches.knot
#
# This is sketch-only: it does not build or deploy any Cloud Run service.
# The generator downloads one HF safetensors shard at a time, spools sketch
# payload bytes to disk, skips full dense reconstruction diagnostics, verifies
# the KNOT header locally, uploads with the existing R2 MPU proxy, then checks
# the remote KNOT magic.

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          numpy scikit-learn safetensors requests transformers \
          "huggingface_hub>=0.24" "hf_transfer>=0.1.6"
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: generate-sketches
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        export HF_HUB_ENABLE_HF_TRANSFER=1
        export KMP_DUPLICATE_LIB_OK=TRUE
        export OMP_NUM_THREADS=1
        S=/workspace/open-source/gnosis/distributed-inference
        mkdir -p /workspace/hf-cache /workspace/sketch-spool /workspace/rknots
        echo "[sketch] starting Qwen2.5-72B-Instruct rank-32 bundle..."
        /workspace/venv/bin/python3 "$$S/generate-sketches.py" \
          --model Qwen/Qwen2.5-72B-Instruct \
          --model-name qwen-72b-gkq-sketches \
          --output /workspace/rknots/qwen-72b-gkq-sketches.knot \
          --rank 32 \
          --shard-stream \
          --cache-dir /workspace/hf-cache \
          --min-free-gb 60 \
          --stream-output \
          --spool-dir /workspace/sketch-spool \
          --reconstruction-check none
        echo "[sketch] done: $(ls -lh /workspace/rknots/qwen-72b-gkq-sketches.knot)"
        du -sh /workspace/rknots /workspace/hf-cache /workspace/sketch-spool || true
    secretEnv: ['HF_TOKEN']
    timeout: '43200s'

  - name: 'python:3.11-slim'
    id: verify-local
    waitFor: ['generate-sketches']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/verify-sketch-knot.py" \
          /workspace/rknots/qwen-72b-gkq-sketches.knot \
          --expect-rank 32 \
          --expect-sketches 562 \
          --expect-arch qwen2 \
          --expect-layers 80 \
          --expect-hidden 8192 \
          --expect-vocab 152064 \
          --require-sketch token_embd.weight \
          --require-sketch output.weight \
          --require-sketch blk.0.attn_q.weight \
          --require-sketch blk.79.ffn_down.weight \
          --expect-sketch-shape output.weight:152064:8192 \
          --json
    timeout: '300s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['verify-local']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://www-edgework-app.edgework.ai/api/v1/r2/distributed-inference
        PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
          /workspace/venv/bin/python3 "$$UPLOADER" \
          /workspace/rknots/qwen-72b-gkq-sketches.knot \
          models/qwen-72b-gkq-sketches.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '7200s'

  - name: 'curlimages/curl:latest'
    id: verify-remote
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        set -eu
        BASE=https://www-edgework-app.edgework.ai/api/v1/r2/distributed-inference/models
        magic=$(curl -sf -H "Range: bytes=0-3" "$$BASE/qwen-72b-gkq-sketches.knot" | od -A n -t x1 | head -1 || echo FAIL)
        echo "$$magic" | grep -q "4b 4e 4f 54" && echo "[OK] qwen-72b-gkq-sketches.knot" || { echo "[FAIL] $$magic"; exit 1; }
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '300'
  logging: CLOUD_LOGGING_ONLY

timeout: '50400s'

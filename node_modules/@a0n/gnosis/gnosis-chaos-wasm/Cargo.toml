[package]
name = "gnosis-chaos-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for ChaosEngine synthetic tracks"
license = "MPL-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
gnosis-helix = { path = "../gnosis-helix" }
gnosis-chaos = { path = "../gnosis-chaos" }
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"

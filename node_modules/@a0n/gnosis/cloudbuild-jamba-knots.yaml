# Jamba KNOT: ai21labs/AI21-Jamba-Mini-1.7

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: jamba
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        echo "[jamba] encoding..."
        /workspace/venv/bin/python3 "$$S/encode-ssm-models.py" \
          --model ai21labs/AI21-Jamba-Mini-1.7 \
          --output /workspace/jamba-mini-1.7.knot \
          || echo "[warn] jamba failed"
        ls -lh /workspace/jamba-mini-1.7.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '7200s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['jamba']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/jamba-mini-1.7.knot models/jamba-mini-1.7.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        magic=$(curl -sf --range 0-3 "$$BASE/jamba-mini-1.7.knot" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
        echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] jamba-mini-1.7.knot" || echo "[WARN] jamba-mini-1.7.knot: $magic"
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '200'
  logging: CLOUD_LOGGING_ONLY

timeout: '10800s'

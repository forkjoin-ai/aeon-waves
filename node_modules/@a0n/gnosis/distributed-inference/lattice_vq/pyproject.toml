[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "lattice_vq"
version = "0.1.0"
description = "Sovereign Rust E8/Leech lattice quantizer exposed to PyTorch/NumPy (Nanopath contest core layer)."
requires-python = ">=3.12"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
]
dependencies = ["numpy>=1.26"]

[tool.maturin]
# abi3-py312: one wheel works on CPython >= 3.12.
features = ["pyo3/extension-module"]

[package]
name = "lattice_vq"
version = "0.1.0"
edition = "2021"
description = "PyO3 wheel exposing the sovereign Rust E8/Leech lattice quantizer to PyTorch (Nanopath contest core layer)."
license = "MPL-2.0"

# Separate top-level crate so the existing distributed-inference rlib/cdylib/NAPI
# build stays untouched. The lattice math is consumed via a path dependency —
# NOT reimplemented. This crate is the ONLY pymodule target.
[lib]
name = "lattice_vq"
# cdylib is what maturin packages into the Python extension module.
crate-type = ["cdylib"]

[dependencies]
# The sovereign source of truth. Path dependency, additive only.
distributed-inference = { path = ".." }
pyo3 = { version = "0.23", features = ["extension-module", "abi3-py312"] }
numpy = "0.23"
rayon = "1"

[profile.release]
opt-level = 3
codegen-units = 1
# NOTE: unlike the parent crate (panic = "abort"), PyO3 requires unwinding so it
# can catch Rust panics at the FFI boundary and convert them to Python
# exceptions. This profile applies to THIS top-level crate only; the parent's
# profile is ignored for a path dependency.
panic = "unwind"
lto = "thin"

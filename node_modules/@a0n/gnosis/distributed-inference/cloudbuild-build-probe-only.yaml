# Build ONLY the paris-probe-rknot + verify-rknot binaries and publish them to GCS.
# No knot fetch, no probe run — we run the probe locally on the local knot.
substitutions:
  _CRATE_DIR: 'open-source/gnosis/distributed-inference'
steps:
  - name: 'rust:1-bookworm'
    id: build-probe
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev build-essential
        cd "/workspace/${_CRATE_DIR}"
        cargo build --release --bin paris-probe-rknot
        cp target/release/paris-probe-rknot /workspace/paris-probe-rknot
        ls -la /workspace/paris-probe-rknot
    timeout: '2400s'
artifacts:
  objects:
    location: 'gs://neutral-418500_cloudbuild/probe-binaries/'
    paths: ['paris-probe-rknot']
timeout: '2600s'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 60

# NAPI cdylib linkage: napi_* symbols are resolved at runtime against the
# Node.js host process, not at link time. Darwin and Linux both need their
# linkers told to permit undefined symbols for this crate.
#
# macOS: `-undefined dynamic_lookup` (clang driver flag, passed through to ld).
# Linux: the default GNU ld already allows undefined symbols in shared libs,
#        but we still forward `--unresolved-symbols=ignore-all` under `-Wl,-z`
#        so an accidentally-strict linker config doesn't break the build.

[target.x86_64-apple-darwin]
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-args=-undefined dynamic_lookup",
]

[target.aarch64-apple-darwin]
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-args=-undefined dynamic_lookup",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-args=-Wl,--unresolved-symbols=ignore-all",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C", "target-cpu=native",
  "-C", "link-args=-Wl,--unresolved-symbols=ignore-all",
]

# Rebuilds ONLY the CUDA fat-station binary (gemma4 GPU-GEMM fix) and grafts it
# over moonshine-gpu-v17-gpufix. Context is open-source/ (path-deps into gnosis/
# + bitwise/, same as cloudbuild-skymesh.yaml).
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:moonshine-gpu-v21-gpuckmax'
      - '-f'
      - 'open-source/gnosis/distributed-inference/Dockerfile.gemma4-gpufix'
      - 'open-source/'
images:
  - 'us-central1-docker.pkg.dev/neutral-418500/gnosis/moonshine:moonshine-gpu-v21-gpuckmax'
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
timeout: '3000s'

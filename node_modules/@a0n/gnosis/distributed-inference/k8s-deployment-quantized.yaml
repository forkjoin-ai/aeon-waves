---
# Kubernetes deployment for quantized weight distribution and inference
# Enables cost-efficient distributed inference with <100ms weight reconstruction on GPU

apiVersion: v1
kind: Namespace
metadata:
  name: gnosis-distributed

---
# ConfigMap: Quantized weight metadata (rknots)
apiVersion: v1
kind: ConfigMap
metadata:
  name: rknots-metadata
  namespace: gnosis-distributed
data:
  phi3-metadata.json: |
    {
      "model": "phi3",
      "compression_ratio": 1664,
      "original_size_mb": 15200,
      "quantized_size_kb": 9135,
      "expected_reconstruction_time_ms": 45,
      "expected_speedup": 1.89
    }
  qwen-metadata.json: |
    {
      "model": "qwen",
      "compression_ratio": 1670,
      "original_size_mb": 28000,
      "quantized_size_kb": 16763,
      "expected_reconstruction_time_ms": 52,
      "expected_speedup": 1.81
    }
  gemma4-metadata.json: |
    {
      "model": "gemma4",
      "compression_ratio": 1747,
      "original_size_mb": 124000,
      "quantized_size_kb": 70971,
      "expected_reconstruction_time_ms": 78,
      "expected_speedup": 1.98
    }
  llama-metadata.json: |
    {
      "model": "llama",
      "compression_ratio": 1824,
      "original_size_mb": 280000,
      "quantized_size_kb": 153509,
      "expected_reconstruction_time_ms": 95,
      "expected_speedup": 2.12
    }

---
# PersistentVolumeClaim for quantized weights (shared across replicas)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quantized-weights-storage
  namespace: gnosis-distributed
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 500Mi
  storageClassName: fast-ssd

---
# Service: Expose inference endpoint
apiVersion: v1
kind: Service
metadata:
  name: quantized-inference
  namespace: gnosis-distributed
  labels:
    app: quantized-inference
spec:
  type: LoadBalancer
  ports:
    - name: inference
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: quantized-inference

---
# Deployment: Quantized weight inference server
# Each pod reconstructs weights on-GPU in <100ms, serves inference requests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantized-inference
  namespace: gnosis-distributed
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quantized-inference
  template:
    metadata:
      labels:
        app: quantized-inference
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # Node affinity: prefer GPU nodes
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: accelerator
                    operator: In
                    values:
                      - nvidia-a100
                      - nvidia-h100

      # Init container: Download quantized weights for memory-resident hot path
      initContainers:
        - name: download-weights
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              set -e
              echo "Memory-resident mode: Loading quantized weights into pod memory..."
              mkdir -p /weights/quantized
              cd /weights/quantized
              # In production: download from CDN or use local volume
              # For now: weights should be pre-staged in PVC or downloaded here
              # curl -O https://cdn.forkjoin.ai/gnosis/weights/llama-70b-gkq.knot
              # SHA256 verification recommended for production
              echo "✓ Weights staged for memory-resident loading"
          volumeMounts:
            - name: weights-storage
              mountPath: /weights

      # Main container: Inference server
      containers:
        - name: inference-server
          image: gnosis-quantized-inference:latest
          imagePullPolicy: Always
          ports:
            - name: inference
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            # Weight loading and caching (hot path: memory-resident by default)
            - name: WEIGHTS_PATH
              value: "/weights/quantized/llama-70b-gkq.knot"
            - name: MEMORY_RESIDENT_MODE
              value: "true"
            - name: GPU_CACHE_SIZE_MB
              value: "8000"
            - name: MAX_AGE_SECONDS
              value: "3600"
            # Fallback: CDN streaming (disabled by default, set to 'true' to enable)
            - name: USE_CDN_FALLBACK
              value: "false"
            - name: CDN_WEIGHTS_URL
              value: "https://cdn.forkjoin.ai/gnosis/weights/llama-70b-gkq.knot"
            # Compute and logging
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: MODEL_NAME
              value: "llama"
            - name: RECONSTRUCTION_BATCH_SIZE
              value: "64"
            - name: INFERENCE_TIMEOUT_MS
              value: "5000"
            - name: LOG_LEVEL
              value: "INFO"

          resources:
            requests:
              memory: "16Gi"
              cpu: "4"
              nvidia.com/gpu: "1"
            limits:
              memory: "24Gi"
              cpu: "8"
              nvidia.com/gpu: "1"

          volumeMounts:
            - name: weights-storage
              mountPath: /weights
            - name: cache
              mountPath: /tmp/weight-cache
            - name: rknots
              mountPath: /etc/rknots

          # Liveness probe: Check if server is responsive
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # Readiness probe: Check if weights are loaded and GPU is ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Startup probe: Give container time to download weights (~30s)
          startupProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30

      # Volumes
      volumes:
        - name: weights-storage
          persistentVolumeClaim:
            claimName: quantized-weights-storage
        - name: cache
          emptyDir:
            sizeLimit: 2Gi
        - name: rknots
          configMap:
            name: rknots-metadata

      # Pod disruption budget: Ensure at least 1 replica is always running
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - quantized-inference
                topologyKey: kubernetes.io/hostname

---
# Horizontal Pod Autoscaler: Scale based on GPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quantized-inference-hpa
  namespace: gnosis-distributed
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quantized-inference
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

---
# NetworkPolicy: Restrict traffic to inference endpoints
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quantized-inference-netpol
  namespace: gnosis-distributed
spec:
  podSelector:
    matchLabels:
      app: quantized-inference
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: default
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443  # HTTPS for CDN downloads
        - protocol: TCP
          port: 53   # DNS

---
# ServiceMonitor: Prometheus metrics (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: quantized-inference
  namespace: gnosis-distributed
spec:
  selector:
    matchLabels:
      app: quantized-inference
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics

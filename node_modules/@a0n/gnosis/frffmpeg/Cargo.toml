[package]
name = "frffmpeg"
version = "0.1.0"
edition = "2024"

[lib]
name = "frffmpeg"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "frffmpeg"
path = "src/main.rs"

[dependencies]
bytemuck = "1"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
gnosis-frf = { path = "../gnosis-frf" }

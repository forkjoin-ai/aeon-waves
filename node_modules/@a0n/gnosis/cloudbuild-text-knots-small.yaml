# Small text model KNOTs: SmolLM2-360M, Qwen3-0.6B, Qwen3-1.7B, gemma-3-1b, Llama-3.2-1B

steps:
  - name: 'python:3.11-slim'
    id: pip-install
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        python3 -m venv /workspace/venv
        /workspace/venv/bin/pip install -q --no-cache-dir \
          transformers safetensors numpy requests \
          "huggingface_hub>=0.24" ml_dtypes
        echo "[pip] done"
    timeout: '600s'

  - name: 'python:3.11-slim'
    id: smollm2-360m
    waitFor: ['pip-install']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model HuggingFaceTB/SmolLM2-360M-Instruct \
          --output /workspace/smollm2-360m.knot \
          || echo "[warn] smollm2-360m failed"
        ls -lh /workspace/smollm2-360m.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: qwen3-0.6b
    waitFor: ['smollm2-360m']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen3-0.6B \
          --output /workspace/qwen3-0.6b.knot \
          || echo "[warn] qwen3-0.6b failed"
        ls -lh /workspace/qwen3-0.6b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: qwen3-1.7b
    waitFor: ['qwen3-0.6b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model Qwen/Qwen3-1.7B \
          --output /workspace/qwen3-1.7b.knot \
          || echo "[warn] qwen3-1.7b failed"
        ls -lh /workspace/qwen3-1.7b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: gemma-3-1b
    waitFor: ['qwen3-1.7b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model google/gemma-3-1b-it \
          --output /workspace/gemma-3-1b.knot \
          || echo "[warn] gemma-3-1b failed"
        ls -lh /workspace/gemma-3-1b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: llama-3.2-1b
    waitFor: ['gemma-3-1b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        export HF_TOKEN="$$HF_TOKEN"
        S=/workspace/open-source/gnosis/distributed-inference
        /workspace/venv/bin/python3 "$$S/encode-knot.py" \
          --model meta-llama/Llama-3.2-1B-Instruct \
          --output /workspace/llama-3.2-1b.knot \
          || echo "[warn] llama-3.2-1b failed"
        ls -lh /workspace/llama-3.2-1b.knot 2>/dev/null || true
    secretEnv: ['HF_TOKEN']
    timeout: '1800s'

  - name: 'python:3.11-slim'
    id: upload
    waitFor: ['llama-3.2-1b']
    entrypoint: bash
    args:
      - '-c'
      - |
        set -euo pipefail
        UPLOADER=/workspace/open-source/gnosis/distributed-inference/upload-to-r2.py
        PROXY_BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference
        upload_if_exists() {
          local file="$1" key="$2"
          [ -f "$file" ] || { echo "[skip] $file"; return 0; }
          PROXY_BASE="$$PROXY_BASE" R2_TOKEN="$$R2_TOKEN" \
            /workspace/venv/bin/python3 "$$UPLOADER" "$file" "$key" \
            || echo "[warn] upload failed for $key"
        }
        upload_if_exists /workspace/smollm2-360m.knot    models/smollm2-360m.knot
        upload_if_exists /workspace/qwen3-0.6b.knot      models/qwen3-0.6b.knot
        upload_if_exists /workspace/qwen3-1.7b.knot      models/qwen3-1.7b.knot
        upload_if_exists /workspace/gemma-3-1b.knot      models/gemma-3-1b.knot
        upload_if_exists /workspace/llama-3.2-1b.knot    models/llama-3.2-1b.knot
        echo "[upload] done"
    secretEnv: ['R2_TOKEN']
    timeout: '3600s'

  - name: 'curlimages/curl:latest'
    id: verify
    waitFor: ['upload']
    entrypoint: sh
    args:
      - '-c'
      - |
        BASE=https://edgework-web.taylorbuley.workers.dev/api/v1/r2/distributed-inference/models
        for f in smollm2-360m.knot qwen3-0.6b.knot qwen3-1.7b.knot gemma-3-1b.knot llama-3.2-1b.knot; do
          magic=$(curl -sf --range 0-3 "$$BASE/$f" 2>/dev/null | od -A n -t x1 | head -1 || echo FAIL)
          echo "$magic" | grep -q "4b 4e 4f 54" && echo "[OK] $f" || echo "[WARN] $f: $magic"
        done
    timeout: '60s'

availableSecrets:
  secretManager:
    - versionName: projects/neutral-418500/secrets/R2_PROXY_TOKEN/versions/latest
      env: R2_TOKEN
    - versionName: projects/neutral-418500/secrets/HF_TOKEN/versions/latest
      env: HF_TOKEN

options:
  machineType: 'E2_HIGHCPU_32'
  diskSizeGb: '100'
  logging: CLOUD_LOGGING_ONLY

timeout: '14400s'

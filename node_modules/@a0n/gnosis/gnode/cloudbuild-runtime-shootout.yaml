# gnode runtime shootout pipeline
#
# Usage:
#   gcloud builds submit \
#     --config=open-source/gnosis/gnode/cloudbuild-runtime-shootout.yaml \
#     --ignore-file=open-source/gnosis/gnode/cloudbuild-benchmark.gcloudignore \
#     .

steps:
  - name: 'node:22-bookworm'
    id: 'runtime-shootout'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        apt-get update -qq
        apt-get install -y -qq curl ca-certificates > /dev/null 2>&1
        curl -fsSL https://bun.sh/install | bash
        export BUN_INSTALL="$$HOME/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        cd /workspace
        bun install --frozen-lockfile
        export GNODE_RUNTIME_SHOOTOUT_ITERATIONS=8
        export GNODE_RUNTIME_SHOOTOUT_WARMUP=1
        node open-source/gnosis/gnode/benchmarks/runtime-shootout.mjs
    timeout: 2700s

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  logStreamingOption: STREAM_ON

timeout: 3600s

tags:
  - 'gnode'
  - 'benchmark'
  - 'runtime-shootout'
